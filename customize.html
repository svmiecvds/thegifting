/* --- THEME VARIABLES --- */
:root,
[data-theme="light"] {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #c2185b;
    --heading-color: #ff4fa2;
    --btn-bg: #ffffff;
    --btn-text: #ff4fa2;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(135deg, #1a0010 0%, #3d0030 40%, #5c0045 100%);
    --body-bg: #1a0010;
    --panel-bg: #2e001f;
    --popup-bg: #2e001f;
    --receipt-bg: #1a0010;
    --card-bg: #2e001f;
    --text-color: #ff80c0;
    --heading-color: #ff4fa2;
    --btn-bg: #3d0030;
    --btn-text: #ff80c0;
    --cart-btn-bg: #c2185b;
    --cart-btn-shadow: #ff1493;
    --glow-color: #ff1493;
    --glow-soft: #c2185b;
    --toast-bg: #c2185b;
    --receipt-shadow: #c2185b;
    --shelf-overlay: rgba(26,0,16,0.15);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}

/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body {
    color: var(--text-color);
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

[data-theme="dark"] body {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

body.receiptPage,
body.giftPage {
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--receipt-bg);
}

[data-theme="dark"] body.receiptPage,
[data-theme="dark"] body.giftPage {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

/* --- THEME SWITCH STYLES --- */
.theme-switch {
    --toggle-size: 11px;

/* --- Smaller size --- */
--container-width: 5.625em;
    --container-height: 2.5em;
    --container-radius: 6.25em;
    --container-light-bg: #ff4fa2;

/* --- Changed color to pop more --- */
--container-night-bg: #800040;
    --circle-container-diameter: 3.375em;
    --sun-moon-diameter: 2.125em;
    --sun-bg: #FFA500;
    --moon-bg: #E0E4EB;
    --spot-color: #A1A8B8;
    --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
    --stars-color: #fff;
    --clouds-color: #F3FDFF;
    --back-clouds-color: #AACADF;
    --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
    --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
}

.theme-switch,
.theme-switch *,
.theme-switch *::before,
.theme-switch *::after {
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-size: var(--toggle-size);
}

.theme-switch__container {
    width: var(--container-width);
    height: var(--container-height);
    background-color: var(--container-light-bg);
    border-radius: var(--container-radius);
    overflow: hidden;
    cursor: pointer;
    box-shadow: none;

/* --- Make it flat, not floating --- */
transition: var(--transition);
    position: relative;
}

.theme-switch__container::before {
    content: "";
    position: absolute;
    z-index: 1;
    inset: 0;
    border-radius: var(--container-radius);
}

.theme-switch__checkbox {
    display: none;
}

.theme-switch__circle-container {
    width: var(--circle-container-diameter);
    height: var(--circle-container-diameter);
    background-color: rgba(255, 255, 255, 0.2);
    position: absolute;
    left: var(--circle-container-offset);
    top: var(--circle-container-offset);
    border-radius: var(--container-radius);
    display: flex;
    transition: var(--circle-transition);
    pointer-events: none;
}

.theme-switch__sun-moon-container {
    pointer-events: auto;
    position: relative;
    z-index: 2;
    width: var(--sun-moon-diameter);
    height: var(--sun-moon-diameter);
    margin: auto;
    border-radius: var(--container-radius);
    background-color: var(--sun-bg);
    overflow: hidden;
    transition: var(--transition);
}

.theme-switch__moon {
    transform: translateX(100%);
    width: 100%;
    height: 100%;
    background-color: var(--moon-bg);
    border-radius: inherit;
    transition: var(--transition);
    position: relative;
}

.theme-switch__spot {
    position: absolute;
    top: 0.75em;
    left: 0.312em;
    width: 0.75em;
    height: 0.75em;
    border-radius: var(--container-radius);
    background-color: var(--spot-color);
}

.theme-switch__spot:nth-of-type(2) {
    width: 0.375em;
    height: 0.375em;
    top: 0.937em;
    left: 1.375em;
}

.theme-switch__spot:nth-last-of-type(3) {
    width: 0.25em;
    height: 0.25em;
    top: 0.312em;
    left: 0.812em;
}

.theme-switch__clouds {
    width: 1.25em;
    height: 1.25em;
    background-color: var(--clouds-color);
    border-radius: var(--container-radius);
    position: absolute;
    bottom: -0.625em;
    left: 0.312em;
    box-shadow:
        0.937em 0.312em var(--clouds-color),
        -0.312em -0.312em var(--back-clouds-color),
        1.437em 0.375em var(--clouds-color),
        0.5em -0.125em var(--back-clouds-color),
        2.187em 0 var(--clouds-color),
        1.25em -0.062em var(--back-clouds-color),
        2.937em 0.312em var(--clouds-color),
        2em -0.312em var(--back-clouds-color),
        3.625em -0.062em var(--clouds-color),
        2.625em 0em var(--back-clouds-color),
        4.5em -0.312em var(--clouds-color),
        3.375em -0.437em var(--back-clouds-color),
        4.625em -1.75em 0 0.437em var(--clouds-color),
        4em -0.625em var(--back-clouds-color),
        4.125em -2.125em 0 0.437em var(--back-clouds-color);
    transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
}

.theme-switch__stars-container {
    position: absolute;
    color: var(--stars-color);
    top: -100%;
    left: 0.312em;
    width: 2.75em;
    height: auto;
    transition: var(--transition);
}

/* --- -- Switch Actions -- --- */
.theme-switch__checkbox:checked + .theme-switch__container {
    background-color: var(--container-night-bg);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em);
}

.theme-switch__circle-container:hover {
    left: calc(var(--circle-container-offset) + 0.187em);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon {
    transform: translate(0);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds {
    bottom: -4.062em;
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container {
    top: 50%;
    transform: translateY(-50%);
}

/* --- CUSTOMIZE PAGE --- */
#customizeContainer {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 30px;
    padding: 30px 20px;
}

#customScene {
    position: relative;
    width: 700px;
    height: 700px;
    background: var(--card-bg);
    border-radius: 28px;
    border: 2px solid rgba(255, 182, 217, 0.35);
    box-shadow:
        0 8px 32px rgba(255, 182, 193, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.04);
    overflow: hidden;
    transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

[data-theme="dark"] #customScene {
    border-color: rgba(92, 0, 69, 0.5);
    box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3);
}

.mainPlushie {
    position: absolute;
    width: 280px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

#customPanel {
    width: 280px;
    background: var(--panel-bg);
    padding: 24px;
    border-radius: 24px;
    border: 2px solid rgba(255, 182, 217, 0.3);
    box-shadow:
        0 8px 24px rgba(255, 182, 193, 0.12),
        0 2px 6px rgba(0, 0, 0, 0.03);
    transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

[data-theme="dark"] #customPanel {
    border-color: rgba(92, 0, 69, 0.4);
    box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.25);
}

#customPanel h2 {
    text-align: center;
    margin-bottom: 16px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 18px;
    color: var(--heading-color);
    letter-spacing: 0.3px;
}

.accessoriesGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 12px;
    margin-bottom: 16px;
}

.accessoryTemplate {
    width: 100% !important;
    height: 72px !important;
    margin: 0 !important;
    object-fit: contain;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 6px;
    cursor: grab;
    transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s ease;
    border: 2px solid rgba(255, 182, 217, 0.2);
}

[data-theme="dark"] .accessoryTemplate {
    border-color: rgba(92, 0, 69, 0.3);
}

.accessoryTemplate:hover {
    transform: scale(1.06) translateY(-2px);
    box-shadow: 0 6px 16px rgba(255, 105, 180, 0.18);
    border-color: rgba(255, 105, 180, 0.4);
}

.accessoryTemplate:active {
    cursor: grabbing;
    transform: scale(0.97);
}

.selectedAccessory {
    outline: 2.5px solid var(--heading-color) !important;
    outline-offset: 2px;
    border-radius: 14px;
    box-shadow: none;
}

.draggableAccessory {
    cursor: move;
    z-index: 10;
    transition: outline 0.2s ease, box-shadow 0.2s ease;
}

/* --- Pulsing red dot for active recording --- */
.recording-active {
    animation: recordPulse 1s infinite alternate;
    color: #e74c3c !important;
}

@keyframes recordPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* --- Plushie speaking / audio wave pulse animation --- */
.plushie-speaking {
    animation: audioShake 0.15s infinite alternate;
    box-shadow: none !important;
    border-radius: 50%;
}

@keyframes audioShake {
    0% { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(2deg) scale(1.02); }
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root, [data-theme="light"] {

    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);

[data-theme="dark"] {

    --hover-glow: rgba(136, 14, 79, 0.6);
    --hover-glow-soft: rgba(194, 24, 91, 0.8);
    --btn-text-color: #ffffff;
}

.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);
}

/* THEME TOGGLE         */
/* -------------------- */

// Apply saved theme immediately to <html> to prevent flash
(function () {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();

// Wire up the checkbox once DOM is ready
document.addEventListener('DOMContentLoaded', function () {
    const checkbox = document.getElementById('themeCheckbox');
    if (!checkbox) return;

    const saved = localStorage.getItem('theme');
    checkbox.checked = saved === 'dark';

    checkbox.addEventListener('change', function () {
        if (this.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    });
});

</script>
<script>
const customScene =
document.getElementById(
"customScene"
);

const mainPlushie =
document.getElementById(
"mainPlushie"
);

let selectedItem = null;
let selected = null;

/* -------------------- */
/* LOAD PLUSHIE         */
/* -------------------- */

// Helper to extract relative assets path
function getRelativePath(absoluteUrl) {
    if (!absoluteUrl) return "";
    let normalized = absoluteUrl.replace(/\\/g, "/");
    const match = normalized.match(/assets\//i);
    if (match) {
        return normalized.substring(match.index);
    }
    return normalized;
}

// Helper to create an accessory image
function createAccessory(src, leftPx, topPx, widthPx) {
    const accessory = document.createElement("img");
    accessory.src = src;
    accessory.className = "draggableAccessory";
    accessory.draggable = false;
    accessory.style.position = "absolute";
    accessory.style.width = widthPx + "px";
    accessory.style.left = leftPx + "px";
    accessory.style.top = topPx + "px";

    customScene.appendChild(accessory);
    
    // Auto-select the newly created accessory
    selectAccessory(accessory);
    return accessory;
}

// Function to select a placed accessory and highlight it
function selectAccessory(element) {
    selectedItem = element;
    document.querySelectorAll(".draggableAccessory").forEach(item => {
        item.classList.remove("selectedAccessory");
    });
    if (element) {
        element.classList.add("selectedAccessory");
    }
}

const currentPlushie = JSON.parse(sessionStorage.getItem("currentPlushie"));
if (!currentPlushie) {
    window.location.href = "index.html";
}

if(currentPlushie){
    mainPlushie.src = currentPlushie.image;
    // Starts fresh with a blank canvas for this customization session
}

/* -------------------- */
/* ADD ACCESSORIES      */
/* -------------------- */

document.querySelectorAll(".accessoryTemplate").forEach(item => {
    item.addEventListener("click", () => {
        const rect = customScene.getBoundingClientRect();
        const plushieRect = mainPlushie.getBoundingClientRect();
        
        const plushieW = mainPlushie.offsetWidth || 280;
        const plushieH = mainPlushie.offsetHeight || 280;
        
        // Make it a tad bit smaller (40% of plushie size)
        const width = plushieW * 0.40;
        
        // Center it on the plushie
        const left = (plushieRect.left - rect.left) + (plushieW - width) / 2;
        const top = (plushieRect.top - rect.top) + (plushieH - width) / 2;
        
        createAccessory(item.src, left, top, width);
    });

    // Support drag start from the sidebar templates
    item.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", item.src);
    });
});

// Setup drag and drop events on customScene
customScene.addEventListener("dragover", (e) => {
    e.preventDefault();
});

customScene.addEventListener("drop", (e) => {
    e.preventDefault();
    const src = e.dataTransfer.getData("text/plain");
    if (src) {
        const rect = customScene.getBoundingClientRect();
        
        // Calculate dropped coordinates relative to customScene
        const dropX = e.clientX - rect.left;
        const dropY = e.clientY - rect.top;
        
        // Default sticker size (e.g. 40% of the plushie size, fallback to 112)
        const defaultWidth = (mainPlushie.offsetWidth ? mainPlushie.offsetWidth * 0.40 : 112);
        
        // Center the accessory at drop coordinates
        const left = dropX - defaultWidth / 2;
        const top = dropY - defaultWidth / 2;
        
        createAccessory(src, left, top, defaultWidth);
    }
});

/* -------------------- */
/* SELECT & DRAG PLACED */
/* -------------------- */

let dragOffsetX = 0;
let dragOffsetY = 0;

document.addEventListener("mousedown", (e) => {
    if (e.target.classList.contains("draggableAccessory")) {
        e.preventDefault(); // Stop native drag
        selected = e.target;
        selectAccessory(e.target);
        
        // Calculate offset so the sticker doesn't snap to center under cursor
        const rect = customScene.getBoundingClientRect();
        const elementRect = selected.getBoundingClientRect();
        dragOffsetX = e.clientX - elementRect.left;
        dragOffsetY = e.clientY - elementRect.top;
    } else {
        // Deselect if clicking outside of the customScene or customization panels
        if (!e.target.closest('#customScene') && !e.target.closest('#customPanel') && !e.target.closest('#voicePanel')) {
            selectAccessory(null);
        }
    }
});

document.addEventListener("mousemove", (e) => {
    if (!selected) return;

    const rect = customScene.getBoundingClientRect();
    
    // Position sticker relative to customScene with drag offsets
    let left = e.clientX - rect.left - dragOffsetX;
    let top = e.clientY - rect.top - dragOffsetY;
    
    // Bounds check to keep stickers within customScene
    left = Math.max(-selected.offsetWidth / 2, Math.min(left, rect.width - selected.offsetWidth / 2));
    top = Math.max(-selected.offsetHeight / 2, Math.min(top, rect.height - selected.offsetHeight / 2));
    
    selected.style.left = left + "px";
    selected.style.top = top + "px";
});

document.addEventListener("mouseup", () => {
    selected = null;
});

/* -------------------- */
/* INCREASE SIZE        */
/* -------------------- */

document
.getElementById(
"increaseSize"
)
.addEventListener(
"click",
() => {

if(!selectedItem){

alert(
"Select an accessory first!"
);

return;
}

const currentWidth =

selectedItem.offsetWidth;

selectedItem.style.width =

(currentWidth + 15) + "px";

});

/* -------------------- */
/* DECREASE SIZE        */
/* -------------------- */

document
.getElementById(
"decreaseSize"
)
.addEventListener(
"click",
() => {

if(!selectedItem){

alert(
"Select an accessory first!"
);

return;
}

const currentWidth =

selectedItem.offsetWidth;

if(currentWidth > 30){

selectedItem.style.width =

(currentWidth - 15) + "px";

}

});

/* -------------------- */
/* DELETE               */
/* -------------------- */

document
.getElementById(
"deleteItem"
)
.addEventListener(
"click",
() => {

if(
selectedItem
){

selectedItem.remove();

selectedItem =
null;

}

});

/* -------------------- */
/* SAVE                 */
/* -------------------- */

document
.getElementById(
"saveCustomization"
)
.addEventListener(
"click",
() => {

const accessories = [];
const rect = customScene.getBoundingClientRect();
const plushieRect = mainPlushie.getBoundingClientRect();
const plushieW = plushieRect.width || 280;
const plushieH = plushieRect.height || 280;

document
.querySelectorAll(
".draggableAccessory"
)
.forEach(item => {
    const itemRect = item.getBoundingClientRect();
    
    // Calculate coordinates relative to plushieRect
    const relLeft = (itemRect.left - plushieRect.left) / plushieW;
    const relTop = (itemRect.top - plushieRect.top) / plushieH;
    const relWidth = itemRect.width / plushieW;
    
    // Virtualize coordinates to a 700x700 canvas with plushie centered at (210, 210) and size 280x280
    const rawLeft = 210 + relLeft * 280;
    const rawTop = 210 + relTop * 280;
    const rawWidth = relWidth * 280;

    accessories.push({
        image: getRelativePath(item.src),
        left: rawLeft + "px",
        top: rawTop + "px",
        width: rawWidth + "px"
    });
});

/* Build the customized plushie object with unique ID */
const customizedPlushie = {
    customId: "plushie_" + Date.now(),
    name: currentPlushie.name,
    image: currentPlushie.image,
    quantity: currentPlushie.quantity || 1,
    accessories: accessories,
    voiceNote: voiceNoteDataUrl,
    voiceNoteDuration: voiceNoteDuration
};

/* Load existing cart items and append this new customized item */
let cart = JSON.parse(sessionStorage.getItem("cart")) || [];
cart.push(customizedPlushie);

/* Save to cart */
sessionStorage.setItem("cart", JSON.stringify(cart));

alert("Customization Saved & Added to Cart!");
window.location = "index.html";
});

/* -------------------- */
/* VOICE RECORDER API   */
/* -------------------- */

let mediaRecorder = null;
let audioChunks = [];
let voiceNoteDataUrl = null;
let voiceNoteDuration = 0;
let recordingStartTime = 0;
let recordingTimer = null;
let recordDuration = 0;

const recordBtn = document.getElementById("recordBtn");
const recordStatus = document.getElementById("recordStatus");
const playbackContainer = document.getElementById("recordPlaybackContainer");
const playVoiceBtn = document.getElementById("playVoiceBtn");
const deleteVoiceBtn = document.getElementById("deleteVoiceBtn");

if (recordBtn) {
    recordBtn.addEventListener("click", () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            stopRecording();
        } else {
            startRecording();
        }
    });
}

function startRecording() {
    audioChunks = [];
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = () => {
                voiceNoteDuration = Date.now() - recordingStartTime;
                const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                const reader = new FileReader();
                reader.onloadend = () => {
                    voiceNoteDataUrl = reader.result;
                    recordStatus.innerText = "Voice note recorded!";
                    recordStatus.classList.remove("recording-active");
                    playbackContainer.style.display = "flex";
                };
                reader.readAsDataURL(audioBlob);

                // Stop all tracks on the stream to release the mic
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            recordingStartTime = Date.now();
            recordBtn.innerText = "Stop Recording";
            recordBtn.style.background = "";
            recordBtn.style.boxShadow = "";
            recordStatus.innerText = "Recording... (15s limit)";
            recordStatus.classList.add("recording-active");
            playbackContainer.style.display = "none";
            
            recordDuration = 0;
            clearInterval(recordingTimer);
            recordingTimer = setInterval(() => {
                recordDuration++;
                if (recordDuration >= 15) {
                    stopRecording();
                } else {
                    recordStatus.innerText = `Recording... (${15 - recordDuration}s remaining)`;
                }
            }, 1000);
        })
        .catch(err => {
            console.error("Microphone access denied or not supported:", err);
            alert("Unable to access microphone. Please ensure microphone permissions are granted.");
            recordStatus.innerText = "Microphone access error";
        });
}

function stopRecording() {
    clearInterval(recordingTimer);
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
    }
    recordBtn.innerText = "Record (15s limit)";
    recordBtn.style.background = "";
    recordBtn.style.boxShadow = "";
}

// Playback
let testAudio = null;
if (playVoiceBtn) {
    playVoiceBtn.addEventListener("click", () => {
        if (voiceNoteDataUrl) {
            if (testAudio) {
                testAudio.pause();
            }
            testAudio = new Audio(voiceNoteDataUrl);
            testAudio.play();
            recordStatus.innerText = "Playing voice note...";
            testAudio.onended = () => {
                recordStatus.innerText = "Voice note recorded!";
            };
        }
    });
}

// Delete
if (deleteVoiceBtn) {
    deleteVoiceBtn.addEventListener("click", () => {
        voiceNoteDataUrl = null;
        voiceNoteDuration = 0;
        if (testAudio) {
            testAudio.pause();
            testAudio = null;
        }
        recordStatus.innerText = "Ready to record";
        playbackContainer.style.display = "none";
    });
}

</script>
