/* --- THEME VARIABLES --- */
:root {
    --bg-gradient: linear-gradient(135deg, #fce0e5 0%, #fac5cf 40%, #fac5cf 100%);
    --body-bg: #fef2f4;
    --panel-bg: #fce0e5;
    --popup-bg: #fce0e5;
    --receipt-bg: #fef2f4;
    --card-bg: #ffffff;
    --text-color: #B71A3D;
    --heading-color: #B71A3D;
    --btn-bg: #ffffff;
    --btn-text: #B71A3D;
    --cart-btn-bg: #B71A3D;
    --cart-btn-shadow: #B71A3D;
    --glow-color: #B71A3D;
    --glow-soft: #fac5cf;
    --toast-bg: #B71A3D;
    --receipt-shadow: #fac5cf;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pinyon Script', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}



/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body,
body.receiptPage,
body.giftPage {
    color: var(--text-color);
    background-image: url('assets/notesbg.png');
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow: hidden !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- TOAST --- */
#toast {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--toast-bg);
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    z-index: 9999;
    transition: background 0.5s ease;
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid #B71A3D !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: var(--font-heading);
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 50px;
    text-shadow: 2px 2px 4px rgba(250, 197, 207, 0.4);
    font-weight: bold;
}



/* --- NAVBAR --- */
#storeNavbar {
    background: url(\'assets/kisses-bg.png\') center/cover no-repeat !important;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 30px;
    z-index: 999;
    border-bottom: 3px solid #fac5cf;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);

.navLink {

    font-weight: 600;

    display: flex;
    align-items: center;
    gap: 8px;

}

.navLink:hover {

/* --- TREATS PAGE LAYOUT --- */
.dessert-cart-container {

.spawner-grid {

    justify-items: center;

.dessertSpawner {

/* --- Bubbly option elements inside selection panel --- */
.box-option {

    align-items: center;

}

}

.buttons-row {

}

}

.buttons-row button:hover {

/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;

    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid #B71A3D !important;
    outline-offset: 3px;
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root {
    --bg-pink: #fac5cf;
    --hover-glow: rgba(250, 197, 207, 0.6);
    --hover-glow-soft: rgba(183, 26, 61, 0.8);
    --btn-text-color: #5a0035;
}



.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta > span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover > span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(183, 26, 61, 0.2);
}



@keyframes gradient-angle {
  to {
    --gradient-angle: 360deg;
  }
}

@keyframes shimmer {
  to {
    rotate: 360deg;
  }
}

@keyframes breathe {
  from, to {
    scale: 1;
  }
  50% {
    scale: 1.2;
  }
}

    flex-direction: column;
}

body.no-scroll #mainContainer {

    width: 100%;
}

.carousel-wrapper {
    position: relative;
    width: 90%;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 60px;
    height: auto;
}

.carousel-track-container {
    overflow: hidden;
    width: 100%;
    padding: 15px 0;

/* --- extra padding for box shadows --- */
}

.carousel-track {
    display: flex;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.carousel-slide {
    flex: 0 0 calc(100% / 3);

/* --- Show 3 items --- */
padding: 0 15px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
}

@media (max-width: 1024px) {
    .carousel-slide {
        flex: 0 0 50%;

/* --- Show 2 items --- */
}
}

@media (max-width: 768px) {
    .carousel-slide {
        flex: 0 0 100%;

/* --- Show 1 item --- */
}

        padding: 0 40px;
    }
}

}

                    <img src="assets/final page/sticker3.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                    <img src="assets/final page/sticker_clip_purple.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                    <img src="assets/final page/sticker_pin_red.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                    <img src="assets/final page/sticker_clip_beige.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                    <img src="assets/final page/sticker_clip_pink.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                    <img src="assets/final page/sticker_clip_blue.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                    <img src="assets/final page/sticker_camera.png" class="stickerTemplate" style="width: 80px; margin-bottom: 10px; cursor: pointer;">
                </div>
            </div>
        </div>

        <!-- Right Panel: Currently selected items list (Cart preview) -->
        <div class="dessert-cart-container" style="width: 320px; background: var(--card-bg); border-radius: 35px; padding: 24px; display: flex; flex-direction: column; min-height: 50vh;">
            <h2 style="text-align: center; color: var(--heading-color); margin-bottom: 15px; font-weight: 600;">Selected Notes</h2>
            <div id="cartItemsContainer" style="flex: 1; overflow-y: auto;">
                <!-- items go here -->
            </div>
            
            <button id="addToCartBtn" class="shiny-cta" style="margin-top: 15px; width: 100%; border: none;">
                <span>Save to Cart</span>
            </button>
        </div>
    </div>
    
    <!-- Note Editor Modal -->
    <div id="noteEditor" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--popup-bg); padding: 25px; border-radius: 25px; z-index: 99999; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <h2 style="color: var(--heading-color); margin-bottom: 15px; font-family: var(--font-ui);">Edit Text</h2>
        <textarea id="noteMessage" placeholder="Write your message..." style="width: 320px; height: 130px; margin-bottom: 15px; resize: none; border-radius: 10px; padding: 10px; border: 1px solid var(--card-border);"></textarea>
        <br>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <select id="fontSelect" style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--card-border);">
                <option value="Pacifico">Pacifico</option>
                <option value="Fredoka">Fredoka</option>
                <option value="Quicksand">Quicksand</option>
                <option value="Ribeye">Ribeye</option>
            </select>
            <input type="color" id="textColorPicker" value="#B71A3D" style="width: 40px; height: 40px; border: none; cursor: pointer; padding: 0; background: transparent;">
        </div>
        <button id="saveNote" style="width: 100%; border: none; border-radius: 50px; padding: 15px; background: #ffffff; color: #B71A3D; font-weight: bold; cursor: pointer;">Save</button>
    </div>


            <!-- Column 2: Workspace Canvas (Tad bit smaller) -->
            <div id="customScene">
                <div id="itemDeleteBtn" style="display: none; position: absolute; z-index: 1000; cursor: pointer; background: white; border-radius: 50%; padding: 4px; border: 1px solid #fac5cf; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B71A3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </div>


                
            <div id="itemRotateBtn" style="display: none; position: absolute; z-index: 1000; cursor: pointer; background: white; border-radius: 50%; padding: 4px; border: 1px solid #fac5cf; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B71A3D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.67-1.36"/></svg>
            </div>
            <div id="itemResizeBtn" style="display: none; position: absolute; z-index: 1000; cursor: nwse-resize; background: white; border-radius: 50%; padding: 4px; border: 1px solid #fac5cf; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B71A3D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </div>
<div class="canvas-placeholder" id="placeholderMsg">
                    <span>Treats Canvas</span>
                    <span style="font-size: 15px; font-family: var(--font-body); margin-top: 15px; opacity: 0.8;">
                        Select a box, then click desserts to spawn them. Drag to arrange, and use controls to customize!
                    </span>
                </div>
                <img id="mainBox" src="" class="mainPlushie" style="width: 280px;" alt="">
            </div>

            <!-- Column 3: Customizer Sidebar Controls -->
            <div id="customPanel" class="treats-controls-panel">
                <h2>Choose a Box</h2>
                <hr class="box-hr" style="margin: 10px 0 15px 0; border: none; border-top: 1px solid var(--text-color); opacity: 0.2;">
                
                <div class="box-option" data-box="heart" data-image="assets/treats/box_heart.png" data-name="Heart Treat Box">
                    <img src="assets/treats/box_heart.png" alt="Heart Box">
                    <span>Heart Box</span>
                </div>
                
                <div class="box-option" data-box="rect" data-image="assets/treats/box_rect.png" data-name="Rectangle Treat Box">
                    <img src="assets/treats/box_rect.png" alt="Rectangle Box">
                    <span>Rectangle Box</span>
                </div>
                
                <div class="box-option" data-box="circle" data-image="assets/treats/box_circle.png" data-name="Circle Treat Box">
                    <img src="assets/treats/box_circle.png" alt="Circle Box">
                    <span>Circle Box</span>
                </div>

                <hr style="margin-top: 15px; margin-bottom: 15px; border: none; border-top: 2px solid var(--glow-soft);">

                <button id="saveCustomization" class="shiny-cta addToCartBtn" style="width: 100%; margin-top: auto; border: 2px solid #B71A3D;"><span>Add to Cart</span></button>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">
        Added To Cart 
    </div>

    

<script>
    let cart = JSON.parse(sessionStorage.getItem("cart")) || [];
    let pendingNoteType = null;
    let pendingNoteSrc = null;
    let isEditingTextOnly = false;
    
    function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        document.getElementById('cartCount').innerText = count;
    }
    
    function renderLocalCart() {
        const container = document.getElementById('cartItemsContainer');
        container.innerHTML = '';
        
        const localItems = cart.filter(item => item.type === 'note' || item.type === 'sticker' || item.type === 'text');
        
        if (localItems.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">No notes added yet.</p>';
            return;
        }
        
        localItems.forEach((item, index) => {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.gap = '10px';
            div.style.marginBottom = '15px';
            div.style.padding = '10px';
            div.style.background = '#ffffff';
            div.style.borderRadius = '15px';
            
            if (item.type === 'text') {
                div.innerHTML = `
                    <div style="flex: 1; font-family: ${item.fontFamily}; color: ${item.color}; font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${item.text}
                    </div>
                    <button onclick="removeLocalItem('${item.id}')" style="background: none; border: none; color: red; cursor: pointer; font-weight: bold;">X</button>
                `;
            } else {
                div.innerHTML = `
                    <img src="${item.src}" style="width: 50px; height: 50px; object-fit: contain;">
                    <div style="flex: 1; font-family: var(--font-ui); font-size: 14px;">
                        ${item.type === 'note' ? 'Note: ' + (item.noteTextDetails ? item.noteTextDetails.text : '') : 'Sticker'}
                    </div>
                    <button onclick="removeLocalItem('${item.id}')" style="background: none; border: none; color: red; cursor: pointer; font-weight: bold;">X</button>
                `;
            }
            container.appendChild(div);
        });
    }
    
    window.removeLocalItem = function(id) {
        cart = cart.filter(item => item.id !== id);
        sessionStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
        renderLocalCart();
    };
    
    function generateId() {
        return Math.random().toString(36).substr(2, 9);
    }
    
    document.querySelectorAll('.stickerTemplate').forEach(img => {
        img.addEventListener('click', () => {
            cart.push({
                id: generateId(),
                type: 'sticker',
                src: img.src,
                quantity: 1,
                name: 'Sticker'
            });
            sessionStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            renderLocalCart();
        });
    });
    
    document.querySelectorAll('.noteTemplate').forEach(img => {
        img.addEventListener('click', () => {
            pendingNoteType = 'note';
            pendingNoteSrc = img.src;
            isEditingTextOnly = false;
            document.getElementById('noteMessage').value = '';
            document.getElementById('noteEditor').style.display = 'block';
        });
    });
    
    document.getElementById('addTextBtn').addEventListener('click', () => {
        pendingNoteType = 'text';
        isEditingTextOnly = true;
        document.getElementById('noteMessage').value = '';
        document.getElementById('noteEditor').style.display = 'block';
    });
    
    document.getElementById('saveNote').addEventListener('click', () => {
        const text = document.getElementById('noteMessage').value;
        const font = document.getElementById('fontSelect').value;
        const color = document.getElementById('textColorPicker').value;
        
        if (isEditingTextOnly) {
            if (text.trim() === '') {
                document.getElementById('noteEditor').style.display = 'none';
                return;
            }
            cart.push({
                id: generateId(),
                type: 'text',
                text: text,
                fontFamily: font + ", cursive",
                color: color,
                quantity: 1,
                name: 'Custom Text'
            });
        } else {
            cart.push({
                id: generateId(),
                type: 'note',
                src: pendingNoteSrc,
                noteTextDetails: {
                    text: text,
                    fontFamily: font + ", cursive",
                    color: color
                },
                quantity: 1,
                name: 'Custom Note'
            });
        }
        
        sessionStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
        renderLocalCart();
        document.getElementById('noteEditor').style.display = 'none';
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') document.getElementById('noteEditor').style.display = 'none';
    });
    
    document.getElementById('addToCartBtn').addEventListener('click', () => {
        // already saved to session storage during add
        alert('Notes & Stickers saved to your cart!');
        window.location.href = 'gift.html';
    });
    
    // Init
    updateCartCount();
    renderLocalCart();

    const cartButton = document.getElementById("cartButton");
    if (cartButton) {
        cartButton.addEventListener("click", () => {
            window.location = "checkout.html";
        });
    }
</script>
</body>

</html>
