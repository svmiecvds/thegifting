/* --- THEME VARIABLES --- */
:root {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #B71A3D;
    --heading-color: #B71A3D;
    --btn-bg: #ffffff;
    --btn-text: #B71A3D;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}



/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body,
body.receiptPage,
body.giftPage {
    color: var(--text-color);
    background-image: url('assets/bg_pattern.png');
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow: hidden !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- TOAST --- */
#toast {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--toast-bg);
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    z-index: 9999;
    transition: background 0.5s ease;
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: var(--font-heading);
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 42px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
    font-weight: normal;
}



/* --- NAVBAR --- */
#storeNavbar {
    background: url(\'assets/kisses-bg.png\') center/cover no-repeat !important;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;

    z-index: 999;

}

    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;

.navLink:hover {

}

}

/* --- TREATS PAGE LAYOUT --- */
.dessert-cart-container {
    width: 340px;
    background: white;

    border-radius: 35px;
    padding: 24px;

    font-weight: 600;

}

.spawner-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    justify-items: center;
}

.dessertSpawner {
    width: 60px;
    height: 60px;
    object-fit: contain;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.25s ease;

.canvas-placeholder {

/* --- Bubbly option elements inside selection panel --- */
.box-option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    background: var(--btn-bg);
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    width: 100%;
}

.box-option:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: hotpink;
    box-shadow: 0 5px 12px rgba(255, 105, 180, 0.2);
}

.box-option.active {
    background: #ffb6d9;
    border-color: hotpink;
    box-shadow: none;
}

.box-option img {
    width: 45px;
    height: 45px;
    object-fit: contain;
}

.box-option span {
    font-size: 16px;
    font-family: var(--font-ui);
    font-weight: 600;
    color: var(--text-color);
}

.box-option.active span {
    color: #5a0035;

/* --- Customization Buttons Placed Side-by-Side --- */
.buttons-row {

    width: 100%;

}

.buttons-row button {

    background: #ffffff;
    color: #5a0035;

}

.buttons-row button:hover {
    transform: scale(1.05);
}



/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;
    object-fit: contain;
    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}



.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta > span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover > span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);
}



@keyframes gradient-angle {
  to {
    --gradient-angle: 360deg;
  }
}

@keyframes shimmer {
  to {
    rotate: 360deg;
  }
}

@keyframes breathe {
  from, to {
    scale: 1;
  }
  50% {
    scale: 1.2;
  }
}

    <script>
const customScene = document.getElementById("customScene");
const mainBox = document.getElementById("mainBox");
const placeholderMsg = document.getElementById("placeholderMsg");

let selectedItem = null;
let selected = null;
let highestZ = 10;

// Rotation and flip state trackers
let dragOffsetX = 0;
let dragOffsetY = 0;

/* -------------------- */
/* LOAD CART STATE      */
/* -------------------- */

let cart = JSON.parse(sessionStorage.getItem("cart")) || [];

function getCartCount() {
    const cartItems = JSON.parse(sessionStorage.getItem("cart")) || [];
    return cartItems.reduce((total, item) => total + (item.quantity || 1), 0);
}

const cartCountSpan = document.getElementById("cartCount");
if (cartCountSpan) {
    cartCountSpan.innerText = getCartCount();
}

/* -------------------- */
/* SWITCH BOX TYPE      */
/* -------------------- */

let currentBoxName = "";
let currentBoxImage = "";

document.querySelectorAll(".box-option").forEach(option => {
    option.addEventListener("click", () => {
        // Toggle active options
        document.querySelectorAll(".box-option").forEach(opt => opt.classList.remove("active"));
        option.classList.add("active");

        // Update active box details
        currentBoxName = option.dataset.name;
        currentBoxImage = option.dataset.image;

        // Update scene backdrop
        if (mainBox) {
            mainBox.src = currentBoxImage;
            mainBox.alt = currentBoxName;
        }

        if (placeholderMsg) {
            placeholderMsg.style.opacity = "0";
            setTimeout(() => {
                if (placeholderMsg) placeholderMsg.style.display = "none";
            }, 300);
        }
    });
});

/* -------------------- */
/* DESSERT SPAWNING     */
/* -------------------- */

document.querySelectorAll(".dessertSpawner").forEach(spawner => {
    spawner.addEventListener("click", () => {
        const dessert = document.createElement("img");
        dessert.src = spawner.dataset.src;
        dessert.className = "draggableAccessory draggableTreat";
        dessert.style.position = "absolute";
        dessert.style.width = "70px";
        dessert.style.height = "70px";
        dessert.style.left = "265px"; // Centered inside the 600px scene (600/2 - 70/2)
        dessert.style.top = "265px";  // Centered inside the 600px scene
        dessert.style.zIndex = highestZ++;
        dessert.draggable = false;
        
        // Initial transform states
        dessert.dataset.rotation = "0";
        dessert.dataset.flip = "1";

        customScene.appendChild(dessert);

        // Auto select newly spawned dessert
        selectElement(dessert);
        
        if (placeholderMsg) {
            placeholderMsg.style.opacity = "0";
            setTimeout(() => {
                if (placeholderMsg) placeholderMsg.style.display = "none";
            }, 300);
        }
    });
});

/* -------------------- */
/* SELECTION SYSTEM     */
/* -------------------- */

function updateSelectionUI() {
    const deleteBtn = document.getElementById('itemDeleteBtn');
    const rotateBtn = document.getElementById('itemRotateBtn');
    const resizeBtn = document.getElementById('itemResizeBtn');
    
    if (!selectedItem) {
        if (deleteBtn) deleteBtn.style.display = 'none';
        if (rotateBtn) rotateBtn.style.display = 'none';
        if (resizeBtn) resizeBtn.style.display = 'none';
        return;
    }
    
    const l = parseFloat(selectedItem.style.left) || 0;
    const t = parseFloat(selectedItem.style.top)  || 0;
    const w = selectedItem.offsetWidth;
    const h = selectedItem.offsetHeight;
    
    const rotDeg = parseFloat(selectedItem.dataset.rotation) || 0;
    const rotRad = rotDeg * Math.PI / 180;
    
    const cx = l + w / 2;
    const cy = t + h / 2;
    
    function getRotatedPos(dx, dy) {
        const rx = cx + dx * Math.cos(rotRad) - dy * Math.sin(rotRad);
        const ry = cy + dx * Math.sin(rotRad) + dy * Math.cos(rotRad);
        return { x: rx, y: ry };
    }
    
    if (deleteBtn) {
        const pos = getRotatedPos(w/2, -h/2);
        deleteBtn.style.left = (pos.x - 12) + 'px';
        deleteBtn.style.top  = (pos.y - 12) + 'px';
        deleteBtn.style.display = 'flex';
    }
    
    if (rotateBtn) {
        const pos = getRotatedPos(-w/2, h/2);
        rotateBtn.style.left = (pos.x - 12) + 'px';
        rotateBtn.style.top  = (pos.y - 12) + 'px';
        rotateBtn.style.display = 'flex';
    }
    
    if (resizeBtn) {
        const pos = getRotatedPos(w/2, h/2);
        resizeBtn.style.left = (pos.x - 12) + 'px';
        resizeBtn.style.top  = (pos.y - 12) + 'px';
        resizeBtn.style.display = 'flex';
    }
}

function selectElement(el) {
    selectedItem = el;
    document.querySelectorAll(".draggableBouquetItem, .draggablePlushieItem, .draggableTreatsItem, .draggableAccessory").forEach(item => {
        item.classList.remove("selectedItem", "selectedAccessory");
        item.style.outline = "none";
    });
    
    if (el) {
        el.classList.add("selectedItem");
        if(el.classList.contains("draggableAccessory")) el.classList.add("selectedAccessory");
        el.style.outline = "2px dashed #B71A3D";
        updateSelectionUI();
    } else {
        updateSelectionUI();
        customScene.style.cursor = '';
    }
}

// Fallback for selectAccessory inside customize.html
function selectAccessory(el) {
    selectElement(el);
}

let isResizing = false;
let isRotating = false;
let resizeStartX = 0, resizeStartY = 0;
let resizeStartW = 0, resizeStartH = 0;
let resizeStartLeft = 0, resizeStartTop = 0;
let rotateStartAngle = 0;
let rotateInitialElementAngle = 0;

document.addEventListener("mousedown", (e) => {
    if (e.target.closest('#itemDeleteBtn')) return;
    
    if (e.target.closest('#itemResizeBtn') && selectedItem) {
        e.stopPropagation(); e.preventDefault();
        isResizing = true;
        resizeStartX = e.clientX;
        resizeStartY = e.clientY;
        resizeStartW = selectedItem.offsetWidth;
        resizeStartH = selectedItem.offsetHeight;
        resizeStartLeft = parseFloat(selectedItem.style.left) || 0;
        resizeStartTop = parseFloat(selectedItem.style.top) || 0;
        return;
    }
    
    if (e.target.closest('#itemRotateBtn') && selectedItem) {
        e.stopPropagation(); e.preventDefault();
        isRotating = true;
        
        const rect = selectedItem.getBoundingClientRect();
        // Calculate center of actual element on screen
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        rotateStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        rotateInitialElementAngle = parseFloat(selectedItem.dataset.rotation) || 0;
        return;
    }

    const item = e.target.closest(".draggableBouquetItem, .draggablePlushieItem, .draggableTreatsItem, .draggableAccessory");
    if (item && customScene.contains(item)) {
        if (!selectedItem || selectedItem !== item) {
            selectElement(item);
        }

        selected = item;
        const rect = item.getBoundingClientRect();
        
        // Use center of item for dragging so rotation doesn't offset it weirdly?
        // Let's stick to standard dragOffsetX
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        
        if (typeof highestZ !== 'undefined') {
            item.style.zIndex = highestZ++;
        } else {
            // if highestZ is not defined, we can just use 100
            item.style.zIndex = parseInt(item.style.zIndex || "100") + 1;
        }
        e.preventDefault();
        customScene.style.cursor = 'grabbing';
    }
});

document.addEventListener("mousemove", (e) => {
    const sceneW = customScene.clientWidth;
    const sceneH = customScene.clientHeight;

    if (isResizing && selectedItem) {
        const dx = e.clientX - resizeStartX;
        
        let maxW = Math.min(sceneW - resizeStartLeft, sceneH - resizeStartTop);
        let newW = resizeStartW + dx;
        newW = Math.max(30, Math.min(newW, maxW));
        
        selectedItem.style.width = newW + "px";
        selectedItem.style.height = (newW * (resizeStartH / resizeStartW)) + "px";
        updateSelectionUI();
        return;
    }
    
    if (isRotating && selectedItem) {
        const rect = selectedItem.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const currentAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        
        let angleDiff = currentAngle - rotateStartAngle;
        let newAngle = rotateInitialElementAngle + angleDiff;
        
        selectedItem.dataset.rotation = newAngle;
        let flipStr = selectedItem.dataset.flip === "-1" ? "scaleX(-1) " : "";
        selectedItem.style.transform = flipStr + "rotate(" + newAngle + "deg)";
        updateSelectionUI();
        return;
    }

    if (!selected) return;

    const rect = customScene.getBoundingClientRect();
    let left = e.clientX - rect.left - dragOffsetX;
    let top = e.clientY - rect.top - dragOffsetY;

    // Bounded within canvas bounds
    left = Math.max(0, Math.min(left, sceneW - selected.offsetWidth));
    top = Math.max(0, Math.min(top, sceneH - selected.offsetHeight));

    selected.style.left = left + "px";
    selected.style.top = top + "px";
    updateSelectionUI();
});

document.addEventListener("mouseup", () => {
    selected = null;
    isResizing = false;
    isRotating = false;
    if (selectedItem) {
        customScene.style.cursor = 'grab';
    } else {
        customScene.style.cursor = '';
    }
});

customScene.addEventListener("mousedown", (e) => {
    // Make sure we only deselect if clicking customScene directly or the mainPlushie or placeholder
    if (e.target === customScene || e.target.id === 'mainPlushie' || e.target.closest('.canvas-placeholder')) {
        selectElement(null);
    }
});



    document.getElementById("itemDeleteBtn").addEventListener("click", (e) => {
    e.stopPropagation(); // prevent selecting the background
    if (selectedItem) {
        selectedItem.remove();
        selectElement(null); // clears UI
        
        if (document.querySelectorAll(".draggableTreat").length === 0 && !currentBoxImage) {
            if (placeholderMsg) {
                placeholderMsg.style.display = "flex";
                setTimeout(() => {
                    if (placeholderMsg) placeholderMsg.style.opacity = "1";
                }, 50);
            }
        }
    }
});


/* -------------------- */
/* SERIALIZE & SAVE     */
/* -------------------- */

document.getElementById("saveCustomization").addEventListener("click", () => {
    if (!currentBoxImage) {
        alert("Please select a box first!");
        return;
    }
    const accessories = [];
    
    document.querySelectorAll("#customScene .draggableTreat").forEach(item => {
        const realLeft = parseFloat(item.style.left) || 0;
        const realTop = parseFloat(item.style.top) || 0;
        const sceneW = customScene.clientWidth;
        const sceneH = customScene.clientHeight;
        const virtualLeft = realLeft - (sceneW / 2) + 350;
        const virtualTop = realTop - (sceneH / 2) + 350;
        accessories.push({
            image: "assets/treats/" + item.src.split("/").pop(),
            left: virtualLeft + "px",
            top: virtualTop + "px",
            width: item.style.width,
            rotation: item.dataset.rotation || "0",
            flip: item.dataset.flip || "1"
        });
    });

    const customizedBox = {
        customId: "box_" + Date.now(),
        name: currentBoxName,
        image: currentBoxImage,
        quantity: 1,
        accessories: accessories
    };

    let cart = JSON.parse(sessionStorage.getItem("cart")) || [];
    cart.push(customizedBox);
    sessionStorage.setItem("cart", JSON.stringify(cart));

    // Update cart count
    const cartCountSpan = document.getElementById("cartCount");
    if (cartCountSpan) cartCountSpan.innerText = getCartCount();

    // Toast
    const toast = document.getElementById("toast");
    toast.innerText = "Added To Cart";
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 2000);

    // Reset canvas
    document.querySelectorAll("#customScene .draggableTreat").forEach(el => el.remove());
    selectElement(null);
    mainBox.src = "";
    mainBox.alt = "";
    currentBoxImage = "";
    currentBoxName = "";
    document.querySelectorAll(".box-option").forEach(opt => opt.classList.remove("active"));

    // Show placeholder again
    if (placeholderMsg) {
        placeholderMsg.style.display = "flex";
        setTimeout(() => { placeholderMsg.style.opacity = "1"; }, 50);
    }
});

/* Redirect to checkout cart */
const cartButton = document.getElementById("cartButton");
if (cartButton) {
    cartButton.addEventListener("click", () => {
        window.location = "checkout.html";
    });
}

</script>

    });
</script>
