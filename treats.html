<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Shop</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

/* --- THEME VARIABLES --- */
:root,
[data-theme="light"] {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #c2185b;
    --heading-color: #ff4fa2;
    --btn-bg: #ffffff;
    --btn-text: #ff4fa2;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(135deg, #1a0010 0%, #3d0030 40%, #5c0045 100%);
    --body-bg: #1a0010;
    --panel-bg: #2e001f;
    --popup-bg: #2e001f;
    --receipt-bg: #1a0010;
    --card-bg: #2e001f;
    --text-color: #ff80c0;
    --heading-color: #ff4fa2;
    --btn-bg: #3d0030;
    --btn-text: #ff80c0;
    --cart-btn-bg: #c2185b;
    --cart-btn-shadow: #ff1493;
    --glow-color: #ff1493;
    --glow-soft: #c2185b;
    --toast-bg: #c2185b;
    --receipt-shadow: #c2185b;
    --shelf-overlay: rgba(26,0,16,0.15);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}

/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body {
    color: var(--text-color);
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

[data-theme="dark"] body {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

body.receiptPage,
body.giftPage {
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--receipt-bg);
}

[data-theme="dark"] body.receiptPage,
[data-theme="dark"] body.giftPage {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

/* --- THEME SWITCH WRAPPER --- */
#themeToggleWrapper {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    background: transparent;
    padding: 6px;
    border-radius: 30px;
}

[data-theme="dark"] #themeToggleWrapper {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    background: transparent;
    padding: 6px;
    border-radius: 30px;
}

/* --- THEME SWITCH STYLES --- */
.theme-switch {
    --toggle-size: 11px;

/* --- Smaller size --- */
--container-width: 5.625em;
    --container-height: 2.5em;
    --container-radius: 6.25em;
    --container-light-bg: #ff4fa2;

/* --- Changed color to pop more --- */
--container-night-bg: #800040;
    --circle-container-diameter: 3.375em;
    --sun-moon-diameter: 2.125em;
    --sun-bg: #FFA500;
    --moon-bg: #E0E4EB;
    --spot-color: #A1A8B8;
    --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
    --stars-color: #fff;
    --clouds-color: #F3FDFF;
    --back-clouds-color: #AACADF;
    --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
    --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
}

.theme-switch,
.theme-switch *,
.theme-switch *::before,
.theme-switch *::after {
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-size: var(--toggle-size);
}

.theme-switch__container {
    width: var(--container-width);
    height: var(--container-height);
    background-color: var(--container-light-bg);
    border-radius: var(--container-radius);
    overflow: hidden;
    cursor: pointer;
    box-shadow: none;

/* --- Make it flat, not floating --- */
transition: var(--transition);
    position: relative;
}

.theme-switch__container::before {
    content: "";
    position: absolute;
    z-index: 1;
    inset: 0;
    border-radius: var(--container-radius);
}

.theme-switch__checkbox {
    display: none;
}

.theme-switch__circle-container {
    width: var(--circle-container-diameter);
    height: var(--circle-container-diameter);
    background-color: rgba(255, 255, 255, 0.2);
    position: absolute;
    left: var(--circle-container-offset);
    top: var(--circle-container-offset);
    border-radius: var(--container-radius);
    display: flex;
    transition: var(--circle-transition);
    pointer-events: none;
}

.theme-switch__sun-moon-container {
    pointer-events: auto;
    position: relative;
    z-index: 2;
    width: var(--sun-moon-diameter);
    height: var(--sun-moon-diameter);
    margin: auto;
    border-radius: var(--container-radius);
    background-color: var(--sun-bg);
    overflow: hidden;
    transition: var(--transition);
}

.theme-switch__moon {
    transform: translateX(100%);
    width: 100%;
    height: 100%;
    background-color: var(--moon-bg);
    border-radius: inherit;
    transition: var(--transition);
    position: relative;
}

.theme-switch__spot {
    position: absolute;
    top: 0.75em;
    left: 0.312em;
    width: 0.75em;
    height: 0.75em;
    border-radius: var(--container-radius);
    background-color: var(--spot-color);
}

.theme-switch__spot:nth-of-type(2) {
    width: 0.375em;
    height: 0.375em;
    top: 0.937em;
    left: 1.375em;
}

.theme-switch__spot:nth-last-of-type(3) {
    width: 0.25em;
    height: 0.25em;
    top: 0.312em;
    left: 0.812em;
}

.theme-switch__clouds {
    width: 1.25em;
    height: 1.25em;
    background-color: var(--clouds-color);
    border-radius: var(--container-radius);
    position: absolute;
    bottom: -0.625em;
    left: 0.312em;
    box-shadow:
        0.937em 0.312em var(--clouds-color),
        -0.312em -0.312em var(--back-clouds-color),
        1.437em 0.375em var(--clouds-color),
        0.5em -0.125em var(--back-clouds-color),
        2.187em 0 var(--clouds-color),
        1.25em -0.062em var(--back-clouds-color),
        2.937em 0.312em var(--clouds-color),
        2em -0.312em var(--back-clouds-color),
        3.625em -0.062em var(--clouds-color),
        2.625em 0em var(--back-clouds-color),
        4.5em -0.312em var(--clouds-color),
        3.375em -0.437em var(--back-clouds-color),
        4.625em -1.75em 0 0.437em var(--clouds-color),
        4em -0.625em var(--back-clouds-color),
        4.125em -2.125em 0 0.437em var(--back-clouds-color);
    transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
}

.theme-switch__stars-container {
    position: absolute;
    color: var(--stars-color);
    top: -100%;
    left: 0.312em;
    width: 2.75em;
    height: auto;
    transition: var(--transition);
}

/* --- -- Switch Actions -- --- */
.theme-switch__checkbox:checked + .theme-switch__container {
    background-color: var(--container-night-bg);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em);
}

.theme-switch__circle-container:hover {
    left: calc(var(--circle-container-offset) + 0.187em);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon {
    transform: translate(0);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds {
    bottom: -4.062em;
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container {
    top: 50%;
    transform: translateY(-50%);
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.05);
    text-align: center;
    border: 2px solid var(--glow-soft);
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- CHECKOUT BUTTON --- */


/* --- TOAST --- */
#toast {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--toast-bg);
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: none;
    z-index: 9999;
    transition: background 0.5s ease;
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: var(--font-heading);
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 42px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}

[data-theme="dark"] .checkoutTitle, [data-theme="dark"] .customizeTitle {
    text-shadow: none;
}

/* --- NAVBAR --- */
#storeNavbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 30px;
    z-index: 999;
    border-bottom: 3px solid #ffb3d9;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
    padding: 10px 30px;
    box-sizing: border-box;
}

[data-theme="dark"] #storeNavbar {
    background: rgba(46, 0, 31, 0.95);
    border-bottom-color: #5c0045;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.navLink {
    font-size: 20px;
    font-family: var(--font-nav);
    font-weight: 500;
    color: var(--text-color);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
}

.navLink:hover {
    color: var(--heading-color);
    transform: translateY(-2px);
    opacity: 0.9;
}

.navLink.active {
    color: var(--heading-color);
    font-weight: 800;
    border-bottom: 3px solid var(--heading-color);
    padding-bottom: 2px;
}

[data-theme="dark"] .navLink.active {
    background: transparent;
    color: var(--heading-color);
    box-shadow: none;
}

/* --- Header Text styling --- */
.storeHeader {
    text-align: center;
    margin-top: 100px;
    margin-bottom: 20px;
    color: var(--heading-color);
    font-family: var(--font-heading);
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}

[data-theme="dark"] .storeHeader,
[data-theme="dark"] .checkoutTitle,
[data-theme="dark"] .customizeTitle,
[data-theme="dark"] .giftTitle {
    color: #ffb6d9 !important;
    text-shadow: none;
}

/* --- BACK TO SHOP BTN --- */


/* --- Pulsing red dot for active recording --- */
.recording-active {
    animation: recordPulse 1s infinite alternate;
    color: #e74c3c !important;
}

@keyframes recordPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* --- Plushie speaking / audio wave pulse animation --- */
.plushie-speaking {
    animation: audioShake 0.15s infinite alternate;
    box-shadow: none !important;
    border-radius: 50%;
}

@keyframes audioShake {
    0% { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(2deg) scale(1.02); }
}

/* --- TREATS PAGE LAYOUT --- */
.dessert-cart-container {
    width: 340px;
    background: var(--popup-bg);
    border: 3px solid #ffb6d9;
    border-radius: 35px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
    transition: background 0.5s ease, border-color 0.5s ease;
}

[data-theme="dark"] .dessert-cart-container {
    background-color: rgba(46, 0, 31, 0.6);
    border-color: #5c0045;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

.dessert-spawner-card h3 {
    text-align: center;
    color: var(--heading-color);
    margin-bottom: 18px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 18px;
}

.spawner-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    justify-items: center;
}

.dessertSpawner {
    width: 60px;
    height: 60px;
    object-fit: contain;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.25s ease;
}

.dessertSpawner:hover {
    transform: scale(1.2) rotate(8deg);
    filter: drop-shadow(0 8px 12px rgba(255, 105, 180, 0.45));
}

/* --- Big chosen box canvas - a tad bit smaller (600x600px) --- */
.treats-layout #customScene {
    width: 600px;
    height: 600px;
    background: white;
    border-radius: 40px;
    box-shadow: none;
    position: relative;
    overflow: hidden;
}

#mainBox {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

#customPanel.treats-controls-panel {
    width: 280px !important;
    background: var(--popup-bg);
    border: 3px solid #ffb6d9;
    border-radius: 35px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
    display: flex;
    flex-direction: column;
}

[data-theme="dark"] #customPanel.treats-controls-panel {
    background-color: rgba(46, 0, 31, 0.6);
    border-color: #5c0045;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

#customPanel.treats-controls-panel h2 {
    text-align: center;
    color: var(--heading-color);
    margin-bottom: 15px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 20px;
}

/* --- Bubbly option elements inside selection panel --- */
.box-option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    background: var(--btn-bg);
    border: 2px solid #ffb6d9;
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    width: 100%;
}

.box-option:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: hotpink;
    box-shadow: 0 5px 12px rgba(255, 105, 180, 0.2);
}

.box-option.active {
    background: #ffb6d9;
    border-color: hotpink;
    box-shadow: none;
}

.box-option img {
    width: 45px;
    height: 45px;
    object-fit: contain;
}

.box-option span {
    font-size: 16px;
    font-family: var(--font-ui);
    font-weight: 600;
    color: var(--text-color);
}

.box-option.active span {
    color: #5a0035;
}

[data-theme="dark"] .box-option {
    border-color: #5c0045;
}

[data-theme="dark"] .box-option.active {
    background: #c2185b;
    border-color: #ff80c0;
}

[data-theme="dark"] .box-option.active span {
    color: white;
}

/* --- Customization Buttons Placed Side-by-Side --- */
.buttons-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 10px;
}

.buttons-row button {
    flex: 1;
    margin: 0 !important;
    padding: 12px 6px !important;
    font-size: 14px !important;
    border-radius: 25px !important;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #ffd6ef;
    box-shadow: none;
    color: #5a0035;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
}

.buttons-row button:hover {
    transform: scale(1.05);
    box-shadow: none;
}

#saveCustomization {
    background: #ffb6d9 !important;
    color: #5a0035 !important;
    box-shadow: 0 0 10px pink !important;
}

#saveCustomization:hover {
    box-shadow: none !important;
}

/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;
    object-fit: contain;
    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root, [data-theme="light"] {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}

[data-theme="dark"] {
    --bg-pink: #880e4f;
    --hover-glow: rgba(136, 14, 79, 0.6);
    --hover-glow-soft: rgba(194, 24, 91, 0.8);
    --btn-text-color: #ffffff;
}

.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);
}



@keyframes gradient-angle {
  to {

/* --- CAROUSEL STYLES (NO-SCROLL LAYOUT) --- */
body.no-scroll {
    overflow-x: hidden !important;
    overflow-y: auto !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

body.no-scroll #mainContainer {
    flex: 1;
    min-height: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

body.no-scroll .storeHeader {
    margin-top: 80px;
    margin-bottom: 0px;
    flex-shrink: 0;
}

.plushies-layout, .flowers-layout {
    width: 100%;
}

.carousel-wrapper {
    position: relative;
    width: 90%;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 60px;
    height: auto;
}

.carousel-track-container {
    overflow: hidden;
    width: 100%;
    padding: 15px 0;

/* --- extra padding for box shadows --- */
}

.carousel-track {
    display: flex;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.carousel-slide {
    flex: 0 0 calc(100% / 3);

/* --- Show 3 items --- */
padding: 0 15px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
}

@media (max-width: 1024px) {
    .carousel-slide {
        flex: 0 0 50%;

/* --- Show 2 items --- */
}
}

@media (max-width: 768px) {
    .carousel-slide {
        flex: 0 0 100%;

/* --- Show 1 item --- */
}
    .carousel-wrapper {
        padding: 0 40px;
    }
}

.carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #fafafa;
    border: 1px solid #e4e4e7;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    color: #52525b;
    cursor: pointer;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    transition: all 0.3s ease;
}

[data-theme="dark"] .carousel-btn {
    background: #09090b;
    border-color: #27272a;
    color: #f4f4f5;
}

.carousel-btn:hover:not(:disabled) {
    background: #f4f4f5;
    color: #18181b;
}

[data-theme="dark"] .carousel-btn:hover:not(:disabled) {
    background: #27272a;
    color: #ffffff;
}

.carousel-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.carousel-prev {
    left: 0;
}

.carousel-next {
    right: 0;
}

.carousel-slide .flowerCard {
    width: 100%;

/* -------------------- */
/* THEME TOGGLE         */
/* -------------------- */

// Apply saved theme immediately to <html> to prevent flash
(function () {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();

// Wire up the checkbox once DOM is ready
document.addEventListener('DOMContentLoaded', function () {
    const checkbox = document.getElementById('themeCheckbox');
    if (!checkbox) return;

    const saved = localStorage.getItem('theme');
    checkbox.checked = saved === 'dark';

    checkbox.addEventListener('change', function () {
        if (this.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    });
});

</script>
    <script>
const customScene = document.getElementById("customScene");
const mainBox = document.getElementById("mainBox");

let selectedItem = null;
let selected = null;
let highestZ = 10;

// Rotation and flip state trackers
let dragOffsetX = 0;
let dragOffsetY = 0;

/* -------------------- */
/* LOAD CART STATE      */
/* -------------------- */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function getCartCount() {
    const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
    return cartItems.reduce((total, item) => total + (item.quantity || 1), 0);
}

const cartCountSpan = document.getElementById("cartCount");
if (cartCountSpan) {
    cartCountSpan.innerText = getCartCount();
}

/* -------------------- */
/* SWITCH BOX TYPE      */
/* -------------------- */

let currentBoxName = "Heart Treat Box";
let currentBoxImage = "assets/treats/box_heart.png";

document.querySelectorAll(".box-option").forEach(option => {
    option.addEventListener("click", () => {
        // Toggle active options
        document.querySelectorAll(".box-option").forEach(opt => opt.classList.remove("active"));
        option.classList.add("active");

        // Update active box details
        currentBoxName = option.dataset.name;
        currentBoxImage = option.dataset.image;

        // Update scene backdrop
        if (mainBox) {
            mainBox.src = currentBoxImage;
            mainBox.alt = currentBoxName;
        }
    });
});

/* -------------------- */
/* DESSERT SPAWNING     */
/* -------------------- */

document.querySelectorAll(".dessertSpawner").forEach(spawner => {
    spawner.addEventListener("click", () => {
        const dessert = document.createElement("img");
        dessert.src = spawner.dataset.src;
        dessert.className = "draggableAccessory draggableTreat";
        dessert.style.position = "absolute";
        dessert.style.width = "70px";
        dessert.style.height = "70px";
        dessert.style.left = "265px"; // Centered inside the 600px scene (600/2 - 70/2)
        dessert.style.top = "265px";  // Centered inside the 600px scene
        dessert.style.zIndex = highestZ++;
        dessert.draggable = false;
        
        // Initial transform states
        dessert.dataset.rotation = "0";
        dessert.dataset.flip = "1";

        customScene.appendChild(dessert);

        // Auto select newly spawned dessert
        selectElement(dessert);
    });
});

/* -------------------- */
/* SELECTION SYSTEM     */
/* -------------------- */

function selectElement(el) {
    selectedItem = el;
    document.querySelectorAll(".draggableAccessory").forEach(item => {
        item.classList.remove("draggableTreatSelected");
        item.style.outline = "none";
    });
    el.classList.add("draggableTreatSelected");
    el.style.outline = "3px solid hotpink";
}

document.addEventListener("mousedown", (e) => {
    const treat = e.target.closest(".draggableAccessory");
    if (treat && customScene.contains(treat)) {
        selected = treat;
        selectElement(treat);

        // Compute offsets
        const rect = treat.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        
        treat.style.zIndex = highestZ++;
        e.preventDefault();
    }
});

/* -------------------- */
/* DRAGGING MOVEMENT    */
/* -------------------- */

document.addEventListener("mousemove", (e) => {
    if (!selected) return;

    const rect = customScene.getBoundingClientRect();
    let newLeft = e.clientX - rect.left - dragOffsetX;
    let newTop = e.clientY - rect.top - dragOffsetY;

    // Bounded dragging inside actual canvas size
    const sceneW = customScene.clientWidth;
    const sceneH = customScene.clientHeight;
    newLeft = Math.max(0, Math.min(newLeft, sceneW - selected.offsetWidth));
    newTop = Math.max(0, Math.min(newTop, sceneH - selected.offsetHeight));

    selected.style.left = newLeft + "px";
    selected.style.top = newTop + "px";
});

document.addEventListener("mouseup", () => {
    selected = null;
});

// Deselect when clicking scene background
customScene.addEventListener("mousedown", (e) => {
    if (e.target === customScene || e.target === mainBox) {
        selectedItem = null;
        document.querySelectorAll(".draggableAccessory").forEach(item => {
            item.classList.remove("draggableTreatSelected");
            item.style.outline = "none";
        });
    }
});

/* -------------------- */
/* CONTROLS HANDLING    */
/* -------------------- */

// Resize Increase
document.getElementById("increaseSize").addEventListener("click", () => {
    if (!selectedItem) {
        alert("Select a dessert inside the box first!");
        return;
    }
    const currW = selectedItem.offsetWidth;
    selectedItem.style.width = (currW + 15) + "px";
    selectedItem.style.height = (currW + 15) + "px";
});

// Resize Decrease
document.getElementById("decreaseSize").addEventListener("click", () => {
    if (!selectedItem) {
        alert("Select a dessert inside the box first!");
        return;
    }
    const currW = selectedItem.offsetWidth;
    if (currW > 30) {
        selectedItem.style.width = (currW - 15) + "px";
        selectedItem.style.height = (currW - 15) + "px";
    }
});

// Delete Selected
document.getElementById("deleteItem").addEventListener("click", () => {
    if (selectedItem) {
        selectedItem.remove();
        selectedItem = null;
    }
});

// Rotate Selected
const rotateBtn = document.getElementById("rotateTreatBtn");
if (rotateBtn) {
    rotateBtn.addEventListener("click", () => {
        if (!selectedItem) {
            alert("Select a dessert inside the box first!");
            return;
        }
        let rot = parseInt(selectedItem.dataset.rotation) || 0;
        rot = (rot + 45) % 360;
        selectedItem.dataset.rotation = rot;
        updateTreatTransform(selectedItem);
    });
}

// Flip Selected
const flipBtn = document.getElementById("flipTreatBtn");
if (flipBtn) {
    flipBtn.addEventListener("click", () => {
        if (!selectedItem) {
            alert("Select a dessert inside the box first!");
            return;
        }
        let flip = parseInt(selectedItem.dataset.flip) || 1;
        flip = flip === 1 ? -1 : 1;
        selectedItem.dataset.flip = flip;
        updateTreatTransform(selectedItem);
    });
}

function updateTreatTransform(el) {
    const rot = el.dataset.rotation || 0;
    const flip = el.dataset.flip || 1;
    el.style.transform = `rotate(${rot}deg) scaleX(${flip})`;
}

/* -------------------- */
/* SERIALIZE & SAVE     */
/* -------------------- */

document.getElementById("saveCustomization").addEventListener("click", () => {
    const accessories = [];
    
    document.querySelectorAll("#customScene .draggableTreat").forEach(item => {
        const realLeft = parseFloat(item.style.left) || 0;
        const realTop = parseFloat(item.style.top) || 0;
        
        // Translate real coordinates to virtual 700x700 coordinates
        const sceneW = customScene.clientWidth;
        const sceneH = customScene.clientHeight;
        const virtualLeft = realLeft - (sceneW / 2) + 350;
        const virtualTop = realTop - (sceneH / 2) + 350;

        accessories.push({
            image: "assets/treats/" + item.src.split("/").pop(), // Store relative path to assets/treats/
            left: virtualLeft + "px",
            top: virtualTop + "px",
            width: item.style.width,
            rotation: item.dataset.rotation || "0",
            flip: item.dataset.flip || "1"
        });
    });

    const customizedBox = {
        customId: "box_" + Date.now(),
        name: currentBoxName,
        image: currentBoxImage,
        quantity: 1,
        accessories: accessories
    };

    // Load existing cart items and append this new customized box
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push(customizedBox);
    localStorage.setItem("cart", JSON.stringify(cart));

    // Alert and Redirect
    alert(" Treat Box Customization Saved to Cart!");
    window.location = "checkout.html";
});

/* Redirect to checkout cart */
const cartButton = document.getElementById("cartButton");
if (cartButton) {
    cartButton.addEventListener("click", () => {
        window.location = "checkout.html";
    });
}

</script>
