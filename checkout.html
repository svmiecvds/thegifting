<html>

<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <title>The Gifting Co.</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

        /* --- THEME VARIABLES --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
            --body-bg: #fff5fb;
            --panel-bg: #ffe4f1;
            --popup-bg: #ffe4f1;
            --receipt-bg: #ffeaf5;
            --card-bg: #ffffff;
            --text-color: #B71A3D;
            --heading-color: #B71A3D;
            --btn-bg: #ffffff;
            --btn-text: #B71A3D;
            --cart-btn-bg: #ff69b4;
            --cart-btn-shadow: hotpink;
            --glow-color: hotpink;
            --glow-soft: pink;
            --font-body: 'Quicksand', sans-serif;
            --font-heading: 'Pinyon Script', cursive;
            --font-ui: 'Fredoka', sans-serif;
            --font-nav: 'Inter', sans-serif;
            --toast-bg: #ff69b4;
            --receipt-shadow: pink;
            --shelf-overlay: rgba(255, 255, 255, 0.0);
        }

        

        /* --- BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body,
        body.receiptPage,
        body.giftPage {
            color: var(--text-color);
            background-image: url('assets/bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--body-bg);
            overflow: hidden !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease, color 0.5s ease;
            font-family: var(--font-body);
            font-weight: 500;
        }

        

        /* --- THEME SWITCH WRAPPER --- */
        #themeToggleWrapper {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            align-items: center;
            background: transparent;
            padding: 6px;
            border-radius: 30px;
        }

        

        /* --- Smaller size --- */
        :root {
            --container-width: 5.625em;
            --container-height: 2.5em;
            --container-radius: 6.25em;
            --container-light-bg: #B71A3D;

            /* --- Changed color to pop more --- */
            --container-night-bg: #800040;
            --circle-container-diameter: 3.375em;
            --sun-moon-diameter: 2.125em;
            --sun-bg: #FFA500;
            --moon-bg: #E0E4EB;
            --spot-color: #A1A8B8;
            --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
            --stars-color: #fff;
            --clouds-color: #F3FDFF;
            --back-clouds-color: #AACADF;
            --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
            --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
        }

        .theme-switch,
        .theme-switch *,
        .theme-switch *::before,
        .theme-switch *::after {
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-size: var(--toggle-size);
        }

        .theme-switch__container {
            width: var(--container-width);
            height: var(--container-height);
            background-color: var(--container-light-bg);
            border-radius: var(--container-radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: none;

            /* --- Make it flat, not floating --- */
            transition: var(--transition);
            position: relative;
        }

        .theme-switch__container::before {
            content: "";
            position: absolute;
            z-index: 1;
            inset: 0;
            border-radius: var(--container-radius);
        }

        .theme-switch__checkbox {
            display: none;
        }

        .theme-switch__circle-container {
            width: var(--circle-container-diameter);
            height: var(--circle-container-diameter);
            background-color: rgba(255, 255, 255, 0.2);
            position: absolute;
            left: var(--circle-container-offset);
            top: var(--circle-container-offset);
            border-radius: var(--container-radius);
            display: flex;
            transition: var(--circle-transition);
            pointer-events: none;
        }

        .theme-switch__sun-moon-container {
            pointer-events: auto;
            position: relative;
            z-index: 2;
            width: var(--sun-moon-diameter);
            height: var(--sun-moon-diameter);
            margin: auto;
            border-radius: var(--container-radius);
            background-color: var(--sun-bg);
            overflow: hidden;
            transition: var(--transition);
        }

        .theme-switch__moon {
            transform: translateX(100%);
            width: 100%;
            height: 100%;
            background-color: var(--moon-bg);
            border-radius: inherit;
            transition: var(--transition);
            position: relative;
        }

        .theme-switch__spot {
            position: absolute;
            top: 0.75em;
            left: 0.312em;
            width: 0.75em;
            height: 0.75em;
            border-radius: var(--container-radius);
            background-color: var(--spot-color);
        }

        .theme-switch__spot:nth-of-type(2) {
            width: 0.375em;
            height: 0.375em;
            top: 0.937em;
            left: 1.375em;
        }

        .theme-switch__spot:nth-last-of-type(3) {
            width: 0.25em;
            height: 0.25em;
            top: 0.312em;
            left: 0.812em;
        }

        .theme-switch__clouds {
            width: 1.25em;
            height: 1.25em;
            background-color: var(--clouds-color);
            border-radius: var(--container-radius);
            position: absolute;
            bottom: -0.625em;
            left: 0.312em;
            box-shadow:
                0.937em 0.312em var(--clouds-color),
                -0.312em -0.312em var(--back-clouds-color),
                1.437em 0.375em var(--clouds-color),
                0.5em -0.125em var(--back-clouds-color),
                2.187em 0 var(--clouds-color),
                1.25em -0.062em var(--back-clouds-color),
                2.937em 0.312em var(--clouds-color),
                2em -0.312em var(--back-clouds-color),
                3.625em -0.062em var(--clouds-color),
                2.625em 0em var(--back-clouds-color),
                4.5em -0.312em var(--clouds-color),
                3.375em -0.437em var(--back-clouds-color),
                4.625em -1.75em 0 0.437em var(--clouds-color),
                4em -0.625em var(--back-clouds-color),
                4.125em -2.125em 0 0.437em var(--back-clouds-color);
            transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
        }

        .theme-switch__stars-container {
            position: absolute;
            color: var(--stars-color);
            top: -100%;
            left: 0.312em;
            width: 2.75em;
            height: auto;
            transition: var(--transition);
        }

        /* --- -- Switch Actions -- --- */
        .theme-switch__checkbox:checked+.theme-switch__container {
            background-color: var(--container-night-bg);
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__circle-container {
            left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__circle-container:hover {
            left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em);
        }

        .theme-switch__circle-container:hover {
            left: calc(var(--circle-container-offset) + 0.187em);
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__moon {
            transform: translate(0);
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__clouds {
            bottom: -4.062em;
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__stars-container {
            top: 50%;
            transform: translateY(-50%);
        }

        .sidebar-panel {
            display: none;
            /* --- controlled by JS --- */
            background: var(--popup-bg);
            padding: 25px;
            border-radius: 25px;
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 2px solid var(--glow-soft);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        #shelf {
            width: 1000px;
            height: 800px;
            background: url("shelf.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            margin: 0 auto;

            /* --- Shelf stays strictly center aligned --- */
        }

        .character {
            position: absolute;
            width: 170px;
            cursor: pointer;
            transition: .25s;
        }

        .character:hover {
            transform: scale(1.05);
        }

        /* --- CHECKOUT BUTTON --- */


        /* --- CHECKOUT PAGE --- */
        .receiptPage {
            background: var(--receipt-bg);
            min-height: 100vh;
            text-align: center;
            padding: 40px;
            transition: background 0.5s ease;
        }

        .receiptTitle {
            color: var(--heading-color);
            margin-bottom: 20px;
        }

        .product {
            width: 120px;
            margin: 10px;
        }

        #products {
            margin-top: 20px;
        }

        #receipt {
            width: 350px;
            margin: auto;
            margin-top: 40px;
            background: var(--card-bg);
            color: var(--text-color);
            padding: 25px;
            border-radius: 20px;
            box-shadow:
                0 0 10px var(--receipt-shadow),
                0 0 20px var(--receipt-shadow);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .showReceipt {
            transform: translateY(0) !important;
        }

        

        /* --- Highlight selected gift element --- */
        .gifSelected {
            outline: 3px solid hotpink !important;
            outline-offset: 3px;
        }

        /* --- Gift text element --- */
        .giftText {
            min-width: 80px;
            font-size: 22px;
            color: var(--heading-color);
            user-select: none;
            cursor: move;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* --- CUSTOM ALIGNMENTS --- */
        .checkoutTitle, .customizeTitle {
            text-align: center !important;
            font-family: var(--font-heading);
            color: var(--heading-color);
            margin-top: 100px;
            margin-bottom: 25px;
            font-size: 50px;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
            font-weight: bold;
}

        

        /* --- NAVBAR --- */
        #storeNavbar {
    background: url(\'assets/kisses-bg.png\') center/cover no-repeat !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 228, 241, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            padding: 0 40px;
            gap: 30px;
            z-index: 999;
            border-bottom: 3px solid #ffb3d9;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
            padding: 10px 30px;
            box-sizing: border-box;
        }

        

        .navLink {
            font-size: 20px;
            font-family: var(--font-nav);
            font-weight: 500;
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .navLink:hover {
            color: var(--heading-color);
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .navLink.active {
            color: var(--heading-color);
            font-weight: 800;
            border-bottom: 3px solid var(--heading-color);
            padding-bottom: 2px;
        }

        

        /* --- Header Text styling --- */
        .storeHeader {
            text-align: center;
            margin-top: 100px;
            margin-bottom: 20px;
            color: var(--heading-color);
            font-family: 'Pinyon Script', cursive;
            font-size: 56px;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
            font-weight: bold;
}

        

        /* --- BACK TO SHOP BTN --- */


        /* --- Pulsing red dot for active recording --- */
        .recording-active {
            animation: recordPulse 1s infinite alternate;
            color: #e74c3c !important;
        }

        @keyframes recordPulse {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }

        /* --- Plushie speaking / audio wave pulse animation --- */
        .plushie-speaking {
            animation: audioShake 0.15s infinite alternate;
            box-shadow: none !important;
            border-radius: 50%;
        }

        @keyframes audioShake {
            0% {
                transform: rotate(-2deg) scale(1.02);
            }

            100% {
                transform: rotate(2deg) scale(1.02);
            }
        }

        /* --- Big chosen box canvas - a tad bit smaller (600x600px) --- */
        .treats-layout #customScene {
            width: 600px;
            height: 600px;
            background: white;
            border-radius: 40px;
            box-shadow: none;
            position: relative;
            overflow: hidden;
        }

        #customPanel.treats-controls-panel {
            width: 280px !important;
            background: var(--popup-bg);
            border: 3px solid #ffb6d9;
            border-radius: 35px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
            display: flex;
            flex-direction: column;
        }

        

        #customPanel.treats-controls-panel h2 {
            text-align: center;
            color: var(--heading-color);
            margin-bottom: 15px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 20px;
        }

        /* --- Bubbly option elements inside selection panel --- */
        .box-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            background: var(--btn-bg);
            border: 2px solid #ffb6d9;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
        }

        .box-option:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: hotpink;
            box-shadow: 0 5px 12px rgba(255, 105, 180, 0.2);
        }

        .box-option.active {
            background: #ffb6d9;
            border-color: hotpink;
            box-shadow: none;
        }

        .box-option img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        .box-option span {
            font-size: 16px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            color: var(--text-color);
        }

        .box-option.active span {
            color: #5a0035;
        }

        

        

        

        /* --- Customization Buttons Placed Side-by-Side --- */
        .buttons-row {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        .buttons-row button {
            flex: 1;
            margin: 0 !important;
            padding: 12px 6px !important;
            font-size: 14px !important;
            border-radius: 25px !important;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: #ffd6ef;
            box-shadow: none;
            color: #5a0035;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
        }

        .buttons-row button:hover {
            transform: scale(1.05);
            box-shadow: none;
        }

        #saveCustomization {
            background: #ffb6d9 !important;
            color: #5a0035 !important;
            box-shadow: 0 0 10px pink !important;
        }

        #saveCustomization:hover {
            box-shadow: none !important;
        }

        /* --- Spawned Draggable Treats --- */
        .draggableTreat {
            position: absolute;
            width: 70px;
            height: 70px;
            object-fit: contain;
            cursor: move;
            z-index: 10;
            transition: transform 0.1s ease;
        }

        .draggableTreatSelected {
            outline: 3px solid hotpink !important;
            outline-offset: 3px;
        }

        /* --- PEARL STARDUST BUTTON DESIGN --- */
        :root {
            --bg-pink: #ffb6d9;
            --hover-glow: rgba(255, 182, 193, 0.6);
            --hover-glow-soft: rgba(255, 105, 180, 0.8);
            --btn-text-color: #5a0035;
        }

        

        .shiny-cta {
            outline: none;
            cursor: pointer;
            border: 0;
            position: relative;
            border-radius: 100px;
            background-color: var(--bg-pink);
            transition: all 0.2s ease;
            box-shadow:
                inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
                inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
                inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
                0 10px 15px -3px rgba(255, 105, 180, 0.3),
                0 4px 6px -2px rgba(255, 105, 180, 0.05);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 10px 24px;
        }

        .shiny-cta::before {
            content: "";
            position: absolute;
            left: -15%;
            right: -15%;
            bottom: 25%;
            top: -100%;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            z-index: 1;
            pointer-events: none;
        }

        .shiny-cta::after {
            content: "";
            position: absolute;
            left: 6%;
            right: 6%;
            top: 12%;
            bottom: 40%;
            border-radius: 22px 22px 0 0;
            box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.3) 0%,
                    rgba(255, 255, 255, 0) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transition: all 0.3s ease;
            z-index: 1;
            pointer-events: none;
        }

        .shiny-cta span {
            position: relative;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            color: var(--btn-text-color);
            transition: all 0.2s ease;
            transform: translateY(2%);
        }

        .shiny-cta > span::before {
            content: "✧";
            transition: all 0.2s ease;
        }

        .shiny-cta:hover > span::before {
            content: "✦";
        }

        .shiny-cta:hover {
            box-shadow:
                inset 0 0.3rem 0.5rem var(--hover-glow),
                inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
                0 12px 20px rgba(255, 105, 180, 0.4),
                0 4px 8px rgba(255, 105, 180, 0.1);
        }

        .shiny-cta:hover::before {
            transform: translateY(-5%);
        }

        .shiny-cta:hover::after {
            opacity: 0.4;
            transform: translateY(5%);
        }

        .shiny-cta:hover span {
            transform: translateY(-4%);
        }

        .shiny-cta:active {
            transform: translateY(2px);
            box-shadow:
                inset 0 0.3rem 0.5rem var(--hover-glow),
                inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
                0 6px 10px rgba(255, 105, 180, 0.2);
        }

        .checkoutButtons .shiny-cta {

        /* --- NAV BRAND CENTERING --- */
        .navBrand {

            left: 50%;

    <script>
        /* -------------------- */
        /* THEME TOGGLE         */
        /* -------------------- */

        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();

        
    </script>
    <script>
        const orderList = document.getElementById("orderList");
        const giftButton = document.getElementById("giftButton");

        /* LOAD CURRENT ITEMS   */
        let allItems = JSON.parse(sessionStorage.getItem("cart")) || [];

        /* RENDER CART */
        function renderCart() {
            orderList.innerHTML = "";

            if (allItems.length === 0) {
                orderList.innerHTML = "<p style='text-align:center;'>No items added yet.</p>";
                giftButton.style.display = "none";
                return;
            }

            giftButton.style.display = "inline-flex";

            const categories = {
                "Plushies": [],
                "Flowers": [],
                "Treats": []
            };

            allItems.forEach((item, originalIndex) => {
                // Tag it with its original index so we can remove it accurately
                const categorizedItem = { ...item, originalIndex };

                if ((item.image && item.image.includes("flowers/")) || (item.customId && item.customId.startsWith("bouquet_"))) {
                    categories["Flowers"].push(categorizedItem);
                } else if (item.image && item.image.includes("plushies/")) {
                    categories["Plushies"].push(categorizedItem);
                } else {
                    categories["Treats"].push(categorizedItem);
                }
            });

            for (const [catName, items] of Object.entries(categories)) {
                if (items.length > 0) {
                    const heading = document.createElement("h3");
                    heading.className = "category-heading";
                    heading.innerText = catName;
                    orderList.appendChild(heading);

                    items.forEach((item) => {
                        const row = document.createElement("div");
                        row.className = "orderRow";
                        row.innerHTML = `
                    <span>${(item.name && item.name !== 'undefined') ? item.name : 'Flower'}</span>
                    <div class="cartQtyControl">
                        <button class="qtyMinusBtn" data-index="${item.originalIndex}">-</button>
                        <span>${item.quantity || 1}</span>
                        <button class="qtyPlusBtn" data-index="${item.originalIndex}">+</button>
                    </div>
                `;
                        orderList.appendChild(row);
                    });
                }
            }

            /* QTY BUTTONS */
            document.querySelectorAll(".qtyMinusBtn").forEach(button => {
                button.addEventListener("click", () => {
                    const index = parseInt(button.dataset.index);
                    if (allItems[index].quantity > 1) {
                        allItems[index].quantity--;
                    } else {
                        allItems.splice(index, 1);
                    }
                    sessionStorage.setItem("cart", JSON.stringify(allItems));
                    renderCart();
                });
            });

            document.querySelectorAll(".qtyPlusBtn").forEach(button => {
                button.addEventListener("click", () => {
                    const index = parseInt(button.dataset.index);
                    allItems[index].quantity = (allItems[index].quantity || 1) + 1;
                    sessionStorage.setItem("cart", JSON.stringify(allItems));
                    renderCart();
                });
            });
        }

        renderCart();

        giftButton.addEventListener("click", () => {
            sessionStorage.setItem("giftItems", JSON.stringify(allItems));
            window.location = "gift.html";
        });
    </script>
