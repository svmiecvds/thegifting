@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

/* --- THEME VARIABLES --- */
:root {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #c2185b;
    --heading-color: #ff4fa2;
    --btn-bg: #ffffff;
    --btn-text: #ff4fa2;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}



/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body {
    color: var(--text-color);
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}



body.receiptPage,
body.giftPage {
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--receipt-bg);
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- CHECKOUT BUTTON --- */


/* --- QUANTITY POPUP --- */
#quantityPopup h2 {
    color: var(--heading-color);
    margin-bottom: 15px;
    font-size: 20px;
}

.quantitySelector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
}

.quantitySelector button {
    width: 45px;
    height: 45px;
    border: none;
    border-radius: 50%;
    background: var(--btn-bg);
    color: var(--btn-text);
    cursor: pointer;
    font-size: 22px;
    font-family: var(--font-ui);
    transition: background 0.5s ease, color 0.5s ease;
}

#quantityValue {
    font-size: 26px;
    color: var(--heading-color);
    font-weight: bold;
}

#addToCartBtn {
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-size: 15px;
    width: 100%;
    font-family: var(--font-ui);
    transition: transform .25s, background 0.5s ease, color 0.5s ease;
}

#addToCartBtn:hover {
    transform: scale(1.03);
}

/* --- TOAST --- */
#toast {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--toast-bg);
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: none;
    z-index: 9999;
    transition: background 0.5s ease;
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: var(--font-heading);
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 42px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}



/* --- NAVBAR --- */
#storeNavbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 30px;
    z-index: 999;
    border-bottom: 3px solid #ffb3d9;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
    padding: 10px 30px;
    box-sizing: border-box;
}



.navLink {
    font-size: 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--text-color);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
}

.navLink:hover {
    color: var(--heading-color);
    transform: translateY(-2px);
    opacity: 0.9;
}

.navLink.active {
    color: var(--heading-color);
    font-weight: 800;
    border-bottom: 3px solid var(--heading-color);
    padding-bottom: 2px;
}



/* --- Header Text styling --- */
.storeHeader {
    text-align: center;
    margin-top: 100px;
    margin-bottom: 20px;
    color: var(--heading-color);
    font-family: var(--font-heading);
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}



/* --- CARD LAYOUT SYSTEM --- */
.flowers-layout, .plushies-layout {
    display: flex;
    flex-direction: column;
    gap: 40px;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    align-items: center;
}

.flowersRowTop, .flowersRowBottom {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
    width: 100%;
}

.flowerCard {
    background: var(--card-bg);
    border-radius: 30px;
    padding: 25px;
    width: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    position: relative;
}



.flowerCard:hover {
    transform: translateY(-8px) scale(1.03);
}

.flowerImage {
    width: 180px;
    height: 180px;
    object-fit: contain;
    margin-bottom: 15px;
    transition: transform 0.5s ease;
}

.flowerCard:hover .flowerImage {
    transform: rotate(5deg) scale(1.05);
}

.flowerName {
    font-size: 24px;
    color: var(--heading-color);
    margin-bottom: 15px;
    font-family: var(--font-heading);
    text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
}



.flowerSelector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
    background: rgba(255, 182, 193, 0.15);
    padding: 6px 16px;
    border-radius: 50px;
    border: 2px dashed #ffb6d9;
}



.flowerSelector button {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: var(--btn-bg);
    color: var(--btn-text);
    cursor: pointer;
    font-size: 20px;
    font-family: var(--font-ui);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.3s;
}

.flowerSelector button:hover {
    transform: scale(1.15);
    background: var(--cart-btn-bg);
    color: white;
}

.flowerSelector button:active {
    transform: scale(0.95);
}

.flowerQuantity {
    font-size: 20px;
    color: var(--heading-color);
    font-weight: 600;
    font-family: var(--font-ui);
    min-width: 25px;
    text-align: center;
}

.flowerCard .addToCartBtn, .flowerCard .customizeBtn {
    border-radius: 50px;
    padding: 12px 24px;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--text-color);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: bold;
    width: 100%;
    margin-bottom: 10px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.flowerCard .customizeBtn {
    margin-top: auto;
    margin-bottom: 20px;
}

.flowerCard .addToCartBtn:hover, .flowerCard .customizeBtn:hover {
    transform: scale(1.05);
    background: #ffd6ef;
}

.flowerCard .addToCartBtn:active, .flowerCard .customizeBtn:active {
    transform: scale(0.98);
}

/* --- BACK TO SHOP BTN --- */


/* --- Pulsing red dot for active recording --- */
.recording-active {
    animation: recordPulse 1s infinite alternate;
    color: #e74c3c !important;
}

@keyframes recordPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* --- Plushie speaking / audio wave pulse animation --- */
.plushie-speaking {
    animation: audioShake 0.15s infinite alternate;
    box-shadow: none !important;
    border-radius: 50%;
}

@keyframes audioShake {
    0% { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(2deg) scale(1.02); }
}

/* --- Big chosen box canvas - a tad bit smaller (600x600px) --- */
.treats-layout #customScene {
    width: 600px;
    height: 600px;
    background: white;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
}

#customPanel.treats-controls-panel {
    width: 280px !important;
    background: var(--popup-bg);
    border-radius: 35px;
    padding: 24px;
    display: flex;
    flex-direction: column;
}



#customPanel.treats-controls-panel h2 {
    text-align: center;
    color: var(--heading-color);
    margin-bottom: 15px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 20px;
}

/* --- Bubbly option elements inside selection panel --- */
.box-option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    background: var(--btn-bg);
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    width: 100%;
}

.box-option:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: hotpink;
    box-shadow: 0 5px 12px rgba(255, 105, 180, 0.2);
}

.box-option.active {
    background: #ffb6d9;
    border-color: hotpink;
    box-shadow: none;
}

.box-option img {
    width: 45px;
    height: 45px;
    object-fit: contain;
}

.box-option span {
    font-size: 16px;
    font-family: var(--font-ui);
    font-weight: 600;
    color: var(--text-color);
}

.box-option.active span {
    color: #5a0035;
}







/* --- Customization Buttons Placed Side-by-Side --- */
.buttons-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 10px;
}

.buttons-row button {
    flex: 1;
    margin: 0 !important;
    padding: 12px 6px !important;
    font-size: 14px !important;
    border-radius: 25px !important;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #ffd6ef;
    color: #5a0035;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
}

.buttons-row button:hover {
    transform: scale(1.05);
}

#saveCustomization {
    background: #ffb6d9 !important;
    color: #5a0035 !important;
    box-shadow: 0 0 10px pink !important;
}

#saveCustomization:hover {
    box-shadow: none !important;
}

/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;
    object-fit: contain;
    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}



.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);
}

/* --- CAROUSEL STYLES (NO-SCROLL LAYOUT) --- */
body.no-scroll {
    overflow-x: hidden !important;
    overflow-y: auto !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

body.no-scroll #mainContainer {
    flex: 1;
    min-height: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

body.no-scroll .storeHeader {
    margin-top: 80px;
    margin-bottom: 0px;
    flex-shrink: 0;
}

.plushies-layout, .flowers-layout {
    width: 100%;
}

.carousel-wrapper {
    position: relative;
    width: 90%;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 60px;
    height: auto;
}

.carousel-track-container {
    overflow: hidden;
    width: 100%;
    padding: 15px 0;

/* --- extra padding for box shadows --- */
}

.carousel-track {
    display: flex;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.carousel-slide {
    flex: 0 0 calc(100% / 3);

/* --- Show 3 items --- */
padding: 0 15px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
}

@media (max-width: 1024px) {
    .carousel-slide {
        flex: 0 0 50%;

/* --- Show 2 items --- */
}
}

@media (max-width: 768px) {
    .carousel-slide {
        flex: 0 0 100%;

/* --- Show 1 item --- */
}
    .carousel-wrapper {
        padding: 0 40px;
    }
}

.carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #fafafa;
    border: 1px solid #e4e4e7;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    color: #52525b;
    cursor: pointer;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
}



.carousel-btn:hover:not(:disabled) {
    background: #f4f4f5;
    color: #18181b;
}



.carousel-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.carousel-prev {
    left: 0;
}

.carousel-next {
    right: 0;
}

.carousel-slide .flowerCard {
    width: 100%;

/* --- Take up the slide width --- */
max-width: 320px;

/* --- Don't get too crazy large --- */
margin: 0 auto;
}

/* --- NAV BRAND CENTERING --- */
.navBrand {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    margin: 0;
    font-family: var(--font-heading);
    font-size: 28px;
    color: var(--heading-color);
}

    <script>
// Cart state
let cart = JSON.parse(sessionStorage.getItem("cart")) || [];

function getCartCount() {
    const cartItems = JSON.parse(sessionStorage.getItem("cart")) || [];
    return cartItems.reduce((total, item) => total + (item.quantity || 1), 0);
}

// DOM Elements
const cartCount = document.getElementById("cartCount");
const toast = document.getElementById("toast");
const cartButton = document.getElementById("cartButton");

// Set initial cart count
cartCount.innerText = getCartCount();

// Track select quantities for 5 flowers locally


// Local quantity state for items on this page
const localQtys = {};

function updateQtyDisplay(flowerId) {
    const qtySpan = document.getElementById(`qtyFlower${flowerId}`);
    if (qtySpan) {
        qtySpan.innerText = localQtys[flowerId] || 1;
    }
}
// Initialize on load
setTimeout(() => {
    for (let i = 1; i <= 8; i++) updateQtyDisplay(i);
}, 100);

// Plus Buttons
document.querySelectorAll(".plusBtn").forEach(button => {
    button.addEventListener("click", () => {
        const flowerId = button.dataset.flower;
        localQtys[flowerId] = (localQtys[flowerId] || 1) + 1;
        updateQtyDisplay(flowerId);
    });
});

// Minus Buttons
document.querySelectorAll(".minusBtn").forEach(button => {
    button.addEventListener("click", () => {
        const flowerId = button.dataset.flower;
        if ((localQtys[flowerId] || 1) > 1) {
            localQtys[flowerId]--;
            updateQtyDisplay(flowerId);
        }
    });
});

// Add to Cart
document.querySelectorAll(".addToCartBtn").forEach(button => {
    button.addEventListener("click", () => {
        const flowerId = button.dataset.flower;
        const itemName = button.dataset.name;
        const itemImage = button.dataset.image;
        const qtyToAdd = localQtys[flowerId] || 1;

        let cart = JSON.parse(sessionStorage.getItem("cart")) || [];
        
        // Push to cart
        let existingItem = cart.find(item => item.name === itemName && !item.customId);
        if (existingItem) {
            existingItem.quantity += qtyToAdd;
        } else {
            cart.push({
                name: itemName,
                image: itemImage,
                quantity: qtyToAdd
            });
        }

        // Save
        sessionStorage.setItem("cart", JSON.stringify(cart));

        // Update count
        cartCount.innerText = getCartCount();

        // Reset display and internal count for this card
        localQtys[flowerId] = 1;
        updateQtyDisplay(flowerId);

        // Toast
        toast.innerText = "Added To Cart";
        toast.style.display = "block";
        setTimeout(() => {
            toast.style.display = "none";
        }, 2000);
    });

});

// Redirect to checkout
cartButton.addEventListener("click", () => {
    window.location = "checkout.html";
});

</script>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // We will dynamically construct the carousel to preserve the existing flowerCard HTML.
    const layouts = document.querySelectorAll('.plushies-layout, .flowers-layout');
    
    layouts.forEach(layout => {
        // Collect all cards
        const cards = Array.from(layout.querySelectorAll('.flowerCard'));
        if (cards.length === 0) return;
        
        // Clear layout and build carousel structure
        layout.innerHTML = '';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'carousel-wrapper';
        
        const prevBtn = document.createElement('button');
        prevBtn.className = 'carousel-btn carousel-prev';
        prevBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>';
        
        const trackContainer = document.createElement('div');
        trackContainer.className = 'carousel-track-container';
        
        const track = document.createElement('div');
        track.className = 'carousel-track';
        
        cards.forEach(card => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.appendChild(card);
            track.appendChild(slide);
        });
        
        const nextBtn = document.createElement('button');
        nextBtn.className = 'carousel-btn carousel-next';
        nextBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
        
        trackContainer.appendChild(track);
        wrapper.appendChild(prevBtn);
        wrapper.appendChild(trackContainer);
        wrapper.appendChild(nextBtn);
        
        layout.appendChild(wrapper);
        
        // --- Carousel Logic ---
        let currentIndex = 0;
        let slideInterval;
        
        function updateCarousel() {
            const slides = Array.from(track.children);
            if (slides.length === 0) return;
            
            // To show 3 items at once, slide width is calculated by container
            const slideWidth = slides[0].getBoundingClientRect().width;
            
            // We move exactly by one slide width
            track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            
            const containerWidth = trackContainer.getBoundingClientRect().width;
            const visibleSlides = Math.round(containerWidth / slideWidth) || 1;
            const maxIndex = Math.max(0, slides.length - visibleSlides);
            
            // Fix index if resizing
            if (currentIndex > maxIndex) {
                currentIndex = maxIndex;
                track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            }
            
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= maxIndex;
        }
        
        function nextSlide() {
            const containerWidth = trackContainer.getBoundingClientRect().width;
            const slideWidth = track.children[0].getBoundingClientRect().width;
            const visibleSlides = Math.round(containerWidth / slideWidth) || 1;
            const maxIndex = Math.max(0, track.children.length - visibleSlides);
            
            if (currentIndex < maxIndex) {
                currentIndex++;
            } else {
                currentIndex = 0; // Loop back
            }
            updateCarousel();
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) currentIndex--;
            updateCarousel();
        });
        
        nextBtn.addEventListener('click', () => {
            nextSlide();
        });
        
        // Auto Slideshow removed
        
        window.addEventListener('resize', updateCarousel);
        
        // Initial setup
        setTimeout(() => {
            updateCarousel();
        }, 100);
    });
});

</script>
