/* --- THEME VARIABLES --- */
:root {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #B71A3D;
    --heading-color: #B71A3D;
    --btn-bg: #ffffff;
    --btn-text: #B71A3D;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Yeseva One', serif;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}



/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body,
body.receiptPage,
body.giftPage {
    color: var(--text-color);
    background-image: url('assets/flowersbg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow: hidden !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- CHECKOUT BUTTON --- */


/* --- QUANTITY POPUP --- */
#quantityPopup h2 {
    color: var(--heading-color);
    margin-bottom: 15px;
    font-size: 20px;
}

.quantitySelector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
}

.quantitySelector button {
    width: 45px;
    height: 45px;
    border: none;
    border-radius: 50%;
    background: var(--btn-bg);
    color: var(--btn-text);
    cursor: pointer;
    font-size: 22px;
    font-family: var(--font-ui);
    transition: background 0.5s ease, color 0.5s ease;
}

#quantityValue {
    font-size: 26px;
    color: var(--heading-color);
    font-weight: bold;
}

#addToCartBtn {
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-size: 15px;
    width: 100%;
    font-family: var(--font-ui);
    transition: transform .25s, background 0.5s ease, color 0.5s ease;
}

#addToCartBtn:hover {
    transform: scale(1.03);
}

/* --- TOAST --- */
#toast {
    display: none;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--toast-bg);
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    box-shadow: none;
    z-index: 9999;
    transition: background 0.5s ease;
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: var(--font-heading);
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 42px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}



/* --- NAVBAR --- */
#storeNavbar {
    background: url(\'assets/kisses-bg.png\') center/cover no-repeat !important;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 30px;
    z-index: 999;
    border-bottom: 3px solid #ffb3d9;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
    padding: 10px 30px;
    box-sizing: border-box;
}



.navLink {
    font-size: 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--text-color);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
}

.navLink:hover {
    color: var(--heading-color);
    transform: translateY(-2px);
    opacity: 0.9;
}

.navLink.active {
    color: var(--heading-color);
    font-weight: 800;
    border-bottom: 3px solid var(--heading-color);
    padding-bottom: 2px;
}



/* --- Header Text styling --- */
.storeHeader {
    text-align: center;
    margin-top: 100px;
    margin-bottom: 20px;
    color: var(--heading-color);
    font-family: var(--font-heading);
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}



/* --- CARD LAYOUT SYSTEM --- */
#flowersMainContainer, #bouquetMainContainer {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    width: 100%;
}

.flowers-layout, .plushies-layout {

}

.flowersRowTop, .flowersRowBottom {

.flowerSelector button:hover {

.flowerQuantity {

    font-family: var(--font-ui);
    min-width: 25px;

.flowerCard .addToCartBtn, .flowerCard .customizeBtn {
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    cursor: pointer;

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}



.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta > span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover > span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);
}

/* --- CAROUSEL STYLES (NO-SCROLL LAYOUT) --- */
body.no-scroll {
    overflow-x: hidden !important;
    overflow-y: hidden !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

body.no-scroll #mainContainer {
    flex: 1;
    min-height: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

body.no-scroll .storeHeader {
    margin-top: 80px;
    margin-bottom: 0px;
    flex-shrink: 0;
}

.plushies-layout, .flowers-layout {
    width: 100%;
}

.carousel-wrapper {
    position: relative;
    width: 90%;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 60px;
    height: auto;
    overflow: hidden;
}

.carousel-track-container {
    overflow: visible;
    width: 100%;
    padding: 15px 0;

/* --- extra padding for box shadows --- */
}

.carousel-track {
    display: flex;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.carousel-slide {
    flex: 0 0 calc(100% / 3.3);

/* --- Show ~3 items with a peek of the next --- */
padding: 0 15px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
}

@media (max-width: 1024px) {
    .carousel-slide {
        flex: 0 0 50%;

/* --- Show 2 items --- */
}
}

@media (max-width: 768px) {
    .carousel-slide {
        flex: 0 0 100%;

/* --- Show 1 item --- */
}
    .carousel-wrapper {
        padding: 0 40px;
    }
}

.carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #fafafa;
    border: 1px solid #e4e4e7;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    color: #52525b;
    cursor: pointer;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
}



.carousel-btn:hover:not(:disabled) {
    background: #f4f4f5;
    color: #18181b;
}



.carousel-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.carousel-prev {
    left: 0;
}

.carousel-next {
    right: 0;
}

.carousel-slide .flowerCard {
    width: 100%;

/* --- Take up the slide width --- */
max-width: 320px;

/* --- Don't get too crazy large --- */
margin: 0 auto;
}

            inset 0 4px 10px rgba(255, 255, 255, 0.6),
            inset 0 -4px 10px rgba(255, 182, 193, 0.2) !important;
        overflow: hidden;
        transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    

    .canvas-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;

        pointer-events: none;
        z-index: 1;
        transition: opacity 0.3s ease;
    }

    /* --- DRAGGABLE ITEMS --- */
    .draggableBouquetItem {
        position: absolute;
        cursor: move;
        z-index: 10;
        transition: outline 0.1s ease;
    }

    .draggableBouquetItem:hover {
        outline: 2px dashed hotpink;
    }

    .selectedItem {
        outline: 3px solid var(--heading-color) !important;
        outline-offset: 3px;
        border-radius: 4px;
        box-shadow: none;
    }

    /* --- CONTROL BUTTONS --- */
    .buttons-row {
        display: flex;
        gap: 8px;
        width: 100%;
        margin-top: 8px;
    }

    .buttons-row button,
    .control-btn {
        flex: 1;
        border: none;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font-ui);
        border-radius: 12px;
        cursor: pointer;
        background: var(--btn-bg);
        color: var(--text-color);
        border: 1.5px solid rgba(255, 182, 217, 0.25);
        box-shadow: 0 2px 6px rgba(255, 182, 193, 0.08);
        transition: transform 0.2s ease, box-shadow 0.2s, background 0.3s;
    }

    

    .buttons-row button:hover,
    .control-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(255, 105, 180, 0.18);
    }

    .buttons-row button:active,
    .control-btn:active {
        transform: scale(0.97);
    }

    /* --- PEARL CTA BUTTON --- */
    .shiny-cta {
        outline: none;
        cursor: pointer;
        border: 0;
        position: relative;
        border-radius: 100px;
        background-color: var(--bg-pink);
        transition: all 0.2s ease;
        box-shadow: 
          inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
          inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
          inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
          0 10px 15px -3px rgba(255, 105, 180, 0.3),
          0 4px 6px -2px rgba(255, 105, 180, 0.05);
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        padding: 10px 24px;
    }

    .shiny-cta::before {
        content: "";
        position: absolute;
        left: -15%;
        right: -15%;
        bottom: 25%;
        top: -100%;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.25);
        transition: all 0.3s ease;
        z-index: 1;
        pointer-events: none;
    }

    .shiny-cta::after {
        content: "";
        position: absolute;
        left: 6%;
        right: 6%;
        top: 12%;
        bottom: 40%;
        border-radius: 22px 22px 0 0;
        box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.3) 0%,
          rgba(255, 255, 255, 0) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transition: all 0.3s ease;
        z-index: 1;
        pointer-events: none;
    }

    .shiny-cta span {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        color: var(--btn-text-color);
        transition: all 0.2s ease;
        transform: translateY(2%);
    }

    #storeNavbar .shiny-cta {
        background-color: #ffb6d9 !important;
    }

    #storeNavbar .shiny-cta span {
        color: #000000 !important;
    }

    

    .shiny-cta > span::before {
        content: "✧";
        transition: all 0.2s ease;
    }

    .shiny-cta:hover > span::before {
        content: "✦";
    }

    .shiny-cta:hover {
        box-shadow:
          inset 0 0.3rem 0.5rem var(--hover-glow),
          inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
          0 12px 20px rgba(255, 105, 180, 0.4),
          0 4px 8px rgba(255, 105, 180, 0.1);
    }

    .shiny-cta:hover::before {
        transform: translateY(-5%);
    }

    .shiny-cta:hover::after {
        opacity: 0.4;
        transform: translateY(5%);
    }

    .shiny-cta:hover span {
        transform: translateY(-4%);
    }

    .shiny-cta:active {
        transform: translateY(2px);
        box-shadow:
          inset 0 0.3rem 0.5rem var(--hover-glow),
          inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
          0 6px 10px rgba(255, 105, 180, 0.2);
    }

    <script>
// Cart state
let cart = JSON.parse(sessionStorage.getItem("cart")) || [];

function getCartCount() {
    const cartItems = JSON.parse(sessionStorage.getItem("cart")) || [];
    return cartItems.reduce((total, item) => total + (item.quantity || 1), 0);
}

// DOM Elements
const cartCount = document.getElementById("cartCount");
const toast = document.getElementById("toast");
const cartButton = document.getElementById("cartButton");

// Set initial cart count
cartCount.innerText = getCartCount();

// Track select quantities for 5 flowers locally


// Local quantity state for items on this page
const localQtys = {};

function updateQtyDisplay(flowerId) {
    const qtySpan = document.getElementById(`qtyFlower${flowerId}`);
    if (qtySpan) {
        qtySpan.innerText = localQtys[flowerId] || 1;
    }
}
// Initialize on load
setTimeout(() => {
    for (let i = 1; i <= 8; i++) updateQtyDisplay(i);
}, 100);

// Plus Buttons
document.querySelectorAll(".plusBtn").forEach(button => {
    button.addEventListener("click", () => {
        const flowerId = button.dataset.flower;
        localQtys[flowerId] = (localQtys[flowerId] || 1) + 1;
        updateQtyDisplay(flowerId);
    });
});

// Minus Buttons
document.querySelectorAll(".minusBtn").forEach(button => {
    button.addEventListener("click", () => {
        const flowerId = button.dataset.flower;
        if ((localQtys[flowerId] || 1) > 1) {
            localQtys[flowerId]--;
            updateQtyDisplay(flowerId);
        }
    });
});

// Add to Cart
document.querySelectorAll(".addToCartBtn").forEach(button => {
    button.addEventListener("click", () => {
        const flowerId = button.dataset.flower;
        const itemName = button.dataset.name || "Flower";
        const itemImage = button.dataset.image;
        const qtyToAdd = localQtys[flowerId] || 1;

        let cart = JSON.parse(sessionStorage.getItem("cart")) || [];
        
        // Push to cart
        let existingItem = cart.find(item => item.name === itemName && !item.customId);
        if (existingItem) {
            existingItem.quantity += qtyToAdd;
        } else {
            cart.push({
                name: itemName,
                image: itemImage,
                quantity: qtyToAdd
            });
        }

        // Save
        sessionStorage.setItem("cart", JSON.stringify(cart));

        // Update count
        cartCount.innerText = getCartCount();

        // Reset display and internal count for this card
        localQtys[flowerId] = 1;
        updateQtyDisplay(flowerId);

        // Toast
        toast.innerText = "Added To Cart";
        toast.style.display = "block";
        setTimeout(() => {
            toast.style.display = "none";
        }, 2000);
    });

});

// Redirect to checkout
cartButton.addEventListener("click", () => {
    window.location = "checkout.html";
});

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // We will dynamically construct the carousel to preserve the existing flowerCard HTML.
    const layouts = document.querySelectorAll('.plushies-layout, .flowers-layout');
    
    layouts.forEach(layout => {
        // Collect all cards
        const cards = Array.from(layout.querySelectorAll('.flowerCard'));
        if (cards.length === 0) return;
        
        // Clear layout and build carousel structure
        layout.innerHTML = '';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'carousel-wrapper';
        
        const prevBtn = document.createElement('button');
        prevBtn.className = 'carousel-btn carousel-prev';
        prevBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>';
        
        const trackContainer = document.createElement('div');
        trackContainer.className = 'carousel-track-container';
        
        const track = document.createElement('div');
        track.className = 'carousel-track';
        
        cards.forEach(card => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.appendChild(card);
            track.appendChild(slide);
        });
        
        const nextBtn = document.createElement('button');
        nextBtn.className = 'carousel-btn carousel-next';
        nextBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
        
        trackContainer.appendChild(track);
        wrapper.appendChild(prevBtn);
        wrapper.appendChild(trackContainer);
        wrapper.appendChild(nextBtn);
        
        layout.appendChild(wrapper);
        
        // --- Carousel Logic ---
        let currentIndex = 0;
        let slideInterval;
        
        function updateCarousel() {
            const slides = Array.from(track.children);
            if (slides.length === 0) return;
            
            // To show 3 items at once, slide width is calculated by container
            const slideWidth = slides[0].getBoundingClientRect().width;
            
            // We move exactly by one slide width
            track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            
            const containerWidth = trackContainer.getBoundingClientRect().width;
            const visibleSlides = Math.round(containerWidth / slideWidth) || 1;
            const maxIndex = Math.max(0, slides.length - visibleSlides);
            
            // Fix index if resizing
            if (currentIndex > maxIndex) {
                currentIndex = maxIndex;
                track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            }
            
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= maxIndex;
        }
        
        function nextSlide() {
            const containerWidth = trackContainer.getBoundingClientRect().width;
            const slideWidth = track.children[0].getBoundingClientRect().width;
            const visibleSlides = Math.round(containerWidth / slideWidth) || 1;
            const maxIndex = Math.max(0, track.children.length - visibleSlides);
            
            if (currentIndex < maxIndex) {
                currentIndex++;
            } else {
                currentIndex = 0; // Loop back
            }
            updateCarousel();
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) currentIndex--;
            updateCarousel();
        });
        
        nextBtn.addEventListener('click', () => {
            nextSlide();
        });
        
        // Auto Slideshow removed
        
        window.addEventListener('resize', updateCarousel);
        
        // Initial setup
        setTimeout(() => {
            updateCarousel();
        }, 100);
    });
});

</script>
    
<script>

const customScene = document.getElementById("customScene");
const placeholderMsg = document.getElementById("placeholderMsg");

    let selectedItem = null;
    let selected = null;
    let highestZ = 10;

    let dragOffsetX = 0;
    let dragOffsetY = 0;

    /* -------------------- */
    /* SPAWNER LOGIC        */
    /* -------------------- */
    function spawnElement(src, type, name) {
        // Hide placeholder
        if (placeholderMsg) {
            placeholderMsg.style.opacity = "0";
            setTimeout(() => {
                if (placeholderMsg) placeholderMsg.style.display = "none";
            }, 300);
        }

        const el = document.createElement("img");
        
        // Base dimensions: bouquet wrap holder should be larger by default
        let defaultDim = 120;
        if (type === 'holder') {
            // Remove any existing holder so only one can be selected at a time
            const existingHolders = document.querySelectorAll("#customScene .draggableBouquetItem[data-type='holder']");
            existingHolders.forEach(h => h.remove());
            
            defaultDim = 200;
        } else if (type === 'bow') {
            defaultDim = 90;
        }

        el.onload = function() {
            if (type === 'flower' || type === 'leaf') {
                const ratio = el.naturalHeight / (el.naturalWidth || 1);
                const w = 100;
                const h = 100 * ratio;
                el.style.width = w + "px";
                el.style.height = h + "px";
                el.style.left = (300 - w / 2) + "px";
                el.style.top = (300 - h / 2) + "px";
            }
        };

        el.src = src;
        el.className = "draggableAccessory draggableBouquetItem";
        el.style.position = "absolute";
        
        if (type !== 'flower' && type !== 'leaf') {
            el.style.width = defaultDim + "px";
            el.style.height = defaultDim + "px";
            
            // Center the element
            el.style.left = (300 - defaultDim / 2) + "px";
            el.style.top = (300 - defaultDim / 2) + "px";
        }
        
        el.style.zIndex = highestZ++;
        el.draggable = false;
        
        // Track state
        el.dataset.rotation = "0";
        el.dataset.flip = "1";
        el.dataset.type = type;
        el.dataset.name = name;

        customScene.appendChild(el);
        selectElement(el);
    }

    /* -------------------- */
    /* SELECTION LOGIC      */
    /* -------------------- */
    function updateSelectionUI() {
    const deleteBtn = document.getElementById('itemDeleteBtn');
    const rotateBtn = document.getElementById('itemRotateBtn');
    const resizeBtn = document.getElementById('itemResizeBtn');
    
    if (!selectedItem) {
        if (deleteBtn) deleteBtn.style.display = 'none';
        if (rotateBtn) rotateBtn.style.display = 'none';
        if (resizeBtn) resizeBtn.style.display = 'none';
        return;
    }
    
    const l = parseFloat(selectedItem.style.left) || 0;
    const t = parseFloat(selectedItem.style.top)  || 0;
    const w = selectedItem.offsetWidth;
    const h = selectedItem.offsetHeight;
    
    const rotDeg = parseFloat(selectedItem.dataset.rotation) || 0;
    const rotRad = rotDeg * Math.PI / 180;
    
    const cx = l + w / 2;
    const cy = t + h / 2;
    
    function getRotatedPos(dx, dy) {
        const rx = cx + dx * Math.cos(rotRad) - dy * Math.sin(rotRad);
        const ry = cy + dx * Math.sin(rotRad) + dy * Math.cos(rotRad);
        return { x: rx, y: ry };
    }
    
    if (deleteBtn) {
        const pos = getRotatedPos(w/2, -h/2);
        deleteBtn.style.left = (pos.x - 12) + 'px';
        deleteBtn.style.top  = (pos.y - 12) + 'px';
        deleteBtn.style.display = 'flex';
    }
    
    if (rotateBtn) {
        const pos = getRotatedPos(-w/2, h/2);
        rotateBtn.style.left = (pos.x - 12) + 'px';
        rotateBtn.style.top  = (pos.y - 12) + 'px';
        rotateBtn.style.display = 'flex';
    }
    
    if (resizeBtn) {
        const pos = getRotatedPos(w/2, h/2);
        resizeBtn.style.left = (pos.x - 12) + 'px';
        resizeBtn.style.top  = (pos.y - 12) + 'px';
        resizeBtn.style.display = 'flex';
    }
}

function selectElement(el) {
    selectedItem = el;
    document.querySelectorAll(".draggableBouquetItem, .draggablePlushieItem, .draggableTreatsItem, .draggableAccessory").forEach(item => {
        item.classList.remove("selectedItem", "selectedAccessory");
        item.style.outline = "none";
    });
    
    if (el) {
        el.classList.add("selectedItem");
        if(el.classList.contains("draggableAccessory")) el.classList.add("selectedAccessory");
        el.style.outline = "2px dashed #B71A3D";
        updateSelectionUI();
    } else {
        updateSelectionUI();
        customScene.style.cursor = '';
    }
}

// Fallback for selectAccessory inside customize.html
function selectAccessory(el) {
    selectElement(el);
}

let isResizing = false;
let isRotating = false;
let resizeStartX = 0, resizeStartY = 0;
let resizeStartW = 0, resizeStartH = 0;
let resizeStartLeft = 0, resizeStartTop = 0;
let rotateStartAngle = 0;
let rotateInitialElementAngle = 0;

document.addEventListener("mousedown", (e) => {
    if (e.target.closest('#itemDeleteBtn')) return;
    
    if (e.target.closest('#itemResizeBtn') && selectedItem) {
        e.stopPropagation(); e.preventDefault();
        isResizing = true;
        resizeStartX = e.clientX;
        resizeStartY = e.clientY;
        resizeStartW = selectedItem.offsetWidth;
        resizeStartH = selectedItem.offsetHeight;
        resizeStartLeft = parseFloat(selectedItem.style.left) || 0;
        resizeStartTop = parseFloat(selectedItem.style.top) || 0;
        return;
    }
    
    if (e.target.closest('#itemRotateBtn') && selectedItem) {
        e.stopPropagation(); e.preventDefault();
        isRotating = true;
        
        const rect = selectedItem.getBoundingClientRect();
        // Calculate center of actual element on screen
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        rotateStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        rotateInitialElementAngle = parseFloat(selectedItem.dataset.rotation) || 0;
        return;
    }

    const item = e.target.closest(".draggableBouquetItem, .draggablePlushieItem, .draggableTreatsItem, .draggableAccessory");
    if (item && customScene.contains(item)) {
        if (!selectedItem || selectedItem !== item) {
            selectElement(item);
        }

        selected = item;
        const rect = item.getBoundingClientRect();
        
        // Use center of item for dragging so rotation doesn't offset it weirdly?
        // Let's stick to standard dragOffsetX
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        
        if (typeof highestZ !== 'undefined') {
            item.style.zIndex = highestZ++;
        } else {
            // if highestZ is not defined, we can just use 100
            item.style.zIndex = parseInt(item.style.zIndex || "100") + 1;
        }
        e.preventDefault();
        customScene.style.cursor = 'grabbing';
    }
});

document.addEventListener("mousemove", (e) => {
    const sceneW = customScene.clientWidth;
    const sceneH = customScene.clientHeight;

    if (isResizing && selectedItem) {
        const dx = e.clientX - resizeStartX;
        
        let maxW = Math.min(sceneW - resizeStartLeft, sceneH - resizeStartTop);
        let newW = resizeStartW + dx;
        newW = Math.max(30, Math.min(newW, maxW));
        
        selectedItem.style.width = newW + "px";
        selectedItem.style.height = (newW * (resizeStartH / resizeStartW)) + "px";
        updateSelectionUI();
        return;
    }
    
    if (isRotating && selectedItem) {
        const rect = selectedItem.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const currentAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        
        let angleDiff = currentAngle - rotateStartAngle;
        let newAngle = rotateInitialElementAngle + angleDiff;
        
        selectedItem.dataset.rotation = newAngle;
        let flipStr = selectedItem.dataset.flip === "-1" ? "scaleX(-1) " : "";
        selectedItem.style.transform = flipStr + "rotate(" + newAngle + "deg)";
        updateSelectionUI();
        return;
    }

    if (!selected) return;

    const rect = customScene.getBoundingClientRect();
    let left = e.clientX - rect.left - dragOffsetX;
    let top = e.clientY - rect.top - dragOffsetY;

    // Bounded within canvas bounds
    left = Math.max(0, Math.min(left, sceneW - selected.offsetWidth));
    top = Math.max(0, Math.min(top, sceneH - selected.offsetHeight));

    selected.style.left = left + "px";
    selected.style.top = top + "px";
    updateSelectionUI();
});

document.addEventListener("mouseup", () => {
    selected = null;
    isResizing = false;
    isRotating = false;
    if (selectedItem) {
        customScene.style.cursor = 'grab';
    } else {
        customScene.style.cursor = '';
    }
});

customScene.addEventListener("mousedown", (e) => {
    // Make sure we only deselect if clicking customScene directly or the mainPlushie or placeholder
    if (e.target === customScene || e.target.id === 'mainPlushie' || e.target.closest('.canvas-placeholder')) {

    if (plusBtn) plusBtn.dataset.flower = fId;
    if (qtySpan) qtySpan.id = "qtyFlower" + fId;
    
    // If the qty span value is not 1, maybe reset it? (Optional, let's keep current behavior)
});

</script>
</body>
