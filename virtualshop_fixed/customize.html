<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Customize Plushie</title>

<link rel="stylesheet"
href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
rel="stylesheet">

</head>

<body>

<h1 class="customizeTitle">

✨ Customize Your Plushie ✨

</h1>

<div id="customizeContainer">

    <div id="customScene">

       <img
id="mainPlushie"
src=""
class="mainPlushie"
>

    </div>

    <div id="customPanel">

        <h2>

            Accessories

        </h2>

        <img src="custom1.png"
        class="accessoryTemplate">

        <img src="custom2.png"
        class="accessoryTemplate">

        <img src="custom3.png"
        class="accessoryTemplate">

        <img src="custom4.png"
        class="accessoryTemplate">

        <img src="custom5.png"
        class="accessoryTemplate">

        <img src="custom6.png"
        class="accessoryTemplate">

        <hr>

        <button id="deleteItem">

            🗑 Delete Selected

        </button>

     <button id="increaseSize">

➕ Increase Size

</button>

<button id="decreaseSize">

➖ Decrease Size

</button>

        <button id="saveCustomization">

            💾 Save Changes

        </button>

    </div>

</div>

<script src="customize.js"></script>

</body>

</html>
