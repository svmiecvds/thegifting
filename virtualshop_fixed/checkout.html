<!DOCTYPE html>
<html>

<head>

    <title>Order Summary</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="checkoutPage">

    <h1 class="checkoutTitle">
        🎀 Thank You For Shopping 🎀
    </h1>

    <div id="products"
         class="productsContainer">
    </div>

    <div id="receipt"
         class="receipt">

        <h2>
            Orders
        </h2>

        <div id="orderList">
        </div>

    </div>

    <div class="checkoutButtons">

        <button id="generateBill"
                class="cuteButton">

            ✨ Generate Bill ✨

        </button>

        <button id="giftButton"
                class="cuteButton">

            🎁 Make This A Gift

        </button>

    </div>

    <script src="checkout.js"></script>

</body>

</html>
