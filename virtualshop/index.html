<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fluffy Boutique</title>

    <link rel="stylesheet"
          href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
          rel="stylesheet">

</head>

<body>

    <div id="cartButton">

        🛒 Checkout

        (<span id="cartCount">0</span>)

    </div>

    <div id="shelf">

        <img
            src="bunny-blue.png"
            id="bunny"
            class="character"
            style="left:120px; top:100px;">

        <img
            src="duck.png"
            id="duck"
            class="character"
            style="left:620px; top:110px;">

        <img
            src="bear.png"
            id="bear"
            class="character"
            style="left:180px; top:470px;">

    </div>

    <!-- Bunny Color Popup -->

    <div id="colorPanel">

        <h2>
            🐰 Choose Bunny Color
        </h2>

        <button
            class="colorBtn"
            data-image="bunny-blue.png">

            Blue Bunny

        </button>

        <button
            class="colorBtn"
            data-image="bunny-purple.png">

            Purple Bunny

        </button>

        <button
            class="colorBtn"
            data-image="bunny-pink.png">

            Pink Bunny

        </button>

    </div>

    <!-- Quantity Popup -->

    <div id="quantityPopup">

        <h2>

            Quantity

        </h2>

        <div class="quantitySelector">

            <button id="minusBtn">

                −

            </button>

            <span id="quantityValue">

                1

            </span>

            <button id="plusBtn">

                +

            </button>

        </div>

        <button id="addToCartBtn">

            Add To Cart ✨

        </button>

    </div>

    <!-- Toast -->

    <div id="toast">

        Added To Cart ✨

    </div>

    <script src="script.js"></script>

</body>

</html>
