<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gift Creator</title>

<link rel="stylesheet"
href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script&family=Caveat&family=Indie+Flower&family=Patrick+Hand&display=swap"
rel="stylesheet">

</head>

<body>

<h1 class="giftTitle">

🎀 Create Your Gift 🎀

</h1>

<div id="giftContainer">

    <div id="giftScene">

    </div>

    <div id="assetPanel">

        <h2>

            💌 Notes

        </h2>

        <img src="note1.png"
             class="noteTemplate">

        <img src="note2.png"
             class="noteTemplate">

        <img src="note3.png"
             class="noteTemplate">

        <img src="note4.png"
             class="noteTemplate">

        <img src="note5.png"
             class="noteTemplate">

        <img src="note6.png"
             class="noteTemplate">

        <h2>

            ✨ Stickers

        </h2>

        <img src="sticker1.png"
             class="stickerTemplate">

        <img src="sticker2.png"
             class="stickerTemplate">

        <img src="sticker3.png"
             class="stickerTemplate">

        <img src="sticker4.png"
             class="stickerTemplate">

    </div>

</div>

<div id="noteEditor">

    <h2>

        💌 Edit Note

    </h2>

    <textarea
    id="noteMessage"
    placeholder="Write your message...">
    </textarea>

    <br><br>

    <select id="fontSelect">

        <option value="Pacifico">
        Pacifico
        </option>

        <option value="Dancing Script">
        Dancing Script
        </option>

        <option value="Caveat">
        Caveat
        </option>

        <option value="Indie Flower">
        Indie Flower
        </option>

        <option value="Patrick Hand">
        Patrick Hand
        </option>

    </select>

    <br><br>

    <button id="saveNote">

        Save Note ✨

    </button>

</div>

<script src="gift.js"></script>

</body>

</html>
