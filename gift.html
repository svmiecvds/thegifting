/* --- THEME VARIABLES --- */
:root {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #B71A3D;
    --heading-color: #B71A3D;
    --btn-bg: #ffffff;
    --btn-text: #B71A3D;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}



/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body,
body.receiptPage,
body.giftPage {
    color: var(--text-color);
    background-image: url('assets/giftbg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow: hidden !important;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- GIFT PAGE --- */
.giftTitle {
    text-align: center;
    margin-top: 100px;
    color: #ffffff;
    font-family: var(--font-heading);
}

#giftContainer {
    display: flex;
    flex: 1;
    min-height: 0;
    align-items: center;
    gap: 20px;
    justify-content: center;
    width: 95%;
    max-width: 1250px;
    margin: 0 auto;
    padding-top: 10px;
    padding-bottom: 20px;
}

#giftScene {
    flex: 1;
    height: 65vh;
    background: var(--card-bg);
    border-radius: 25px;
    position: relative;
    overflow: hidden;
    box-shadow: none;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#customPanel,
#assetPanel {
    width: 320px;
    height: 65vh;
    background: var(--panel-bg);
    border-radius: 25px;
    padding: 15px;
    overflow-y: auto;
    transition: background 0.5s ease, box-shadow 0.5s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--glow-soft) rgba(0, 0, 0, 0.05);
}

#customPanel::-webkit-scrollbar,
#assetPanel::-webkit-scrollbar {
    width: 8px;
}

#customPanel::-webkit-scrollbar-track,
#assetPanel::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.02);
    border-radius: 10px;
}

#customPanel::-webkit-scrollbar-thumb,
#assetPanel::-webkit-scrollbar-thumb {
    background: var(--glow-soft);
    border-radius: 10px;
}

#customPanel::-webkit-scrollbar-thumb:hover,
#assetPanel::-webkit-scrollbar-thumb:hover {
    background: var(--heading-color);
}

#customPanel h2,
#assetPanel h2 {
    color: var(--heading-color);
    margin: 10px 0;
}

#customPanel img,
#assetPanel img {
    width: 100px;
    display: block;
    margin: 10px auto;
    cursor: pointer;
    transition: .25s;
}

#customPanel img:hover,
#assetPanel img:hover {
    transform: scale(1.05);
}

.draggable {
    position: absolute;
    cursor: move;
}

.note {
    width: 260px;
}

.note img {
    width: 100%;
}

.noteText {
    position: absolute;
    top: 12%;
    left: 10%;
    width: 75%;
    height: 70%;
    overflow: hidden;
    text-align: center;
    word-wrap: break-word;
    font-size: 18px;
}

/* --- NOTE EDITOR --- */
#noteEditor {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    box-shadow: none;
    z-index: 99999;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#noteEditor textarea {
    width: 320px;
    height: 130px;
    margin-bottom: 15px;
    resize: none;
}

#fontSelect {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
}

#saveNote {
    width: 100%;
    border: none;
    border-radius: 50px;
    padding: 15px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-ui);
    cursor: pointer;
    box-shadow: none;
    transition: background 0.5s ease, color 0.5s ease;
}
#customizeBtn{

    border:none;

    border-radius:50px;

    padding:15px 30px;

    cursor:pointer;

    background:#ffd6ef;

    margin-bottom:15px;

    font-size:16px;
}

#customizeBtn:hover{

    transform:scale(1.05);
}

/* --- GIFT CONTROLS --- */
.giftControls {
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--glow-soft);
}

.giftControls h2 {
    color: var(--heading-color);
    margin-bottom: 10px;
}

.giftControlBtn {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px 14px;
    border: none;
    border-radius: 50px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-ui);
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, background 0.3s;
}

.giftControlBtn:hover {
    transform: scale(1.04);
}

.giftDeleteBtn {
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {

    color: var(--heading-color);

    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */

    text-align: center !important;

    color: var(--heading-color);
    margin-top: 100px;

}

/* --- Header Text styling --- */

/* --- BACK TO SHOP BTN --- */


/* --- Pulsing red dot for active recording --- */
.recording-active {
    animation: recordPulse 1s infinite alternate;
    color: #e74c3c !important;
}

@keyframes recordPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* --- Plushie speaking / audio wave pulse animation --- */
.plushie-speaking {
    animation: audioShake 0.15s infinite alternate;
    box-shadow: none !important;
    border-radius: 50%;
}

@keyframes audioShake {
    0% { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(2deg) scale(1.02); }
}

/* --- Big chosen box canvas - a tad bit smaller (600x600px) --- */

/* --- Bubbly option elements inside selection panel --- */
.box-option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    background: var(--btn-bg);
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    width: 100%;
}

.box-option:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: hotpink;

}

.box-option.active {

.box-option img {

.box-option span {

    font-family: var(--font-ui);
    font-weight: 600;
    color: var(--text-color);
}

.box-option.active span {
    color: #5a0035;
}







/* --- Customization Buttons Placed Side-by-Side --- */
.buttons-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 10px;
}

.buttons-row button {

}

.buttons-row button:hover {
    transform: scale(1.05);
}

#saveCustomization {
    background: #ffb6d9 !important;
    color: #5a0035 !important;
    box-shadow: 0 0 10px pink !important;
}

#saveCustomization:hover {
    box-shadow: none !important;
}

/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;
    object-fit: contain;
    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid hotpink !important;

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}



.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta > span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover > span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);
}

@keyframes shimmer {

@keyframes breathe {
  from, to {

  }
}

<script>
/* -------------------- */
/* THEME TOGGLE         */
/* -------------------- */

// Apply saved theme immediately to <html> to prevent flash


</script>
<script>
const giftScene =
document.getElementById(
"giftScene"
);

function resolveAccessorySrc(src) {
    if (!src) return "";
    let path = src.replace(/\\/g, "/");
    const assetsIndex = path.toLowerCase().indexOf("assets/");
    if (assetsIndex !== -1) {
        return path.substring(assetsIndex);
    }
    const filename = path.split("/").pop();
    if (filename.includes("custom")) {
        return "assets/plushies/" + filename;
    } else if (filename.includes("dessert") || filename.includes("box")) {
        return "assets/treats/" + filename;
    } else if (filename.includes("flower") || filename.includes("bow") || filename.includes("holder")) {
        return "assets/flowers/" + filename;
    }
    return "assets/treats/" + filename;
}

/* Read from "giftItems" - the key set by checkout.js */
const giftItems =
JSON.parse(
sessionStorage.getItem(
"giftItems"
)
) || [];

let selected = null;
let currentNote = null;
let highestZ = 1;

/* Drag offset so item doesn't jump to cursor centre */
let dragOffsetX = 0;
let dragOffsetY = 0;

/* -------------------- */
/* HELPER: make element */
/* selectable & draggable */
/* -------------------- */

function updateSelectionUI() {
    const deleteBtn = document.getElementById('itemDeleteBtn');
    const rotateBtn = document.getElementById('itemRotateBtn');
    const resizeBtn = document.getElementById('itemResizeBtn');
    
    if (!selected) {
        if (deleteBtn) deleteBtn.style.display = 'none';
        if (rotateBtn) rotateBtn.style.display = 'none';
        if (resizeBtn) resizeBtn.style.display = 'none';
        return;
    }
    
    const l = parseFloat(selected.style.left) || 0;
    const t = parseFloat(selected.style.top)  || 0;
    const w = selected.offsetWidth;
    const h = selected.offsetHeight;
    
    if (deleteBtn) {
        deleteBtn.style.left = (l + w - 12) + 'px';
        deleteBtn.style.top  = (t - 12) + 'px';
        deleteBtn.style.display = 'flex';
    }
    
    if (rotateBtn) {
        rotateBtn.style.left = (l - 12) + 'px';
        rotateBtn.style.top  = (t + h - 12) + 'px';
        rotateBtn.style.display = 'flex';
    }
    
    if (resizeBtn) {
        resizeBtn.style.left = (l + w - 12) + 'px';
        resizeBtn.style.top  = (t + h - 12) + 'px';
        resizeBtn.style.display = 'flex';
    }
}

function selectElement(el) {
    selected = el;
    document.querySelectorAll(".gifSelected").forEach(item => {
        item.classList.remove("gifSelected");
        item.style.outline = "none";
    });
    
    if (el) {
        el.classList.add("gifSelected");
        el.style.outline = "2px dashed #B71A3D";
        updateSelectionUI();
    } else {
        updateSelectionUI();
        giftScene.style.cursor = '';
    }
}

let isResizing = false;
let isRotating = false;
let isDragging = false;
let resizeStartX = 0, resizeStartY = 0;
let resizeStartW = 0, resizeStartH = 0;
let resizeStartLeft = 0, resizeStartTop = 0;
let rotateStartAngle = 0;
let rotateInitialElementAngle = 0;

function makeDraggable(el){
    el.addEventListener("mousedown", (e) => {
        if (e.target.closest('#itemDeleteBtn') || e.target.closest('#itemRotateBtn') || e.target.closest('#itemResizeBtn')) return;
        
        e.stopPropagation();
        if (selected !== el) {
            selectElement(el);
        }
        
        isDragging = true;
        el.style.zIndex = highestZ++;
        const rect = el.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        e.preventDefault();
        giftScene.style.cursor = 'grabbing';
    });
}

document.addEventListener("mousedown", (e) => {
    if (e.target.closest('#itemDeleteBtn')) {
        if (selected) {
            selected.remove();
            selectElement(null);
        }
        return;
    }
    
    if (e.target.closest('#itemResizeBtn') && selected) {
        e.stopPropagation(); e.preventDefault();
        isResizing = true;
        resizeStartX = e.clientX;
        resizeStartY = e.clientY;
        resizeStartW = selected.offsetWidth;
        resizeStartH = selected.offsetHeight;
        resizeStartLeft = parseFloat(selected.style.left) || 0;
        resizeStartTop = parseFloat(selected.style.top) || 0;
        return;
    }
    
    if (e.target.closest('#itemRotateBtn') && selected) {
        e.stopPropagation(); e.preventDefault();
        isRotating = true;
        
        const rect = selected.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        rotateStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        rotateInitialElementAngle = parseFloat(selected.dataset.rotation) || 0;
        return;
    }
});

/* -------------------- */
/* LOAD GIFT ITEMS      */
/* -------------------- */

giftItems.forEach((item, itemIndex) => {

const qty = item.quantity || 1;

for (let q = 0; q < qty; q++) {

const wrapper =
document.createElement(
"div"
);

wrapper.className =
"draggable giftEl";

wrapper.dataset.itemIndex = itemIndex;

const isBouquet = (item.customId && item.customId.startsWith("bouquet_")) || (item.name && item.name.toLowerCase().includes("bouquet"));
if (isBouquet) {
    wrapper.dataset.isBouquet = "true";
}

wrapper.style.position =
"absolute";

wrapper.style.left = (80 + q * 30) + "px";

wrapper.style.top = (80 + q * 30) + "px";

wrapper.style.width = "180px";

wrapper.style.height = "180px";

wrapper.style.zIndex =
highestZ++;

/* Plushie base image */
const plushie =
document.createElement(
"img"
);

plushie.src =
item.image;

plushie.style.position = "absolute";
plushie.style.width = "100%";
plushie.style.height = "100%";
plushie.style.objectFit = "contain";
plushie.style.left = "0";
plushie.style.top = "0";
plushie.style.transform = "none";

plushie.style.display =
"block";

plushie.draggable = false;

wrapper.appendChild(
plushie
);

/* Accessories overlaid at saved positions */
if(item.accessories && item.accessories.length > 0){

const canvasW = isBouquet ? 600 : 280;
const canvasL = isBouquet ? 50 : 210;
const canvasT = isBouquet ? 50 : 210;

item.accessories.forEach(acc => {

const accessory =
document.createElement(
"img"
);

let src = acc.image;
if (src) {
    src = resolveAccessorySrc(src);
}
accessory.src = src;

accessory.style.position =
"absolute";

accessory.style.pointerEvents = "none";

const rawLeft = parseFloat(acc.left);
const rawTop  = parseFloat(acc.top);
const rawWidth = parseFloat(acc.width);

accessory.style.left  = (((rawLeft - canvasL) / canvasW) * 100) + "%";
accessory.style.top   = (((rawTop  - canvasT) / canvasW) * 100) + "%";
accessory.style.width = ((rawWidth / canvasW) * 100) + "%";
accessory.style.transform = `rotate(${acc.rotation || 0}deg) scaleX(${acc.flip || 1})`;

wrapper.appendChild(
accessory
);

});

}

if (item.voiceNote) {
    wrapper.dataset.voiceNote = item.voiceNote;
    wrapper.dataset.voiceNoteDuration = item.voiceNoteDuration || 0;
    wrapper.classList.add("has-audio");
}

makeDraggable(wrapper);

giftScene.appendChild(
wrapper
);

}

});

/* -------------------- */
/* GLOBAL DRAG MOVE     */
/* -------------------- */

document.addEventListener("mousemove", (e) => {
    const sceneW = giftScene.clientWidth;
    const sceneH = giftScene.clientHeight;

    if (isResizing && selected) {
        const dx = e.clientX - resizeStartX;
        const isText = selected.classList.contains("giftText");
        
        if (isText) {
            let currentFS = parseFloat(window.getComputedStyle(selected).fontSize) || 16;
            // Use vertical drag distance to roughly adjust font size
            const dy = e.clientY - resizeStartY;
            selected.style.fontSize = Math.max(10, currentFS + dy/10) + "px";
            resizeStartY = e.clientY; // reset to track small movements
        } else {
            let maxW = Math.min(sceneW - resizeStartLeft, sceneH - resizeStartTop);
            let newW = resizeStartW + dx;
            newW = Math.max(30, Math.min(newW, maxW));
            
            selected.style.width = newW + "px";
            selected.style.height = (newW * (resizeStartH / resizeStartW)) + "px";
        }
        updateSelectionUI();
        return;
    }
    
    if (isRotating && selected) {
        const rect = selected.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const currentAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        
        let angleDiff = currentAngle - rotateStartAngle;
        let newAngle = rotateInitialElementAngle + angleDiff;
        
        selected.dataset.rotation = newAngle;
        let flipStr = selected.dataset.flip === "-1" ? "scaleX(-1) " : "";
        selected.style.transform = flipStr + "rotate(" + newAngle + "deg)";
        updateSelectionUI();
        return;
    }

    if (!selected || isResizing || isRotating || !isDragging) return;

    const sceneRect = giftScene.getBoundingClientRect();
    let newLeft = e.clientX - sceneRect.left - dragOffsetX;
    let newTop = e.clientY - sceneRect.top - dragOffsetY;

    selected.style.left = newLeft + "px";
    selected.style.top  = newTop  + "px";
    updateSelectionUI();
});

document.addEventListener("mouseup", () => {
    isResizing = false;
    isRotating = false;
    isDragging = false;
    if (selected) {
        giftScene.style.cursor = 'grab';
    } else {
        giftScene.style.cursor = '';
    }
});

/* Click on scene background to deselect */
giftScene.addEventListener("mousedown", (e) => {
    if (e.target === giftScene || e.target.closest('.canvas-placeholder')) {
        selectElement(null);
    }
});

/* -------------------- */
/* CREATE NOTES         */
/* -------------------- */

document
.querySelectorAll(
".noteTemplate"
)
.forEach(note => {

note.addEventListener(
"click",
() => {

const wrapper =
document.createElement(
"div"
);

wrapper.className =
"note draggable giftEl";

wrapper.style.position =
"absolute";

wrapper.style.left =
"200px";

wrapper.style.top =
"150px";

wrapper.style.width =
"220px";

wrapper.style.zIndex =
highestZ++;

const paper =
document.createElement(
"img"
);

paper.src =
note.src;

paper.style.width =
"100%";

paper.draggable = false;

wrapper.appendChild(
paper
);

makeDraggable(wrapper);

giftScene.appendChild(
wrapper
);

});

});

/* -------------------- */
/* CREATE STICKERS      */
/* -------------------- */

document
.querySelectorAll(
".stickerTemplate"
)
.forEach(sticker => {

sticker.addEventListener(
"click",
() => {

const img =
document.createElement(
"img"
);

img.src =
sticker.src;

img.className =
"draggable giftEl";

img.style.position =
"absolute";

img.style.width =
"100px";

img.style.left =
"250px";

img.style.top =
"250px";

img.style.zIndex =
highestZ++;

img.draggable = false;

makeDraggable(img);

giftScene.appendChild(
img
);

});

});

/* -------------------- */
/* ADD TEXT             */
/* -------------------- */

document
.getElementById("addTextBtn")
.addEventListener(
"click",
() => {

const textEl =
document.createElement(
"div"
);

textEl.className =
"draggable giftEl giftText";

textEl.style.position =
"absolute";

textEl.style.left =
"150px";

textEl.style.top =
"200px";

textEl.style.zIndex =
highestZ++;

textEl.style.fontFamily =
"Pacifico, cursive";

textEl.style.fontSize =
"22px";

textEl.style.color =
"#B71A3D";

textEl.style.cursor =
"move";

textEl.style.userSelect =
"none";

textEl.innerText =
"Your Text Here";

makeDraggable(textEl);

giftScene.appendChild(
textEl
);

/* Auto-open editor for new text */
currentNote = null;
openTextEditor(textEl);

});

/* -------------------- */
/* NOTE / TEXT EDITOR   */
/* -------------------- */

const noteEditor =
document.getElementById(
"noteEditor"
);

const noteMessage =
document.getElementById(
"noteMessage"
);

const fontSelect =
document.getElementById(
"fontSelect"
);

let editingEl = null;

function rgbToHex(rgb) {
    if (!rgb) return "#B71A3D";
    if (rgb.startsWith("#")) return rgb;
    const match = rgb.match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/i);
    if (match) {
        return "#" + 
            ("0" + parseInt(match[1], 10).toString(16)).slice(-2) +
            ("0" + parseInt(match[2], 10).toString(16)).slice(-2) +
            ("0" + parseInt(match[3], 10).toString(16)).slice(-2);
    }
    return "#B71A3D";
}

function openTextEditor(el){

editingEl = el;

const isNote = el.classList.contains("note");

if(isNote){

const textDiv =
el.querySelector(".noteText");

noteMessage.value =
textDiv ? textDiv.innerText : "";

} else {

noteMessage.value =
el.innerText;

}

fontSelect.value =
el.style.fontFamily
? el.style.fontFamily.split(",")[0].trim().replace(/['"]/g, "")
: "Pacifico";

const textColorPicker = document.getElementById("textColorPicker");
textColorPicker.value = el.style.color ? rgbToHex(el.style.color) : "#B71A3D";

noteEditor.style.display =
"block";

}

/* Double-click to edit notes and text elements */
document.addEventListener(
"dblclick",
(e) => {

const note = e.target.closest(".note");

if(note){

openTextEditor(note);

return;

}

const textEl = e.target.closest(".giftText");

if(textEl){

openTextEditor(textEl);

}

}
);

/* -------------------- */
/* SAVE EDITOR          */
/* -------------------- */

document
.getElementById(
"saveNote"
)
.addEventListener(
"click",
() => {

if(!editingEl) return;

const isNote = editingEl.classList.contains("note");

const font = fontSelect.value;
const textColor = document.getElementById("textColorPicker").value;

if(isNote){

const textDiv =
editingEl.querySelector(".noteText");

if(textDiv){

textDiv.innerText =
noteMessage.value;

textDiv.style.fontFamily =
font;

textDiv.style.color = textColor;

}

} else {

editingEl.innerText =
noteMessage.value;

editingEl.style.fontFamily =
font + ", cursive";

editingEl.style.color = textColor;

}

noteEditor.style.display =
"none";

}
);

/* ESC closes editor */
document.addEventListener(
"keydown",
(e) => {

if(
e.key === "Escape"
){

noteEditor.style.display =
"none";

}

}
);

/* -------------------- */
/* ROTATE & FLIP        */
/* -------------------- */



function updateTransform(el) {
  let rotation = el.dataset.rotation || 0;
  let flip = el.dataset.flip || 1;
  el.style.transform = `rotate(${rotation}deg) scaleX(${flip})`;
}

/* -------------------- */
/* SERIALIZE & SAVE     */
/* -------------------- */

const saveGiftBtn = document.getElementById("saveGiftLayoutBtn");
if (saveGiftBtn) {
    saveGiftBtn.addEventListener("click", () => {
        const savedLayout = [];
        document.querySelectorAll("#giftScene .giftEl").forEach(el => {
            const isPlushie = el.classList.contains("draggable") && !el.classList.contains("note") && !el.classList.contains("giftText") && el.querySelector("img") && !el.querySelector("img").src.includes("sticker");
            const isNote = el.classList.contains("note");
            const isText = el.classList.contains("giftText");
            const isSticker = el.querySelector("img") && el.querySelector("img").src.includes("sticker") || el.tagName === "IMG";

            let type = "sticker";
            if (isPlushie) type = "plushie";
            else if (isNote) type = "note";
            else if (isText) type = "text";

            let src = "";
            let text = "";
            let noteTextDetails = null;

            if (type === "plushie") {
                src = el.querySelector("img").src;
            } else if (type === "note") {
                src = el.querySelector("img").src;
                const textDiv = el.querySelector(".noteText");
                if (textDiv) {
                    noteTextDetails = {
                        text: textDiv.innerText,
                        fontFamily: textDiv.style.fontFamily,
                        color: textDiv.style.color
                    };
                }
            } else if (type === "sticker") {
                src = el.tagName === "IMG" ? el.src : el.querySelector("img").src;
            } else if (type === "text") {
                text = el.innerText;
            }

            const sceneW = giftScene.clientWidth || 800;
            const realLeft = parseFloat(el.style.left) || 0;
            const centerOffset = realLeft - (sceneW / 2);

            let accessories = [];
            const itemIndex = el.dataset.itemIndex;
            if (itemIndex !== undefined && giftItems[itemIndex]) {
                accessories = giftItems[itemIndex].accessories || [];
            }

            const isBouquetItem = el.dataset.isBouquet === "true";

            savedLayout.push({
                type: type,
                isBouquet: isBouquetItem,
                left: el.style.left,
                centerOffset: centerOffset,
                top: el.style.top,
                width: el.style.width,
                height: el.style.height,
                zIndex: el.style.zIndex,
                rotation: el.dataset.rotation || "0",
                flip: el.dataset.flip || "1",
                src: src,
                text: text,
                noteTextDetails: noteTextDetails,
                fontFamily: el.style.fontFamily || "",
                fontSize: el.style.fontSize || "",
                color: el.style.color || "",
                voiceNote: el.dataset.voiceNote || "",
                voiceNoteDuration: parseInt(el.dataset.voiceNoteDuration) || 0,
                accessories: accessories
            });
        });
        
        sessionStorage.setItem("savedGiftLayout", JSON.stringify(savedLayout));
        alert("Gift Layout Saved! Opening your wrapped card...");
        window.location = "final.html";
    });
}

</script>
