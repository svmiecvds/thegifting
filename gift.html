<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gift Shop</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

/* --- THEME VARIABLES --- */
:root,
[data-theme="light"] {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #c2185b;
    --heading-color: #ff4fa2;
    --btn-bg: #ffffff;
    --btn-text: #ff4fa2;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(135deg, #1a0010 0%, #3d0030 40%, #5c0045 100%);
    --body-bg: #1a0010;
    --panel-bg: #2e001f;
    --popup-bg: #2e001f;
    --receipt-bg: #1a0010;
    --card-bg: #2e001f;
    --text-color: #ff80c0;
    --heading-color: #ff4fa2;
    --btn-bg: #3d0030;
    --btn-text: #ff80c0;
    --cart-btn-bg: #c2185b;
    --cart-btn-shadow: #ff1493;
    --glow-color: #ff1493;
    --glow-soft: #c2185b;
    --toast-bg: #c2185b;
    --receipt-shadow: #c2185b;
    --shelf-overlay: rgba(26,0,16,0.15);
    --font-body: 'Quicksand', sans-serif;
    --font-heading: 'Pacifico', cursive;
    --font-ui: 'Fredoka', sans-serif;
    --font-nav: 'Inter', sans-serif;
}

/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body {
    color: var(--text-color);
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: var(--font-body);
    font-weight: 500;
}

[data-theme="dark"] body {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

body.receiptPage,
body.giftPage {
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--receipt-bg);
}

body.giftPage {
    overflow-x: hidden;
    overflow-y: auto;
}

[data-theme="dark"] body.receiptPage,
[data-theme="dark"] body.giftPage {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

/* --- THEME SWITCH WRAPPER --- */
#themeToggleWrapper {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    background: transparent;
    padding: 6px;
    border-radius: 30px;
}

[data-theme="dark"] #themeToggleWrapper {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    background: transparent;
    padding: 6px;
    border-radius: 30px;
}

/* --- THEME SWITCH STYLES --- */
.theme-switch {
    --toggle-size: 11px;

/* --- Smaller size --- */
--container-width: 5.625em;
    --container-height: 2.5em;
    --container-radius: 6.25em;
    --container-light-bg: #ff4fa2;

/* --- Changed color to pop more --- */
--container-night-bg: #800040;
    --circle-container-diameter: 3.375em;
    --sun-moon-diameter: 2.125em;
    --sun-bg: #FFA500;
    --moon-bg: #E0E4EB;
    --spot-color: #A1A8B8;
    --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
    --stars-color: #fff;
    --clouds-color: #F3FDFF;
    --back-clouds-color: #AACADF;
    --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
    --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
}

.theme-switch,
.theme-switch *,
.theme-switch *::before,
.theme-switch *::after {
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-size: var(--toggle-size);
}

.theme-switch__container {
    width: var(--container-width);
    height: var(--container-height);
    background-color: var(--container-light-bg);
    border-radius: var(--container-radius);
    overflow: hidden;
    cursor: pointer;
    box-shadow: none;

/* --- Make it flat, not floating --- */
transition: var(--transition);
    position: relative;
}

.theme-switch__container::before {
    content: "";
    position: absolute;
    z-index: 1;
    inset: 0;
    border-radius: var(--container-radius);
}

.theme-switch__checkbox {
    display: none;
}

.theme-switch__circle-container {
    width: var(--circle-container-diameter);
    height: var(--circle-container-diameter);
    background-color: rgba(255, 255, 255, 0.2);
    position: absolute;
    left: var(--circle-container-offset);
    top: var(--circle-container-offset);
    border-radius: var(--container-radius);
    display: flex;
    transition: var(--circle-transition);
    pointer-events: none;
}

.theme-switch__sun-moon-container {
    pointer-events: auto;
    position: relative;
    z-index: 2;
    width: var(--sun-moon-diameter);
    height: var(--sun-moon-diameter);
    margin: auto;
    border-radius: var(--container-radius);
    background-color: var(--sun-bg);
    overflow: hidden;
    transition: var(--transition);
}

.theme-switch__moon {
    transform: translateX(100%);
    width: 100%;
    height: 100%;
    background-color: var(--moon-bg);
    border-radius: inherit;
    transition: var(--transition);
    position: relative;
}

.theme-switch__spot {
    position: absolute;
    top: 0.75em;
    left: 0.312em;
    width: 0.75em;
    height: 0.75em;
    border-radius: var(--container-radius);
    background-color: var(--spot-color);
}

.theme-switch__spot:nth-of-type(2) {
    width: 0.375em;
    height: 0.375em;
    top: 0.937em;
    left: 1.375em;
}

.theme-switch__spot:nth-last-of-type(3) {
    width: 0.25em;
    height: 0.25em;
    top: 0.312em;
    left: 0.812em;
}

.theme-switch__clouds {
    width: 1.25em;
    height: 1.25em;
    background-color: var(--clouds-color);
    border-radius: var(--container-radius);
    position: absolute;
    bottom: -0.625em;
    left: 0.312em;
    box-shadow:
        0.937em 0.312em var(--clouds-color),
        -0.312em -0.312em var(--back-clouds-color),
        1.437em 0.375em var(--clouds-color),
        0.5em -0.125em var(--back-clouds-color),
        2.187em 0 var(--clouds-color),
        1.25em -0.062em var(--back-clouds-color),
        2.937em 0.312em var(--clouds-color),
        2em -0.312em var(--back-clouds-color),
        3.625em -0.062em var(--clouds-color),
        2.625em 0em var(--back-clouds-color),
        4.5em -0.312em var(--clouds-color),
        3.375em -0.437em var(--back-clouds-color),
        4.625em -1.75em 0 0.437em var(--clouds-color),
        4em -0.625em var(--back-clouds-color),
        4.125em -2.125em 0 0.437em var(--back-clouds-color);
    transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
}

.theme-switch__stars-container {
    position: absolute;
    color: var(--stars-color);
    top: -100%;
    left: 0.312em;
    width: 2.75em;
    height: auto;
    transition: var(--transition);
}

/* --- -- Switch Actions -- --- */
.theme-switch__checkbox:checked + .theme-switch__container {
    background-color: var(--container-night-bg);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em);
}

.theme-switch__circle-container:hover {
    left: calc(var(--circle-container-offset) + 0.187em);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon {
    transform: translate(0);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds {
    bottom: -4.062em;
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container {
    top: 50%;
    transform: translateY(-50%);
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.05);
    text-align: center;
    border: 2px solid var(--glow-soft);
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- CHECKOUT BUTTON --- */


/* --- GIFT PAGE --- */
.giftTitle {
    text-align: center;
    margin-top: 100px;
    color: var(--heading-color);
    font-family: var(--font-heading);
}

#giftContainer {
    display: flex;
    gap: 20px;
    padding: 20px;
}

#giftScene {
    flex: 1;
    height: 65vh;
    background: var(--card-bg);
    border-radius: 25px;
    position: relative;
    overflow: hidden;
    box-shadow: none;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#assetPanel {
    width: 240px;
    background: var(--panel-bg);
    border-radius: 25px;
    padding: 15px;
    height: 65vh;
    overflow-y: auto;
    box-shadow: none;
    transition: background 0.5s ease, box-shadow 0.5s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--glow-soft) rgba(0, 0, 0, 0.05);
}

#assetPanel::-webkit-scrollbar {
    width: 8px;
}

#assetPanel::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.02);
    border-radius: 10px;
}

#assetPanel::-webkit-scrollbar-thumb {
    background: var(--glow-soft);
    border-radius: 10px;
    border: 2px solid transparent;
}

#assetPanel::-webkit-scrollbar-thumb:hover {
    background: var(--heading-color);
}

#assetPanel h2 {
    color: var(--heading-color);
    margin: 10px 0;
}

#assetPanel img {
    width: 100px;
    display: block;
    margin: 10px auto;
    cursor: pointer;
    transition: .25s;
}

#assetPanel img:hover {
    transform: scale(1.05);
}

.draggable {
    position: absolute;
    cursor: move;
}

.note {
    width: 260px;
}

.note img {
    width: 100%;
}

.noteText {
    position: absolute;
    top: 12%;
    left: 10%;
    width: 75%;
    height: 70%;
    overflow: hidden;
    text-align: center;
    word-wrap: break-word;
    font-size: 18px;
}

/* --- NOTE EDITOR --- */
#noteEditor {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    box-shadow: none;
    z-index: 99999;
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#noteEditor textarea {
    width: 320px;
    height: 130px;
    margin-bottom: 15px;
    resize: none;
}

#fontSelect {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
}

#saveNote {
    width: 100%;
    border: none;
    border-radius: 50px;
    padding: 15px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-ui);
    cursor: pointer;
    box-shadow: none;
    transition: background 0.5s ease, color 0.5s ease;
}
#customizeBtn{

    border:none;

    border-radius:50px;

    padding:15px 30px;

    cursor:pointer;

    background:#ffd6ef;

    margin-bottom:15px;

    font-size:16px;

    box-shadow:
    0 0 10px pink,
    0 0 20px pink;
}

#customizeBtn:hover{

    transform:scale(1.05);
}

/* --- GIFT CONTROLS --- */
.giftControls {
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--glow-soft);
}

.giftControls h2 {
    color: var(--heading-color);
    margin-bottom: 10px;
}

.giftControlBtn {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px 14px;
    border: none;
    border-radius: 50px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-family: var(--font-ui);
    font-size: 15px;
    cursor: pointer;
    box-shadow: none;
    transition: transform 0.15s, background 0.3s;
}

.giftControlBtn:hover {
    transform: scale(1.04);
}

.giftDeleteBtn {
    background: #ffd6d6;
    color: #c0392b;
}

/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: var(--font-heading);
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 42px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}

[data-theme="dark"] .checkoutTitle, [data-theme="dark"] .customizeTitle {
    text-shadow: none;
}

/* --- NAVBAR --- */
#storeNavbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 30px;
    z-index: 999;
    border-bottom: 3px solid #ffb3d9;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
    padding: 10px 30px;
    box-sizing: border-box;
}

[data-theme="dark"] #storeNavbar {
    background: rgba(46, 0, 31, 0.95);
    border-bottom-color: #5c0045;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.navLink {
    font-size: 20px;
    font-family: var(--font-nav);
    font-weight: 500;
    color: var(--text-color);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
}

.navLink:hover {
    color: var(--heading-color);
    transform: translateY(-2px);
    opacity: 0.9;
}

.navLink.active {
    color: var(--heading-color);
    font-weight: 800;
    border-bottom: 3px solid var(--heading-color);
    padding-bottom: 2px;
}

[data-theme="dark"] .navLink.active {
    background: transparent;
    color: var(--heading-color);
    box-shadow: none;
}

/* --- Header Text styling --- */
.storeHeader {
    text-align: center;
    margin-top: 100px;
    margin-bottom: 20px;
    color: var(--heading-color);
    font-family: var(--font-heading);
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}

[data-theme="dark"] .storeHeader,
[data-theme="dark"] .checkoutTitle,
[data-theme="dark"] .customizeTitle,
[data-theme="dark"] .giftTitle {
    color: #ffb6d9 !important;
    text-shadow: none;
}

/* --- BACK TO SHOP BTN --- */


/* --- Pulsing red dot for active recording --- */
.recording-active {
    animation: recordPulse 1s infinite alternate;
    color: #e74c3c !important;
}

@keyframes recordPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* --- Plushie speaking / audio wave pulse animation --- */
.plushie-speaking {
    animation: audioShake 0.15s infinite alternate;
    box-shadow: none !important;
    border-radius: 50%;
}

@keyframes audioShake {
    0% { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(2deg) scale(1.02); }
}

/* --- Big chosen box canvas - a tad bit smaller (600x600px) --- */
.treats-layout #customScene {
    width: 600px;
    height: 600px;
    background: white;
    border-radius: 40px;
    box-shadow: none;
    position: relative;
    overflow: hidden;
}

#customPanel.treats-controls-panel {
    width: 280px !important;
    background: var(--popup-bg);
    border: 3px solid #ffb6d9;
    border-radius: 35px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
    display: flex;
    flex-direction: column;
}

[data-theme="dark"] #customPanel.treats-controls-panel {
    background-color: rgba(46, 0, 31, 0.6);
    border-color: #5c0045;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

#customPanel.treats-controls-panel h2 {
    text-align: center;
    color: var(--heading-color);
    margin-bottom: 15px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 20px;
}

/* --- Bubbly option elements inside selection panel --- */
.box-option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    background: var(--btn-bg);
    border: 2px solid #ffb6d9;
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    width: 100%;
}

.box-option:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: hotpink;
    box-shadow: 0 5px 12px rgba(255, 105, 180, 0.2);
}

.box-option.active {
    background: #ffb6d9;
    border-color: hotpink;
    box-shadow: none;
}

.box-option img {
    width: 45px;
    height: 45px;
    object-fit: contain;
}

.box-option span {
    font-size: 16px;
    font-family: var(--font-ui);
    font-weight: 600;
    color: var(--text-color);
}

.box-option.active span {
    color: #5a0035;
}

[data-theme="dark"] .box-option {
    border-color: #5c0045;
}

[data-theme="dark"] .box-option.active {
    background: #c2185b;
    border-color: #ff80c0;
}

[data-theme="dark"] .box-option.active span {
    color: white;
}

/* --- Customization Buttons Placed Side-by-Side --- */
.buttons-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 10px;
}

.buttons-row button {
    flex: 1;
    margin: 0 !important;
    padding: 12px 6px !important;
    font-size: 14px !important;
    border-radius: 25px !important;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #ffd6ef;
    box-shadow: none;
    color: #5a0035;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
}

.buttons-row button:hover {
    transform: scale(1.05);
    box-shadow: none;
}

#saveCustomization {
    background: #ffb6d9 !important;
    color: #5a0035 !important;
    box-shadow: 0 0 10px pink !important;
}

#saveCustomization:hover {
    box-shadow: none !important;
}

/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;
    object-fit: contain;
    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root, [data-theme="light"] {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}

[data-theme="dark"] {
    --bg-pink: #880e4f;
    --hover-glow: rgba(136, 14, 79, 0.6);
    --hover-glow-soft: rgba(194, 24, 91, 0.8);
    --btn-text-color: #ffffff;
}

.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 
      inset 0 0.3rem 0.9rem rgba(255, 255, 255, 0.4),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      inset 0 -0.4rem 0.9rem rgba(255, 255, 255, 0.3),
      0 10px 15px -3px rgba(255, 105, 180, 0.3),
      0 4px 6px -2px rgba(255, 105, 180, 0.05);
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta::before {
    content: "";
    position: absolute;
    left: -15%;
    right: -15%;
    bottom: 25%;
    top: -100%;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.25);
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta::after {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 12%;
    bottom: 40%;
    border-radius: 22px 22px 0 0;
    box-shadow: inset 0 10px 8px -10px rgba(255, 255, 255, 0.6);
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.3) 0%,
      rgba(255, 255, 255, 0) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transition: all 0.3s ease;
    z-index: 1;
    pointer-events: none;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
    transition: all 0.2s ease;
    transform: translateY(2%);
}

.shiny-cta span::before {
    content: "✧";
    transition: all 0.2s ease;
}

.shiny-cta:hover span::before {
    content: "✦";
}

.shiny-cta:hover {
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.4),
      0 12px 20px rgba(255, 105, 180, 0.4),
      0 4px 8px rgba(255, 105, 180, 0.1);
}

.shiny-cta:hover::before {
    transform: translateY(-5%);
}

.shiny-cta:hover::after {
    opacity: 0.4;
    transform: translateY(5%);
}

.shiny-cta:hover span {
    transform: translateY(-4%);
}

.shiny-cta:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 0.3rem 0.5rem var(--hover-glow),
      inset 0 -0.1rem 0.3rem rgba(0, 0, 0, 0.5),
      0 6px 10px rgba(255, 105, 180, 0.2);

// Apply saved theme immediately to <html> to prevent flash
(function () {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();

// Wire up the checkbox once DOM is ready
document.addEventListener('DOMContentLoaded', function () {
    const checkbox = document.getElementById('themeCheckbox');
    if (!checkbox) return;

    const saved = localStorage.getItem('theme');
    checkbox.checked = saved === 'dark';

    checkbox.addEventListener('change', function () {
        if (this.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    });
});

<script>
const giftScene =
document.getElementById(
"giftScene"
);

function resolveAccessorySrc(src) {
    if (!src) return "";
    let path = src.replace(/\\/g, "/");
    const assetsIndex = path.toLowerCase().indexOf("assets/");
    if (assetsIndex !== -1) {
        return path.substring(assetsIndex);
    }
    const filename = path.split("/").pop();
    if (filename.includes("custom")) {
        return "assets/plushies/" + filename;
    } else if (filename.includes("dessert") || filename.includes("box")) {
        return "assets/treats/" + filename;
    } else if (filename.includes("flower") || filename.includes("bow") || filename.includes("holder")) {
        return "assets/flowers/" + filename;
    }
    return "assets/treats/" + filename;
}

/* Read from "giftItems" - the key set by checkout.js */
const giftItems =
JSON.parse(
localStorage.getItem(
"giftItems"
)
) || [];

let selected = null;
let currentNote = null;
let highestZ = 1;

/* Drag offset so item doesn't jump to cursor centre */
let dragOffsetX = 0;
let dragOffsetY = 0;

/* -------------------- */
/* HELPER: make element */
/* selectable & draggable */
/* -------------------- */

function makeDraggable(el){

el.addEventListener(
"mousedown",
(e) => {

e.stopPropagation();

/* Deselect previous */
document
.querySelectorAll(".gifSelected")
.forEach(x => x.classList.remove("gifSelected"));

el.classList.add("gifSelected");

selected = el;

selected.style.zIndex =
highestZ++;

const rect = el.getBoundingClientRect();
dragOffsetX = e.clientX - rect.left;
dragOffsetY = e.clientY - rect.top;

e.preventDefault();

}
);

}

/* -------------------- */
/* LOAD GIFT ITEMS      */
/* -------------------- */

giftItems.forEach((item, itemIndex) => {

const qty = item.quantity || 1;

for (let q = 0; q < qty; q++) {

const wrapper =
document.createElement(
"div"
);

wrapper.className =
"draggable giftEl";

wrapper.dataset.itemIndex = itemIndex;

const isBouquet = (item.customId && item.customId.startsWith("bouquet_")) || (item.name && item.name.toLowerCase().includes("bouquet"));
if (isBouquet) {
    wrapper.dataset.isBouquet = "true";
}

wrapper.style.position =
"absolute";

wrapper.style.left = (80 + q * 30) + "px";

wrapper.style.top = (80 + q * 30) + "px";

wrapper.style.width = "180px";

wrapper.style.height = "180px";

wrapper.style.zIndex =
highestZ++;

/* Plushie base image */
const plushie =
document.createElement(
"img"
);

plushie.src =
item.image;

plushie.style.position = "absolute";
plushie.style.width = "100%";
plushie.style.height = "100%";
plushie.style.objectFit = "contain";
plushie.style.left = "0";
plushie.style.top = "0";
plushie.style.transform = "none";

plushie.style.display =
"block";

plushie.draggable = false;

wrapper.appendChild(
plushie
);

/* Accessories overlaid at saved positions */
if(item.accessories && item.accessories.length > 0){

const canvasW = isBouquet ? 600 : 280;
const canvasL = isBouquet ? 50 : 210;
const canvasT = isBouquet ? 50 : 210;

item.accessories.forEach(acc => {

const accessory =
document.createElement(
"img"
);

let src = acc.image;
if (src) {
    src = resolveAccessorySrc(src);
}
accessory.src = src;

accessory.style.position =
"absolute";

accessory.style.pointerEvents = "none";

const rawLeft = parseFloat(acc.left);
const rawTop  = parseFloat(acc.top);
const rawWidth = parseFloat(acc.width);

accessory.style.left  = (((rawLeft - canvasL) / canvasW) * 100) + "%";
accessory.style.top   = (((rawTop  - canvasT) / canvasW) * 100) + "%";
accessory.style.width = ((rawWidth / canvasW) * 100) + "%";
accessory.style.transform = `rotate(${acc.rotation || 0}deg) scaleX(${acc.flip || 1})`;

wrapper.appendChild(
accessory
);

});

}

if (item.voiceNote) {
    wrapper.dataset.voiceNote = item.voiceNote;
    wrapper.dataset.voiceNoteDuration = item.voiceNoteDuration || 0;
    wrapper.classList.add("has-audio");
}

makeDraggable(wrapper);

giftScene.appendChild(
wrapper
);

}

});

/* -------------------- */
/* GLOBAL DRAG MOVE     */
/* -------------------- */

document.addEventListener(
"mousemove",
(e) => {

if(!selected) return;

const sceneRect =
giftScene.getBoundingClientRect();

let newLeft =
e.clientX - sceneRect.left - dragOffsetX;

let newTop =
e.clientY - sceneRect.top - dragOffsetY;

selected.style.left = newLeft + "px";
selected.style.top  = newTop  + "px";

}
);

document.addEventListener(
"mouseup",
() => {

selected = null;

}
);

/* Click on scene background to deselect */
giftScene.addEventListener(
"mousedown",
(e) => {

if(e.target === giftScene){

document
.querySelectorAll(".gifSelected")
.forEach(x => x.classList.remove("gifSelected"));

}

}
);

/* -------------------- */
/* SIZE CONTROLS        */
/* -------------------- */

function getSelectedEl(){

return document.querySelector(".gifSelected");

}

/* Increase size */
document
.getElementById("giftIncreaseSize")
.addEventListener(
"click",
() => {

const el = getSelectedEl();

if(!el){

alert("Select an item first!");

return;

}

const isText = el.classList.contains("giftText");
if (isText) {
const currentFS = parseFloat(window.getComputedStyle(el).fontSize);
el.style.fontSize = (currentFS + 3) + "px";
} else {
const currentW = el.offsetWidth;
el.style.width = (currentW + 20) + "px";
el.style.height = (currentW + 20) + "px";
}

}
);

/* Decrease size */
document
.getElementById("giftDecreaseSize")
.addEventListener(
"click",
() => {

const el = getSelectedEl();

if(!el){

alert("Select an item first!");

return;

}

const isText = el.classList.contains("giftText");
if (isText) {
const currentFS = parseFloat(window.getComputedStyle(el).fontSize);
if (currentFS > 10) {
el.style.fontSize = (currentFS - 3) + "px";
}
} else {
const currentW = el.offsetWidth;
if(currentW > 40){
el.style.width = (currentW - 20) + "px";
el.style.height = (currentW - 20) + "px";
}
}

}
);

/* Delete selected */
document
.getElementById("giftDeleteItem")
.addEventListener(
"click",
() => {

const el = getSelectedEl();

if(el){

el.remove();

}

}
);

/* -------------------- */
/* CREATE NOTES         */
/* -------------------- */

document
.querySelectorAll(
".noteTemplate"
)
.forEach(note => {

note.addEventListener(
"click",
() => {

const wrapper =
document.createElement(
"div"
);

wrapper.className =
"note draggable giftEl";

wrapper.style.position =
"absolute";

wrapper.style.left =
"200px";

wrapper.style.top =
"150px";

wrapper.style.width =
"220px";

wrapper.style.zIndex =
highestZ++;

const paper =
document.createElement(
"img"
);

paper.src =
note.src;

paper.style.width =
"100%";

paper.draggable = false;

wrapper.appendChild(
paper
);

makeDraggable(wrapper);

giftScene.appendChild(
wrapper
);

});

});

/* -------------------- */
/* CREATE STICKERS      */
/* -------------------- */

document
.querySelectorAll(
".stickerTemplate"
)
.forEach(sticker => {

sticker.addEventListener(
"click",
() => {

const img =
document.createElement(
"img"
);

img.src =
sticker.src;

img.className =
"draggable giftEl";

img.style.position =
"absolute";

img.style.width =
"100px";

img.style.left =
"250px";

img.style.top =
"250px";

img.style.zIndex =
highestZ++;

img.draggable = false;

makeDraggable(img);

giftScene.appendChild(
img
);

/* -------------------- */
/* ADD TEXT             */
/* -------------------- */

document
.getElementById("addTextBtn")
.addEventListener(
"click",
() => {

const textEl =
document.createElement(
"div"
);

textEl.className =
"draggable giftEl giftText";

textEl.style.position =
"absolute";

textEl.style.left =
"150px";

textEl.style.top =
"200px";

textEl.style.zIndex =
highestZ++;

textEl.style.fontFamily =
"Pacifico, cursive";

textEl.style.fontSize =
"22px";

textEl.style.color =
"#ff4fa2";

textEl.style.cursor =
"move";

textEl.style.userSelect =
"none";

textEl.innerText =
"Your Text Here";

makeDraggable(textEl);

giftScene.appendChild(
textEl
);

/* Auto-open editor for new text */
currentNote = null;
openTextEditor(textEl);

});

/* -------------------- */
/* NOTE / TEXT EDITOR   */
/* -------------------- */

const noteEditor =
document.getElementById(
"noteEditor"
);

const noteMessage =
document.getElementById(
"noteMessage"
);

const fontSelect =
document.getElementById(
"fontSelect"
);

let editingEl = null;

function rgbToHex(rgb) {
    if (!rgb) return "#ff4fa2";
    if (rgb.startsWith("#")) return rgb;
    const match = rgb.match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/i);
    if (match) {
        return "#" + 
            ("0" + parseInt(match[1], 10).toString(16)).slice(-2) +
            ("0" + parseInt(match[2], 10).toString(16)).slice(-2) +
            ("0" + parseInt(match[3], 10).toString(16)).slice(-2);
    }
    return "#ff4fa2";
}

function openTextEditor(el){

editingEl = el;

const isNote = el.classList.contains("note");

if(isNote){

const textDiv =
el.querySelector(".noteText");

noteMessage.value =
textDiv ? textDiv.innerText : "";

} else {

noteMessage.value =
el.innerText;

}

fontSelect.value =
el.style.fontFamily
? el.style.fontFamily.split(",")[0].trim().replace(/['"]/g, "")
: "Pacifico";

const textColorPicker = document.getElementById("textColorPicker");
textColorPicker.value = el.style.color ? rgbToHex(el.style.color) : "#ff4fa2";

noteEditor.style.display =
"block";

}

/* Double-click to edit notes and text elements */
document.addEventListener(
"dblclick",
(e) => {

const note = e.target.closest(".note");

if(note){

openTextEditor(note);

return;

}

const textEl = e.target.closest(".giftText");

if(textEl){

openTextEditor(textEl);

}

}
);

/* -------------------- */
/* SAVE EDITOR          */
/* -------------------- */

document
.getElementById(
"saveNote"
)
.addEventListener(
"click",
() => {

if(!editingEl) return;

const isNote = editingEl.classList.contains("note");

const font = fontSelect.value;
const textColor = document.getElementById("textColorPicker").value;

if(isNote){

const textDiv =
editingEl.querySelector(".noteText");

if(textDiv){

textDiv.innerText =
noteMessage.value;

textDiv.style.fontFamily =
font;

textDiv.style.color = textColor;

}

} else {

editingEl.innerText =
noteMessage.value;

editingEl.style.fontFamily =
font + ", cursive";

editingEl.style.color = textColor;

}

noteEditor.style.display =
"none";

}
);

/* ESC closes editor */
document.addEventListener(
"keydown",
(e) => {

if(
e.key === "Escape"
){

noteEditor.style.display =
"none";

}

}
);

/* -------------------- */
/* ROTATE & FLIP        */
/* -------------------- */

/* Rotate selected */
document
.getElementById("giftRotate")
.addEventListener(
"click",
() => {
  const el = getSelectedEl();
  if(!el){
    alert("Select an item first!");
    return;
  }
  let currentRotation = parseInt(el.dataset.rotation) || 0;
  currentRotation = (currentRotation + 45) % 360;
  el.dataset.rotation = currentRotation;
  updateTransform(el);
}
);

/* Flip selected sideways */
document
.getElementById("giftFlip")
.addEventListener(
"click",
() => {
  const el = getSelectedEl();
  if(!el){
    alert("Select an item first!");
    return;
  }
  let currentFlip = parseInt(el.dataset.flip) || 1;
  currentFlip = currentFlip === 1 ? -1 : 1;
  el.dataset.flip = currentFlip;
  updateTransform(el);
}
);

function updateTransform(el) {
  let rotation = el.dataset.rotation || 0;
  let flip = el.dataset.flip || 1;
  el.style.transform = `rotate(${rotation}deg) scaleX(${flip})`;
}

/* -------------------- */
/* SERIALIZE & SAVE     */
/* -------------------- */

const saveGiftBtn = document.getElementById("saveGiftLayoutBtn");
if (saveGiftBtn) {
    saveGiftBtn.addEventListener("click", () => {
        const savedLayout = [];
        document.querySelectorAll("#giftScene .giftEl").forEach(el => {
            const isPlushie = el.classList.contains("draggable") && !el.classList.contains("note") && !el.classList.contains("giftText") && el.querySelector("img") && !el.querySelector("img").src.includes("sticker");
            const isNote = el.classList.contains("note");
            const isText = el.classList.contains("giftText");
            const isSticker = el.querySelector("img") && el.querySelector("img").src.includes("sticker") || el.tagName === "IMG";

            let type = "sticker";
            if (isPlushie) type = "plushie";
            else if (isNote) type = "note";
            else if (isText) type = "text";

            let src = "";
            let text = "";
            let noteTextDetails = null;

            if (type === "plushie") {
                src = el.querySelector("img").src;
            } else if (type === "note") {
                src = el.querySelector("img").src;
                const textDiv = el.querySelector(".noteText");
                if (textDiv) {
                    noteTextDetails = {
                        text: textDiv.innerText,
                        fontFamily: textDiv.style.fontFamily,
                        color: textDiv.style.color
                    };
                }
            } else if (type === "sticker") {
                src = el.tagName === "IMG" ? el.src : el.querySelector("img").src;
            } else if (type === "text") {
                text = el.innerText;
            }

            const sceneW = giftScene.clientWidth || 800;
            const realLeft = parseFloat(el.style.left) || 0;
            const centerOffset = realLeft - (sceneW / 2);

            let accessories = [];
            const itemIndex = el.dataset.itemIndex;
            if (itemIndex !== undefined && giftItems[itemIndex]) {
                accessories = giftItems[itemIndex].accessories || [];
            }

            const isBouquetItem = el.dataset.isBouquet === "true";

            savedLayout.push({
                type: type,
                isBouquet: isBouquetItem,
                left: el.style.left,
                centerOffset: centerOffset,
                top: el.style.top,
                width: el.style.width,
                height: el.style.height,
                zIndex: el.style.zIndex,
                rotation: el.dataset.rotation || "0",
                flip: el.dataset.flip || "1",
                src: src,
                text: text,
                noteTextDetails: noteTextDetails,
                fontFamily: el.style.fontFamily || "",
                fontSize: el.style.fontSize || "",
                color: el.style.color || "",
                voiceNote: el.dataset.voiceNote || "",
                voiceNoteDuration: parseInt(el.dataset.voiceNoteDuration) || 0,
                accessories: accessories
            });
        });
        
        localStorage.setItem("savedGiftLayout", JSON.stringify(savedLayout));
        alert("Gift Layout Saved! Opening your wrapped card...");
        window.location = "final.html";
    });
}

</script>
