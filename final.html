/* --- THEME VARIABLES --- */
:root,
[data-theme="light"] {
    --bg-gradient: linear-gradient(135deg, #ffe4f1 0%, #ffc2e0 40%, #ffb3d9 100%);
    --body-bg: #fff5fb;
    --panel-bg: #ffe4f1;
    --popup-bg: #ffe4f1;
    --receipt-bg: #ffeaf5;
    --card-bg: #ffffff;
    --text-color: #c2185b;
    --heading-color: #ff4fa2;
    --btn-bg: #ffffff;
    --btn-text: #ff4fa2;
    --cart-btn-bg: #ff69b4;
    --cart-btn-shadow: hotpink;
    --glow-color: hotpink;
    --glow-soft: pink;
    --toast-bg: #ff69b4;
    --receipt-shadow: pink;
    --shelf-overlay: rgba(255,255,255,0.0);
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(135deg, #1a0010 0%, #3d0030 40%, #5c0045 100%);
    --body-bg: #1a0010;
    --panel-bg: #2e001f;
    --popup-bg: #2e001f;
    --receipt-bg: #1a0010;
    --card-bg: #2e001f;
    --text-color: #ff80c0;
    --heading-color: #ff4fa2;
    --btn-bg: #3d0030;
    --btn-text: #ff80c0;
    --cart-btn-bg: #c2185b;
    --cart-btn-shadow: #ff1493;
    --glow-color: #ff1493;
    --glow-soft: #c2185b;
    --toast-bg: #c2185b;
    --receipt-shadow: #c2185b;
    --shelf-overlay: rgba(26,0,16,0.15);
}

/* --- BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    transition: background-color 0.5s ease, color 0.5s ease;
}

body {
    color: var(--text-color);
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--body-bg);
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
    font-family: 'Fredoka', 'Pacifico', cursive, sans-serif;
}

[data-theme="dark"] body {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

body.receiptPage,
body.giftPage {
    background-image: url("assets/bg_pattern.png");
    background-repeat: repeat;
    background-size: 350px;
    background-attachment: fixed;
    background-color: var(--receipt-bg);
}

[data-theme="dark"] body.receiptPage,
[data-theme="dark"] body.giftPage {
    background-image: linear-gradient(rgba(92, 0, 69, 0.4), rgba(92, 0, 69, 0.4)), url("assets/bg_pattern.png");
}

/* --- THEME SWITCH WRAPPER --- */
#themeToggleWrapper {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    background: transparent;
    padding: 6px;
    border-radius: 30px;
}

[data-theme="dark"] #themeToggleWrapper {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    background: transparent;
    padding: 6px;
    border-radius: 30px;
}

/* --- THEME SWITCH STYLES --- */
.theme-switch {
    --toggle-size: 11px;

/* --- Smaller size --- */
--container-width: 5.625em;
    --container-height: 2.5em;
    --container-radius: 6.25em;
    --container-light-bg: #ff4fa2;

/* --- Changed color to pop more --- */
--container-night-bg: #800040;
    --circle-container-diameter: 3.375em;
    --sun-moon-diameter: 2.125em;
    --sun-bg: #FFA500;
    --moon-bg: #E0E4EB;
    --spot-color: #A1A8B8;
    --circle-container-offset: calc((var(--circle-container-diameter) - var(--container-height)) / 2 * -1);
    --stars-color: #fff;
    --clouds-color: #F3FDFF;
    --back-clouds-color: #AACADF;
    --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
    --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);
}

.theme-switch,
.theme-switch *,
.theme-switch *::before,
.theme-switch *::after {
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-size: var(--toggle-size);
}

.theme-switch__container {
    width: var(--container-width);
    height: var(--container-height);
    background-color: var(--container-light-bg);
    border-radius: var(--container-radius);
    overflow: hidden;
    cursor: pointer;
    box-shadow: none;

/* --- Make it flat, not floating --- */
transition: var(--transition);
    position: relative;
}

.theme-switch__container::before {
    content: "";
    position: absolute;
    z-index: 1;
    inset: 0;
    border-radius: var(--container-radius);
}

.theme-switch__checkbox {
    display: none;
}

.theme-switch__circle-container {
    width: var(--circle-container-diameter);
    height: var(--circle-container-diameter);
    background-color: rgba(255, 255, 255, 0.2);
    position: absolute;
    left: var(--circle-container-offset);
    top: var(--circle-container-offset);
    border-radius: var(--container-radius);
    display: flex;
    transition: var(--circle-transition);
    pointer-events: none;
}

.theme-switch__sun-moon-container {
    pointer-events: auto;
    position: relative;
    z-index: 2;
    width: var(--sun-moon-diameter);
    height: var(--sun-moon-diameter);
    margin: auto;
    border-radius: var(--container-radius);
    background-color: var(--sun-bg);
    overflow: hidden;
    transition: var(--transition);
}

.theme-switch__moon {
    transform: translateX(100%);
    width: 100%;
    height: 100%;
    background-color: var(--moon-bg);
    border-radius: inherit;
    transition: var(--transition);
    position: relative;
}

.theme-switch__spot {
    position: absolute;
    top: 0.75em;
    left: 0.312em;
    width: 0.75em;
    height: 0.75em;
    border-radius: var(--container-radius);
    background-color: var(--spot-color);
}

.theme-switch__spot:nth-of-type(2) {
    width: 0.375em;
    height: 0.375em;
    top: 0.937em;
    left: 1.375em;
}

.theme-switch__spot:nth-last-of-type(3) {
    width: 0.25em;
    height: 0.25em;
    top: 0.312em;
    left: 0.812em;
}

.theme-switch__clouds {
    width: 1.25em;
    height: 1.25em;
    background-color: var(--clouds-color);
    border-radius: var(--container-radius);
    position: absolute;
    bottom: -0.625em;
    left: 0.312em;
    box-shadow:
        0.937em 0.312em var(--clouds-color),
        -0.312em -0.312em var(--back-clouds-color),
        1.437em 0.375em var(--clouds-color),
        0.5em -0.125em var(--back-clouds-color),
        2.187em 0 var(--clouds-color),
        1.25em -0.062em var(--back-clouds-color),
        2.937em 0.312em var(--clouds-color),
        2em -0.312em var(--back-clouds-color),
        3.625em -0.062em var(--clouds-color),
        2.625em 0em var(--back-clouds-color),
        4.5em -0.312em var(--clouds-color),
        3.375em -0.437em var(--back-clouds-color),
        4.625em -1.75em 0 0.437em var(--clouds-color),
        4em -0.625em var(--back-clouds-color),
        4.125em -2.125em 0 0.437em var(--back-clouds-color);
    transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
}

.theme-switch__stars-container {
    position: absolute;
    color: var(--stars-color);
    top: -100%;
    left: 0.312em;
    width: 2.75em;
    height: auto;
    transition: var(--transition);
}

/* --- -- Switch Actions -- --- */
.theme-switch__checkbox:checked + .theme-switch__container {
    background-color: var(--container-night-bg);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__circle-container:hover {
    left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em);
}

.theme-switch__circle-container:hover {
    left: calc(var(--circle-container-offset) + 0.187em);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__moon {
    transform: translate(0);
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__clouds {
    bottom: -4.062em;
}

.theme-switch__checkbox:checked + .theme-switch__container .theme-switch__stars-container {
    top: 50%;
    transform: translateY(-50%);
}

.sidebar-panel {
    display: none;
    /* --- controlled by JS --- */
    background: var(--popup-bg);
    padding: 25px;
    border-radius: 25px;
    box-shadow:
        0 10px 20px rgba(0, 0, 0, 0.05);
    text-align: center;
    border: 2px solid var(--glow-soft);
    transition: background 0.5s ease, box-shadow 0.5s ease;
}

#shelf {
    width: 1000px;
    height: 800px;
    background: url("shelf.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
    margin: 0 auto;

/* --- Shelf stays strictly center aligned --- */
}

.character {
    position: absolute;
    width: 170px;
    cursor: pointer;
    transition: .25s;
}

.character:hover {
    transform: scale(1.05);
}

/* --- CHECKOUT BUTTON --- */


/* --- Highlight selected gift element --- */
.gifSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- Gift text element --- */
.giftText {
    min-width: 80px;
    font-size: 22px;
    color: var(--heading-color);
    user-select: none;
    cursor: move;
    white-space: pre-wrap;
    word-break: break-word;
}

/* --- CUSTOM ALIGNMENTS --- */
.checkoutTitle, .customizeTitle {
    text-align: center !important;
    font-family: 'Pacifico', cursive;
    color: var(--heading-color);
    margin-top: 100px;
    margin-bottom: 25px;
    font-size: 42px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}

[data-theme="dark"] .checkoutTitle, [data-theme="dark"] .customizeTitle {
    color: #ffb6d9 !important;
    text-shadow: none;
}

/* --- NAVBAR --- */
#storeNavbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(255, 228, 241, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 30px;
    z-index: 999;
    border-bottom: 3px solid #ffb3d9;
    box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
    padding: 10px 30px;
    box-sizing: border-box;
}

[data-theme="dark"] #storeNavbar {
    background: rgba(46, 0, 31, 0.95);
    border-bottom-color: #5c0045;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.navLink {
    font-size: 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: var(--text-color);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
}

.navLink:hover {
    color: var(--heading-color);
    transform: translateY(-2px);
    opacity: 0.9;
}

.navLink.active {
    color: var(--heading-color);
    font-weight: 800;
    border-bottom: 3px solid var(--heading-color);
    padding-bottom: 2px;
}

[data-theme="dark"] .navLink.active {
    background: transparent;
    color: var(--heading-color);
    box-shadow: none;
}

/* --- Header Text styling --- */
.storeHeader {
    text-align: center;
    margin-top: 100px;
    margin-bottom: 20px;
    color: var(--heading-color);
    font-family: 'Pacifico', cursive;
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.4);
}

[data-theme="dark"] .storeHeader {
    color: #ffb6d9 !important;
    text-shadow: none;
}

/* --- BACK TO SHOP BTN --- */


/* --- Pulsing red dot for active recording --- */
.recording-active {
    animation: recordPulse 1s infinite alternate;
    color: #e74c3c !important;
}

@keyframes recordPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* --- FINAL PRESENTATION --- */
.has-audio {
    cursor: pointer !important;
    position: relative;
    transition: transform 0.3s ease;
}

.has-audio:hover {
    transform: scale(1.05);
}

/* --- Plushie speaking / audio wave pulse animation --- */
.plushie-speaking {
    animation: audioShake 0.15s infinite alternate;
    box-shadow: none !important;
    border-radius: 50%;
}

@keyframes audioShake {
    0% { transform: rotate(-2deg) scale(1.02); }
    100% { transform: rotate(2deg) scale(1.02); }
}

/* --- Big chosen box canvas - a tad bit smaller (600x600px) --- */
.treats-layout #customScene {
    width: 600px;
    height: 600px;
    background: white;
    border-radius: 40px;
    box-shadow: none;
    position: relative;
    overflow: hidden;
}

#customPanel.treats-controls-panel {
    width: 280px !important;
    background: var(--popup-bg);
    border: 3px solid #ffb6d9;
    border-radius: 35px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
    display: flex;
    flex-direction: column;
}

[data-theme="dark"] #customPanel.treats-controls-panel {
    background-color: rgba(46, 0, 31, 0.6);
    border-color: #5c0045;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

#customPanel.treats-controls-panel h2 {
    text-align: center;
    color: var(--heading-color);
    margin-bottom: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 20px;
}

/* --- Bubbly option elements inside selection panel --- */
.box-option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    background: var(--btn-bg);
    border: 2px solid #ffb6d9;
    border-radius: 20px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    width: 100%;
}

.box-option:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: hotpink;
    box-shadow: 0 5px 12px rgba(255, 105, 180, 0.2);
}

.box-option.active {
    background: #ffb6d9;
    border-color: hotpink;
    box-shadow: none;
}

.box-option img {
    width: 45px;
    height: 45px;
    object-fit: contain;
}

.box-option span {
    font-size: 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--text-color);
}

.box-option.active span {
    color: #5a0035;
}

[data-theme="dark"] .box-option {
    border-color: #5c0045;
}

[data-theme="dark"] .box-option.active {
    background: #c2185b;
    border-color: #ff80c0;
}

[data-theme="dark"] .box-option.active span {
    color: white;
}

/* --- Customization Buttons Placed Side-by-Side --- */
.buttons-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 10px;
}

.buttons-row button {
    flex: 1;
    margin: 0 !important;
    padding: 12px 6px !important;
    font-size: 14px !important;
    border-radius: 25px !important;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #ffd6ef;
    box-shadow: none;
    color: #5a0035;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
}

.buttons-row button:hover {
    transform: scale(1.05);
    box-shadow: none;
}

#saveCustomization {
    background: #ffb6d9 !important;
    color: #5a0035 !important;
    box-shadow: 0 0 10px pink !important;
}

#saveCustomization:hover {
    box-shadow: none !important;
}

/* --- Spawned Draggable Treats --- */
.draggableTreat {
    position: absolute;
    width: 70px;
    height: 70px;
    object-fit: contain;
    cursor: move;
    z-index: 10;
    transition: transform 0.1s ease;
}

.draggableTreatSelected {
    outline: 3px solid hotpink !important;
    outline-offset: 3px;
}

/* --- PEARL STARDUST BUTTON DESIGN --- */
:root, [data-theme="light"] {
    --bg-pink: #ffb6d9;
    --hover-glow: rgba(255, 182, 193, 0.6);
    --hover-glow-soft: rgba(255, 105, 180, 0.8);
    --btn-text-color: #5a0035;
}

[data-theme="dark"] {
    --bg-pink: #880e4f;
    --hover-glow: rgba(136, 14, 79, 0.6);
    --hover-glow-soft: rgba(194, 24, 91, 0.8);
    --btn-text-color: #ffffff;
}

.shiny-cta {
    outline: none;
    cursor: pointer;
    border: 0;
    position: relative;
    border-radius: 100px;
    background-color: var(--bg-pink);
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px -2px rgba(255, 105, 180, 0.2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 10px 24px;
}

.shiny-cta span {
    position: relative;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: var(--btn-text-color);
}

.shiny-cta:hover {
    filter: brightness(1.05);
    box-shadow: 0 6px 12px rgba(255, 105, 180, 0.3);
}

.shiny-cta:active {
    transform: scale(0.98);
}

/* --- extra padding for box shadows --- */


.carousel-track {
    display: flex;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.carousel-slide {
    flex: 0 0 calc(100% / 3);

/* --- Show 3 items --- */
padding: 0 15px;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
}

    .carousel-slide {
        flex: 0 0 50%;

/* --- Show 2 items --- */
}
}

@media (max-width: 768px) {
    .carousel-slide {
        flex: 0 0 100%;

/* --- Show 1 item --- */
}
    .carousel-wrapper {
        padding: 0 40px;
    }
}

    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #fafafa;
    border: 1px solid #e4e4e7;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    color: #52525b;
    cursor: pointer;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);

    border-color: #27272a;
    color: #f4f4f5;
}

    color: #ffffff;

    cursor: not-allowed;

.carousel-prev {

}

.carousel-next {

}

.carousel-slide .flowerCard {
    width: 100%;

/* --- Take up the slide width --- */
max-width: 320px;

/* --- Don't get too crazy large --- */
margin: 0 auto;
}

/* --- NAV BRAND CENTERING --- */
.navBrand {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    margin: 0;
    font-family: 'Pacifico', cursive;
    font-size: 32px;
    color: var(--heading-color);
    text-decoration: none;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), text-shadow 0.3s ease;
}

.navBrand:hover {
    transform: translateX(-50%) scale(1.08);
    text-shadow: none;
}

/* --- SHARE BUTTON --- */
.share-btn-container {
    position: fixed;
    top: 90px;
    right: 30px;
    z-index: 1000;
}

/* --- SHARE MODAL OVERLAY --- */
.share-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(6px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.share-modal-overlay.visible {
    opacity: 1;
    pointer-events: auto;
}

.share-modal {
    background: var(--popup-bg);
    border: 2px solid var(--glow-soft);
    border-radius: 28px;
    padding: 32px 36px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(255, 105, 180, 0.25);
    text-align: center;
    transform: scale(0.9) translateY(20px);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.share-modal-overlay.visible .share-modal {
    transform: scale(1) translateY(0);
}

.share-modal h3 {
    font-family: 'Pacifico', cursive;
    color: var(--heading-color);
    font-size: 26px;
    margin-bottom: 8px;
}

.share-modal p {
    color: var(--text-color);
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    margin-bottom: 20px;
    opacity: 0.8;
}

.share-url-box {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: 16px;
    overflow: hidden;

/* -------------------- */
/* THEME TOGGLE         */
/* -------------------- */

// Apply saved theme immediately to <html> to prevent flash
(function () {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
    }
})();

// Wire up the checkbox once DOM is ready
document.addEventListener('DOMContentLoaded', function () {
    const checkbox = document.getElementById('themeCheckbox');
    if (!checkbox) return;

    const saved = localStorage.getItem('theme');
    checkbox.checked = saved === 'dark';

    checkbox.addEventListener('change', function () {
        if (this.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    });
});

</script>
    <script>
const giftScene = document.getElementById("giftScene");

function resolveMainSrc(src) {
    if (!src) return "";
    if (src.startsWith("data:")) return src;
    let path = src.replace(/\\/g, "/");
    const assetsIndex = path.toLowerCase().indexOf("assets/");
    if (assetsIndex !== -1) {
        const p = path.substring(assetsIndex);
        return p.startsWith("/") ? p : "/" + p;
    }
    return src;
}

function resolveAccessorySrc(src) {
    if (!src) return "";
    let path = src.replace(/\\/g, "/");
    const assetsIndex = path.toLowerCase().indexOf("assets/");
    if (assetsIndex !== -1) {
        return path.substring(assetsIndex);
    }
    const filename = path.split("/").pop();
    if (filename.includes("custom")) {
        return "assets/plushies/" + filename;
    } else if (filename.includes("dessert") || filename.includes("box")) {
        return "assets/treats/" + filename;
    } else if (filename.includes("flower") || filename.includes("bow") || filename.includes("holder")) {
        return "assets/flowers/" + filename;
    }
    return "assets/treats/" + filename;
}

/* ---------- VIEWER MODE DETECTION ---------- */
// Check if the URL contains shared gift data in the hash
let isViewerMode = false;
let savedLayout = [];

(function detectSharedGift() {
    const hash = window.location.hash;
    if (hash.startsWith('#gift=')) {
        try {
            const compressed = hash.substring(6); // remove '#gift='
            const json = LZString.decompressFromEncodedURIComponent(compressed);
            if (json) {
                savedLayout = JSON.parse(json);
                isViewerMode = true;
                document.body.classList.add('viewer-mode');
                // Change title for viewer
                const titleEl = document.querySelector('.checkoutTitle');
                if (titleEl) titleEl.textContent = 'A Gift For You ';
            }
        } catch (e) {
            console.error('Failed to decode shared gift data:', e);
        }
    }
    // Fallback to localStorage if no shared data
    if (!savedLayout.length) {
        savedLayout = JSON.parse(sessionStorage.getItem("savedGiftLayout")) || [];
    }
})();

let hasAudioNote = false;
let activeAudio = null;
const audioPlaylist = [];
let currentPlaylistIndex = -1;
let isPlaylistPlaying = false;
let fallbackTimeoutId = null;

/* Reconstruct everything inside the stationary scene */
savedLayout.forEach(item => {
    const wrapper = document.createElement("div");
    wrapper.className = "giftEl";
    wrapper.style.position = "absolute";
    
    const finalSceneW = giftScene.clientWidth || 800;
    if (item.centerOffset !== undefined && typeof item.left === 'string' && !item.left.endsWith('%')) {
        wrapper.style.left = (finalSceneW / 2 + item.centerOffset) + "px";
    } else {
        wrapper.style.left = item.left || "50%";
    }
    wrapper.style.top = item.top || "50%";
    wrapper.style.width = item.width;
    wrapper.style.height = item.height;
    wrapper.style.zIndex = item.zIndex;
    
    // Set transform states
    const rotation = item.rotation || "0";
    const flip = item.flip || "1";
    wrapper.style.transform = `rotate(${rotation}deg) scaleX(${flip})`;

    if (item.type === "plushie") {
        // Base plushie image
        const img = document.createElement("img");
        img.src = resolveMainSrc(item.src);
        img.style.position = "absolute";
        img.style.width = "100%";
        img.style.height = "auto";
        img.style.left = "0";
        img.style.top = "0";
        img.draggable = false;
        wrapper.appendChild(img);

        // Reconstruct overlays (accessories)
        if (item.accessories && item.accessories.length > 0) {
            const isBouquet = item.isBouquet === true || (item.src && item.src.startsWith("data:image"));
            const canvasW = isBouquet ? 600 : 280;
            const canvasL = isBouquet ? 50 : 210;
            const canvasT = isBouquet ? 50 : 210;
            
            item.accessories.forEach(acc => {
                const accessory = document.createElement("img");
                let src = acc.image;
                if (src) {
                    src = resolveAccessorySrc(src);
                }
                accessory.src = src;
                accessory.style.position = "absolute";
                accessory.style.pointerEvents = "none";
                
                const rawLeft = parseFloat(acc.left);
                const rawTop  = parseFloat(acc.top);
                const rawWidth = parseFloat(acc.width);
                
                accessory.style.left  = (((rawLeft - canvasL) / canvasW) * 100) + "%";
                accessory.style.top   = (((rawTop  - canvasT) / canvasW) * 100) + "%";
                accessory.style.width = ((rawWidth / canvasW) * 100) + "%";
                accessory.style.transform = `rotate(${acc.rotation || 0}deg) scaleX(${acc.flip || 1})`;
                wrapper.appendChild(accessory);
            });
        }

        // Voice Note Playback
        const voiceNoteSrc = item.voiceNote;
        const voiceNoteDuration = parseInt(item.voiceNoteDuration) || 0;
        if (voiceNoteSrc) {
            hasAudioNote = true;
            wrapper.dataset.voiceNote = voiceNoteSrc;
            wrapper.dataset.voiceNoteDuration = voiceNoteDuration;
            wrapper.classList.add("has-audio");
            
            audioPlaylist.push({
                wrapper: wrapper,
                img: img,
                src: voiceNoteSrc,
                duration: voiceNoteDuration
            });
        }
    } 
    else if (item.type === "note") {
        const paper = document.createElement("img");
        paper.src = resolveMainSrc(item.src);
        paper.style.width = "100%";
        paper.draggable = false;
        wrapper.appendChild(paper);
        wrapper.className = "note giftEl";

        if (item.noteTextDetails) {
            const textDiv = document.createElement("div");
            textDiv.className = "noteText";
            textDiv.style.position = "absolute";
            textDiv.style.top = "12%";
            textDiv.style.left = "10%";
            textDiv.style.width = "75%";
            textDiv.style.height = "70%";
            textDiv.style.overflow = "hidden";
            textDiv.style.textAlign = "center";
            textDiv.style.wordWrap = "break-word";
            textDiv.style.fontSize = "18px";
            textDiv.style.userSelect = "none";
            
            textDiv.innerText = item.noteTextDetails.text;
            textDiv.style.fontFamily = item.noteTextDetails.fontFamily;
            textDiv.style.color = item.noteTextDetails.color;
            wrapper.appendChild(textDiv);
        }
    } 
    else if (item.type === "sticker") {
        const img = document.createElement("img");
        img.src = resolveMainSrc(item.src);
        img.style.width = "100%";
        img.draggable = false;
        wrapper.appendChild(img);
    } 
    else if (item.type === "text") {
        wrapper.className = "giftEl giftText";
        wrapper.innerText = item.text;
        wrapper.style.fontFamily = item.fontFamily;
        wrapper.style.fontSize = item.fontSize;
        wrapper.style.color = item.color;
        wrapper.style.userSelect = "none";
    }

    giftScene.appendChild(wrapper);
});

// Playlist control functions
function playTrack(index) {
    if (fallbackTimeoutId) {
        clearTimeout(fallbackTimeoutId);
        fallbackTimeoutId = null;
    }
    if (activeAudio) {
        activeAudio.pause();
        activeAudio = null;
    }

    // Clear speaking class from all playlist items
    audioPlaylist.forEach(track => {
        track.img.classList.remove("plushie-speaking");
    });

    if (index < 0 || index >= audioPlaylist.length) {
        isPlaylistPlaying = false;
        currentPlaylistIndex = -1;
        updateCTA();
        return;
    }

    currentPlaylistIndex = index;
    isPlaylistPlaying = true;
    updateCTA();

    const track = audioPlaylist[index];
    track.img.classList.add("plushie-speaking");

    activeAudio = new Audio(track.src);
    activeAudio.play().catch(err => {
        console.error("Playback failed", err);
        // Automatically skip to the next track if playing fails
        if (fallbackTimeoutId) {
            clearTimeout(fallbackTimeoutId);
            fallbackTimeoutId = null;
        }
        setTimeout(playNext, 1000);
    });

    let endedFired = false;
    const handleEnded = () => {
        if (endedFired) return;
        endedFired = true;
        if (fallbackTimeoutId) {
            clearTimeout(fallbackTimeoutId);
            fallbackTimeoutId = null;
        }
        track.img.classList.remove("plushie-speaking");
        playNext();
    };

    activeAudio.onended = handleEnded;

    if (track.duration && track.duration > 0) {
        // Fallback in case browser does not fire 'ended' event (common WebM metadata issue)
        fallbackTimeoutId = setTimeout(handleEnded, track.duration + 200); // 200ms buffer
    }
}

function playNext() {
    playTrack(currentPlaylistIndex + 1);
}

function stopPlaylist() {
    if (fallbackTimeoutId) {
        clearTimeout(fallbackTimeoutId);
        fallbackTimeoutId = null;
    }
    if (activeAudio) {
        activeAudio.pause();
        activeAudio = null;
    }
    audioPlaylist.forEach(track => {
        track.img.classList.remove("plushie-speaking");
    });
    isPlaylistPlaying = false;
    currentPlaylistIndex = -1;
    updateCTA();
}

function updateCTA() {
    const cta = document.querySelector(".click-gifts-cta");
    if (!cta) return;

    let text = "";
    if (isPlaylistPlaying) {
        const displayIndex = currentPlaylistIndex + 1;
        const total = audioPlaylist.length;
        if (total > 1) {
            text = ` Pause sequence (Playing ${displayIndex} of ${total})`;
        } else {
            text = ` Pause voice message`;
        }
    } else {
        if (currentPlaylistIndex !== -1 && currentPlaylistIndex < audioPlaylist.length) {
            text = ` Resume voice message`;
        } else {
            text = ` Click to hear a message`;
        }
    }

    let span = cta.querySelector("span");
    if (!span) {
        span = document.createElement("span");
        cta.innerHTML = "";
        cta.appendChild(span);
    }
    span.innerText = text;
}

// Wire up click event listeners for playlist items
audioPlaylist.forEach((track, index) => {
    track.wrapper.addEventListener("click", (e) => {
        e.stopPropagation();
        if (isPlaylistPlaying && currentPlaylistIndex === index) {
            stopPlaylist();
        } else {
            playTrack(index);
        }
    });
});

/* Create "Click on your gifts" CTA button if custom audio is loaded */
if (hasAudioNote) {
    const ctaContainer = document.createElement("div");
    ctaContainer.style.display = "flex";
    ctaContainer.style.justifyContent = "center";
    ctaContainer.style.marginTop = "25px";
    ctaContainer.style.marginBottom = "20px";

    const cta = document.createElement("button");
    cta.className = "shiny-cta click-gifts-cta";
    
    ctaContainer.appendChild(cta);
    document.body.appendChild(ctaContainer);
    
    // Add pulsing play action
    cta.addEventListener("click", () => {
        if (isPlaylistPlaying) {
            stopPlaylist();
        } else {
            const resumeIndex = currentPlaylistIndex !== -1 ? currentPlaylistIndex : 0;
            playTrack(resumeIndex);
        }
    });
    
    updateCTA();
}

// In viewer mode, add a small badge at the bottom
if (isViewerMode) {

    badge.className = 'viewer-badge';
    badge.innerHTML = 'Made with  <a href="index.html">The Gifting Co.</a>';
    document.body.appendChild(badge);
}

// Show a toast notification
function showShareToast(message) {
    let toast = document.querySelector('.share-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.className = 'share-toast';
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// Create the download button
const shareBtnContainer = document.getElementById('navDownloadContainer');

const shareBtn = document.createElement('button');
shareBtn.id = 'shareGiftBtn';
shareBtn.className = 'nav-action-btn';
shareBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg><span>Download</span>';

if (isViewerMode) {
    shareBtn.style.position = 'fixed';
    shareBtn.style.top = '20px';
    shareBtn.style.right = '20px';
    shareBtn.style.zIndex = '10000';
    document.body.appendChild(shareBtn);
} else if (shareBtnContainer) {
    shareBtnContainer.appendChild(shareBtn);
}

// Download button click handler
shareBtn.addEventListener('click', async () => {
        const span = shareBtn.querySelector('span');
        const originalText = span.innerHTML;
        
        // Show spinner state
        span.innerHTML = '<span class="share-spinner"></span> Downloading...';
        shareBtn.disabled = true;
        shareBtn.style.opacity = '0.7';

        try {
            if (typeof html2canvas === 'undefined') {
                throw new Error("html2canvas library failed to load.");
            }

            const canvas = await html2canvas(document.getElementById('giftScene'), {
                scale: 2, // High quality
                useCORS: true,
                allowTaint: false
            });
            const imgData = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.href = imgData;
            link.download = 'gift.jpg';
            document.body.appendChild(link);
            link.click();
            
            document.body.removeChild(link);
            const wm = document.getElementById("download-watermark");
            if (wm) wm.remove();
            showShareToast(' Image downloaded!');
        } catch (error) {
            console.error("Error creating image:", error);
            if (window.location.protocol === 'file:') {
                alert("Cannot download image directly from local files (file://) due to browser security restrictions. Please use a local web server (like VS Code Live Server) to enable downloads, or take a screenshot.");
            } else {
                alert("Failed to download image: " + (error.message || error));
            }
        } finally {
            const wm = document.getElementById('download-watermark');
            if (wm) wm.remove();
            // Restore button
            span.innerHTML = originalText;
            shareBtn.disabled = false;
            shareBtn.style.opacity = '1';
        }
    });
</script>
    
    <script type="module">
        import { saveGift } from './firebase-config.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            const shareBtnContainer = document.getElementById('navDownloadContainer');
            // Only add the button if we are not in viewer mode and the container exists
            if (!isViewerMode && shareBtnContainer) {
                const linkBtn = document.createElement('button');
                linkBtn.id = 'generateLinkBtn';
                linkBtn.className = 'nav-action-btn';
                linkBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg><span>Share Link</span>';
                
                shareBtnContainer.appendChild(linkBtn);
                
                linkBtn.addEventListener('click', async () => {
                    const span = linkBtn.querySelector('span');
                    const originalText = span.innerHTML;
                    span.innerHTML = '<span class="share-spinner"></span> Saving...';
                    linkBtn.disabled = true;
                    linkBtn.style.opacity = '0.7';
                    
                    try {
                        const storedLayout = JSON.parse(sessionStorage.getItem("savedGiftLayout")) || [];
                        const layoutToSave = storedLayout;
                        
                        let audioDataUrl = null;
                        const plushieComponent = layoutToSave.find(item => item.voiceNote);
                        if (plushieComponent) {
                            audioDataUrl = plushieComponent.voiceNote;
                        }
                        
                        const docId = await saveGift(layoutToSave, audioDataUrl);
                        // If hosting is running on 127.0.0.1 without Firebase rewrite, the URL won't work locally without Firebase Serve. 
                        // It assumes the Firebase Hosting rewrites are active.
                        const shareUrl = window.location.origin + '/gift/' + docId;
                        
                        await navigator.clipboard.writeText(shareUrl);
                        showShareToast('Link copied to clipboard!');
                    } catch (error) {
                        console.error('Error sharing gift:', error);
                        showShareToast('Error creating link. Try again.');
                    } finally {
                        span.innerHTML = originalText;
                        linkBtn.disabled = false;
                        linkBtn.style.opacity = '1';
                    }
                });
            }
        });
    </script>
